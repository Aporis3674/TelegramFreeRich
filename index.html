<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TelegramFreeRich — Premium Rich Text Editor, Completely Free</title>
<style>
:root {
  --bg: #1a1a1a;
  --surface: #2a2a2a;
  --surface2: #333333;
  --accent: #33b4c9;
  --accent-hover: #42c8de;
  --premium: #9b59b6;
  --text: #ffffff;
  --text-muted: #888888;
  --text-dim: #666666;
  --border: #3a3a3a;
  --danger: #ff4466;
  --success: #44ffaa;
  --warn: #ffaa44;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}
body { display: flex; flex-direction: column; position: relative; }

/* ===== iOS HANDLE BAR (top center) ===== */
.handle-bar {
  width: 40px;
  height: 4px;
  background: #555;
  border-radius: 2px;
  margin: 8px auto 0;
  flex-shrink: 0;
}

/* ===== UNDO/REDO PILL (top right) ===== */
.undo-redo-pill {
  position: absolute;
  top: 20px;
  right: 16px;
  display: flex;
  background: var(--surface);
  border-radius: 20px;
  z-index: 10;
}
.undo-redo-pill button {
  width: 36px; height: 36px;
  background: transparent;
  border: none;
  color: #999;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s;
  font-size: 18px;
}
.undo-redo-pill button:hover { color: #ccc; }
.undo-redo-pill button + button { border-left: 1px solid #3a3a3a; }

/* ===== MAIN CONTENT AREA ===== */
.content-area {
  flex: 1;
  position: relative;
  padding: 20px 24px;
  overflow-y: auto;
}

/* Left cursor/indicator line */
.content-area::before {
  content: '';
  position: absolute;
  left: 10px;
  top: 18px;
  width: 2px;
  height: 36px;
  background: #555;
  border-radius: 1px;
}

.content-title {
  font-family: Georgia, 'Times New Roman', Times, serif;
  font-size: 30px;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  margin-bottom: 8px;
}

.content-placeholder {
  font-size: 16px;
  color: var(--text-muted);
  line-height: 1.5;
}

/* Hidden editor textarea overlaid on content */
.editor-textarea {
  position: absolute;
  inset: 0;
  width: 100%;
  height: 100%;
  resize: none;
  border: none;
  outline: none;
  background: transparent;
  color: transparent;
  caret-color: var(--text);
  padding: 20px 24px;
  font-family: Georgia, 'Times New Roman', Times, serif;
  font-size: 16px;
  line-height: 1.65;
  z-index: 2;
}
.editor-textarea::placeholder { color: transparent; }

/* Preview content rendered area */
.preview-rendered {
  position: absolute;
  inset: 0;
  padding: 20px 24px;
  overflow-y: auto;
  pointer-events: none;
  z-index: 1;
}
.preview-rendered::-webkit-scrollbar { width: 4px; }
.preview-rendered::-webkit-scrollbar-track { background: transparent; }
.preview-rendered::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* Telegram message bubble in preview */
.tg-bubble {
  background: transparent;
  border-radius: 12px 12px 12px 0;
  padding: 0;
  max-width: 95%;
}
.preview-rendered h1 { font-size: 1.7em; font-weight: 700; margin: 0.5em 0 0.3em; font-family: Georgia, serif; }
.preview-rendered h2 { font-size: 1.4em; font-weight: 700; margin: 0.5em 0 0.3em; }
.preview-rendered h3 { font-size: 1.2em; font-weight: 600; margin: 0.5em 0 0.3em; }
.preview-rendered h4 { font-size: 1.1em; font-weight: 600; margin: 0.5em 0 0.3em; }
.preview-rendered h5 { font-size: 1em; font-weight: 600; margin: 0.5em 0 0.3em; }
.preview-rendered h6 { font-size: 0.9em; font-weight: 600; margin: 0.5em 0 0.3em; color: var(--text-muted); }
.preview-rendered b, .preview-rendered strong { font-weight: 700; }
.preview-rendered code {
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'SF Mono', 'JetBrains Mono', monospace;
  font-size: 0.9em;
}
.preview-rendered pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin: 10px 0;
  overflow-x: auto;
  font-size: 0.85em;
  line-height: 1.5;
}
.preview-rendered pre code { background: none; padding: 0; }
.preview-rendered blockquote {
  border-left: 3px solid var(--accent);
  margin: 10px 0;
  padding: 8px 16px;
  background: rgba(51,180,201,0.08);
  border-radius: 0 8px 8px 0;
  color: var(--text-muted);
}
.preview-rendered a { color: var(--accent); text-decoration: none; }
.preview-rendered a:hover { text-decoration: underline; }
.preview-rendered ul, .preview-rendered ol { margin: 6px 0; padding-left: 24px; }
.preview-rendered li { margin: 3px 0; }
.preview-rendered table { border-collapse: collapse; margin: 10px 0; width: 100%; }
.preview-rendered th, .preview-rendered td {
  border: 1px solid var(--border); padding: 8px 12px; text-align: left;
}
.preview-rendered th { background: var(--surface2); font-weight: 600; }
.preview-rendered hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.preview-rendered .spoiler {
  background: var(--text-muted); color: transparent; padding: 2px 4px;
  border-radius: 4px; cursor: pointer; transition: all 0.3s; user-select: none;
}
.preview-rendered .spoiler.revealed { background: transparent; color: var(--text); }
.preview-rendered .highlight { background: rgba(51,180,201,0.25); padding: 1px 3px; border-radius: 3px; }
.preview-rendered .math { font-family: 'Times New Roman', serif; font-style: italic; color: var(--accent); }
.preview-rendered .math-block { text-align: center; margin: 12px 0; font-size: 1.1em; }
.preview-rendered img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
.preview-rendered .task-item { list-style: none; margin-left: -20px; }
.preview-rendered .task-item input { margin-right: 6px; accent-color: var(--accent); }
.preview-rendered details { margin: 8px 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
.preview-rendered details summary { padding: 8px 14px; background: var(--surface2); cursor: pointer; font-weight: 600; }
.preview-rendered details[open] summary { border-bottom: 1px solid var(--border); }
.preview-rendered details > div { padding: 12px 14px; }
.preview-rendered .tg-map, .preview-rendered .tg-map-preview {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; text-align: center; color: var(--text-muted); margin: 10px 0;
}
.preview-rendered .pull-quote {
  border-left: 4px solid var(--accent); padding: 12px 16px; margin: 12px 0;
  background: rgba(51,180,201,0.06); border-radius: 0 8px 8px 0;
  font-style: italic; color: var(--text-muted);
}
.preview-rendered .pull-quote cite { display: block; font-size: 0.85em; font-style: normal; color: var(--accent); margin-top: 6px; font-weight: 600; }
.preview-rendered cite { font-style: normal; color: var(--accent); font-size: 0.9em; }
.preview-rendered .tg-footer { font-size: 0.8em; color: var(--text-muted); border-top: 1px solid var(--border); padding-top: 8px; margin-top: 12px; }
.preview-rendered .tg-figure { margin: 12px 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--surface); }
.preview-rendered .tg-figure img, .preview-rendered .tg-figure video { display: block; max-width: 100%; }
.preview-rendered .tg-figcaption { padding: 8px 12px; font-size: 0.85em; color: var(--text-muted); border-top: 1px solid var(--border); }
.preview-rendered .tg-figcaption cite { display: inline; }
.preview-rendered figure { margin: 12px 0; border: 1px solid var(--border); border-radius: 8px; overflow: hidden; background: var(--surface); }
.preview-rendered figure img { display: block; max-width: 100%; }
.preview-rendered figcaption { padding: 8px 12px; font-size: 0.85em; color: var(--text-muted); border-top: 1px solid var(--border); }
.preview-rendered .tg-collage { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 4px; margin: 12px 0; border-radius: 8px; overflow: hidden; }
.preview-rendered .tg-collage img { width: 100%; display: block; }
.preview-rendered .tg-slideshow { display: flex; gap: 8px; overflow-x: auto; padding: 8px 0; scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; margin: 12px 0; }
.preview-rendered .tg-slideshow img, .preview-rendered .tg-slideshow video { flex-shrink: 0; max-width: 240px; border-radius: 6px; scroll-snap-align: start; }
.preview-rendered .tg-time { font-family: monospace; font-size: 0.9em; color: var(--accent); background: rgba(51,180,201,0.1); padding: 2px 6px; border-radius: 4px; }
.preview-rendered .tg-reference { font-size: 0.85em; color: var(--accent); vertical-align: super; cursor: help; }
.preview-rendered .tg-anchor { scroll-margin-top: 20px; }
.preview-rendered .tg-emoji { font-size: 1.2em; }
.preview-rendered mark { background: rgba(255,170,68,0.25); padding: 1px 3px; border-radius: 3px; color: var(--text); }
.preview-rendered sup { vertical-align: super; font-size: 0.75em; }
.preview-rendered sub { vertical-align: sub; font-size: 0.75em; }
.preview-rendered aside { border-left: 4px solid var(--accent); padding: 12px 16px; margin: 12px 0; background: rgba(51,180,201,0.06); border-radius: 0 8px 8px 0; }
.preview-rendered aside cite { display: block; font-size: 0.85em; color: var(--accent); margin-bottom: 4px; font-weight: 600; }

/* ===== FLOATING TOOLBAR (positioned near bottom, floating) ===== */
.floating-toolbar {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 6px 8px;
  background: var(--surface);
  border-radius: 24px;
  box-shadow: 0 4px 20px rgba(0,0,0,0.5);
  z-index: 50;
}
.tb-btn {
  width: 42px; height: 42px;
  min-width: 42px;
  border-radius: 50%;
  background: var(--surface);
  border: none;
  color: #999;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  position: relative;
  font-size: 13px;
  font-weight: 600;
}
.tb-btn:hover { background: #3a3a3a; color: #ccc; }
.tb-btn.active {
  background: var(--accent);
  color: white;
}
.tb-btn svg { width: 20px; height: 20px; fill: currentColor; }
.tb-btn .tb-label { font-size: 12px; font-weight: 700; }

/* Premium star badge */
.premium-star {
  position: absolute;
  bottom: -1px;
  right: -1px;
  width: 14px;
  height: 14px;
  background: var(--premium);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  color: white;
  font-weight: 700;
  border: 1.5px solid var(--surface);
  cursor: help;
}

/* Send button — larger teal circle */
.tb-send {
  width: 52px; height: 52px;
  min-width: 52px;
  border-radius: 50%;
  background: var(--accent);
  border: none;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  position: relative;
  box-shadow: 0 2px 12px rgba(51,180,201,0.3);
}
.tb-send:hover { background: var(--accent-hover); transform: scale(1.05); }
.tb-send svg { width: 22px; height: 22px; fill: white; }

/* Padlock icon on send button */
.send-lock {
  position: absolute;
  top: -3px;
  right: -3px;
  width: 16px;
  height: 16px;
  background: var(--surface);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 9px;
  border: 1.5px solid #1a1a1a;
  color: #999;
}

/* Tooltip on hover */
.tb-btn[title]:hover::after {
  content: attr(title);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  color: var(--text);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 100;
  font-weight: 500;
}

/* ===== BOTTOM CONTENT TYPE MENU ===== */
.content-types {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  display: flex;
  justify-content: space-around;
  padding: 8px 0 12px;
  background: var(--bg);
  z-index: 50;
}
.content-type-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
  padding: 4px 8px;
  border-radius: 10px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  position: relative;
}
.content-type-btn:hover { color: var(--text); }
.content-type-btn.active { color: var(--accent); }
.content-type-btn svg { width: 22px; height: 22px; fill: currentColor; }
.content-type-btn span {
  font-size: 11px;
  font-weight: 500;
  white-space: nowrap;
}

/* ===== HEADING DROPDOWN ===== */
.heading-dropdown {
  display: none;
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 4px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.5);
  z-index: 200;
}
.heading-dropdown.show { display: block; }
.heading-dropdown button {
  display: block;
  width: 100%;
  padding: 8px 16px;
  border: none;
  background: none;
  color: var(--text);
  cursor: pointer;
  border-radius: 6px;
  font-size: 13px;
  text-align: left;
}
.heading-dropdown button:hover { background: var(--surface2); }

/* ===== SETTINGS PANEL ===== */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  display: none;
  align-items: stretch;
  justify-content: flex-end;
  backdrop-filter: blur(4px);
}
.settings-overlay.open { display: flex; animation: fadeIn 0.2s; }
.settings-panel {
  background: var(--surface);
  width: 380px;
  max-width: 90vw;
  padding: 24px;
  box-shadow: -8px 0 32px rgba(0,0,0,0.4);
  animation: slideInRight 0.3s ease;
  overflow-y: auto;
}
@keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
.settings-panel h2 {
  font-size: 18px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.settings-panel h2 svg { width: 20px; height: 20px; fill: var(--accent); }
.settings-free-note {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  margin-top: -16px;
  margin-bottom: 20px;
}
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.field input, .field select {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field select { cursor: pointer; }
.field input[type="password"] { font-family: monospace; letter-spacing: 2px; }
.settings-actions { display: flex; gap: 10px; margin-top: 24px; }
.settings-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border) !important; }
.btn-secondary:hover { color: var(--text); border-color: var(--accent) !important; }

/* ===== TOAST ===== */
.toast-container {
  position: fixed;
  bottom: 100px;
  right: 16px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 20px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  display: flex;
  align-items: center;
  gap: 8px;
  max-width: 360px;
}
.toast svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
.toast.success { background: #0d3320; color: var(--success); border: 1px solid rgba(68,255,170,0.3); }
.toast.error { background: #330d15; color: var(--danger); border: 1px solid rgba(255,68,102,0.3); }
.toast.info { background: var(--surface); color: var(--accent); border: 1px solid var(--border); }
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { to { transform: translateX(100%); opacity: 0; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

/* ===== CHAR COUNTER (hidden, functional only) ===== */
.char-counter {
  position: fixed;
  bottom: 62px;
  right: 16px;
  font-size: 10px;
  color: var(--text-dim);
  z-index: 49;
  font-variant-numeric: tabular-nums;
}
.char-counter.warn { color: var(--warn); }
.char-counter.danger { color: var(--danger); }

/* ===== MOBILE RESPONSIVE ===== */
@media (max-width: 768px) {
  .floating-toolbar {
    gap: 4px;
    padding: 5px 6px;
    bottom: 72px;
  }
  .tb-btn { width: 38px; height: 38px; min-width: 38px; }
  .tb-send { width: 46px; height: 46px; min-width: 46px; }
  .content-type-btn span { font-size: 10px; }
  .content-type-btn svg { width: 20px; height: 20px; }
}
</style>
</head>
<body>

<!-- iOS Handle Bar -->
<div class="handle-bar"></div>

<!-- Undo/Redo Pill (top right) -->
<div class="undo-redo-pill">
  <button title="Undo" onclick="document.getElementById('editor').focus(); document.execCommand('undo');">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M12.5 8c-2.65 0-5.05.99-6.9 2.6L2 7v9h9l-3.62-3.62c1.39-1.16 3.16-1.88 5.12-1.88 3.54 0 6.55 2.31 7.6 5.5l2.37-.78C21.08 11.03 17.15 8 12.5 8z" fill="currentColor"/></svg>
  </button>
  <button title="Redo" onclick="document.getElementById('editor').focus(); document.execCommand('redo');">
    <svg width="20" height="20" viewBox="0 0 24 24"><path d="M18.4 10.6C16.55 8.99 14.15 8 11.5 8c-4.65 0-8.58 3.03-9.96 7.22L3.9 16c1.05-3.19 4.05-5.5 7.6-5.5 1.95 0 3.73.72 5.12 1.88L13 16h9V7l-3.6 3.6z" fill="currentColor"/></svg>
  </button>
</div>

<!-- Main Content Area -->
<div class="content-area" id="contentArea">
  <div class="content-title">Title</div>
  <div class="content-placeholder" id="contentPlaceholder">Type something...</div>
  <div class="preview-rendered" id="preview"></div>
  <textarea class="editor-textarea" id="editor" spellcheck="false" placeholder="Type something..."></textarea>
</div>

<!-- Floating Toolbar -->
<div class="floating-toolbar" id="floatingToolbar">
  <!-- Emoji/Smiley button -->
  <button class="tb-btn" title="Emoji picker (free!)" onclick="insertFormat('emoji')">
    <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z" fill="currentColor"/></svg>
  </button>

  <!-- AI button -->
  <button class="tb-btn" title="Free AI — no Cocoon subscription needed" onclick="insertFormat('ai')">
    <span class="tb-label">Ai</span>
    <span style="font-size:9px;margin-left:1px;">✨</span>
  </button>

  <!-- H1 Heading (ACTIVE — highlighted teal) -->
  <button class="tb-btn active" title="Heading" id="headingDropBtn" onclick="toggleHeadingDropdown()">
    <span class="tb-label">H1</span>
  </button>

  <!-- List (with premium star) -->
  <button class="tb-btn" title="Lists — FREE! (Premium in Telegram. Free here.)" onclick="insertFormat('ul')">
    <svg viewBox="0 0 24 24"><path d="M4 10.5c-.83 0-1.5.67-1.5 1.5s.67 1.5 1.5 1.5 1.5-.67 1.5-1.5-.67-1.5-1.5-1.5zm0-6c-.83 0-1.5.67-1.5 1.5S3.17 7.5 4 7.5 5.5 6.83 5.5 6 4.83 4.5 4 4.5zm0 12c-.83 0-1.5.68-1.5 1.5s.68 1.5 1.5 1.5 1.5-.68 1.5-1.5-.67-1.5-1.5-1.5zM7 19h14v-2H7v2zm0-6h14v-2H7v2zm0-8v2h14V5H7z" fill="currentColor"/></svg>
    <span class="premium-star" title="Premium in Telegram. Free here.">★</span>

<script>
(function() {
'use strict';

// ===== STATE =====
var currentMode = 'markdown';
var editor = document.getElementById('editor');
var preview = document.getElementById('preview');
var charCounter = document.getElementById('charCounter');
var contentPlaceholder = document.getElementById('contentPlaceholder');
var MAX_CHARS = 32768;

// ===== LOAD SAVED SETTINGS =====
function loadSettings() {
  var token = localStorage.getItem('tg_bot_token') || '';
  var chatId = localStorage.getItem('tg_chat_id') || '';
  document.getElementById('botToken').value = token;
  document.getElementById('chatId').value = chatId;
}
loadSettings();

// ===== PLACEHOLDER VISIBILITY =====
function updatePlaceholder() {
  contentPlaceholder.style.display = editor.value.length > 0 ? 'none' : 'block';
}

// ===== HEADING DROPDOWN =====
window.toggleHeadingDropdown = function() {
  var dd = document.getElementById('headingDropdown');
  var btn = document.getElementById('headingDropBtn');
  if (dd.classList.contains('show')) {
    dd.classList.remove('show');
    return;
  }
  var rect = btn.getBoundingClientRect();
  dd.style.left = rect.left + 'px';
  dd.style.bottom = (window.innerHeight - rect.top + 8) + 'px';
  dd.classList.add('show');
};
window.closeHeadingDropdown = function() {
  document.getElementById('headingDropdown').classList.remove('show');
};

// ===== ARTICLE TOAST =====
window.showArticleToast = function() {
  showToast('All features free. No Premium required.', 'info');
};

// ===== CHARACTER COUNTER =====
function updateCharCounter() {
  var len = editor.value.length;
  charCounter.textContent = len.toLocaleString() + ' / ' + MAX_CHARS.toLocaleString();
  charCounter.className = 'char-counter' + (len > MAX_CHARS ? ' danger' : len > MAX_CHARS * 0.9 ? ' warn' : '');
}

// ===== ESCAPE HTML =====
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== MARKDOWN PARSER =====
function parseMarkdown(text) {
  if (!text.trim()) return '<div class="tg-bubble"><p style="color: var(--text-muted); font-style: italic;"></p></div>';
  
  var html = '';
  var lines = text.split('\n');
  var i = 0;
  var inCodeBlock = false;
  var codeContent = '';
  var codeLang = '';
  var inTable = false;
  var tableRows = [];
  var inBlockquote = false;
  var blockquoteContent = '';
  var inList = false;
  var listType = '';
  var listItems = [];
  
  function flushBlockquote() {
    if (inBlockquote && blockquoteContent) {
      html += '<blockquote>' + parseInline(blockquoteContent.trim()) + '</blockquote>\n';
      blockquoteContent = '';
      inBlockquote = false;
    }
  }
  
  function flushList() {
    if (inList && listItems.length) {
      var tag = listType === 'ol' ? 'ol' : 'ul';
      html += '<' + tag + '>\n';
      listItems.forEach(function(item) {
        if (item.startsWith('[ ] ') || item.startsWith('[x] ') || item.startsWith('[X] ')) {
          var checked = item[1] === 'x' || item[1] === 'X';
          html += '<li class="task-item"><input type="checkbox"' + (checked ? ' checked' : '') + ' disabled> ' + parseInline(item.slice(4)) + '</li>\n';
        } else {
          html += '<li>' + parseInline(item) + '</li>\n';
        }
      });
      html += '</' + tag + '>\n';
      listItems = [];
      inList = false;
    }
  }
  
  function flushTable() {
    if (inTable && tableRows.length) {
      html += '<table>\n';
      tableRows.forEach(function(row, ri) {
        var tag = ri === 0 ? 'th' : 'td';
        if (ri === 1 && tableRows.length > 1) html += '<tbody>\n';
        if (ri === 0) html += '<thead>\n';
        var cells = row.split('|').map(function(c) { return c.trim(); }).filter(function(c) { return c; });
        if (ri === 1 && cells.every(function(c) { return /^[-:]+$/.test(c); })) return;
        html += '<tr>';
        cells.forEach(function(c) { html += '<' + tag + '>' + parseInline(c) + '</' + tag + '>'; });
        html += '</tr>\n';
        if (ri === 0 && tableRows.length > 1) html += '</thead>\n';
      });
      if (tableRows.length > 1) html += '</tbody>\n';
      html += '</table>\n';
      tableRows = [];
      inTable = false;
    }
  }
  
  while (i < lines.length) {
    var line = lines[i];
    
    if (line.trimStart().startsWith('```')) {
      flushBlockquote(); flushList(); flushTable();
      if (inCodeBlock) {
        html += '<pre><code' + (codeLang ? ' class="language-' + escHtml(codeLang) + '"' : '') + '>' + escHtml(codeContent) + '</code></pre>\n';
        inCodeBlock = false; codeContent = ''; codeLang = '';
      } else {
        flushList();
        inCodeBlock = true;
        codeLang = line.trimStart().slice(3).trim();
      }
      i++; continue;
    }
    
    if (inCodeBlock) {
      codeContent += (codeContent ? '\n' : '') + line;
      i++; continue;
    }
    
    if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
      flushBlockquote(); flushList();
      if (!inTable) inTable = true;
      tableRows.push(line.trim());
      i++; continue;
    } else {
      flushTable();
    }
    
    if (line.startsWith('>')) {
      flushList();
      if (!inBlockquote) inBlockquote = true;
      blockquoteContent += line.slice(1).trim() + '\n';
      i++; continue;
    } else {
      flushBlockquote();
    }
    
    var ulMatch = line.match(/^(\s*)([-*+])\s+(.*)/);
    var olMatch = line.match(/^(\s*)(\d+)\.\s+(.*)/);
    if (ulMatch || olMatch) {
      flushBlockquote(); flushTable();
      var item = ulMatch ? ulMatch[3] : olMatch[3];
      var type = ulMatch ? 'ul' : 'ol';
      if (!inList || listType !== type) { flushList(); inList = true; listType = type; }
      listItems.push(item);
      i++; continue;
    } else {
      flushList();
    }
    
    if (/^[-*_]{3,}\s*$/.test(line.trim())) {
      flushBlockquote(); flushList(); flushTable();
      html += '<hr>\n';
      i++; continue;
    }
    
    var hMatch = line.match(/^(#{1,6})\s+(.*)/);
    if (hMatch) {
      flushBlockquote(); flushList(); flushTable();
      var level = hMatch[1].length;
      html += '<h' + level + '>' + parseInline(hMatch[2]) + '</h' + level + '>\n';
      i++; continue;
    }
    
    if (!line.trim()) {
      flushBlockquote(); flushList(); flushTable();
      i++; continue;
    }
    
    flushBlockquote(); flushList(); flushTable();
    html += '<p>' + parseInline(line) + '</p>\n';
    i++;
  }
  
  flushBlockquote(); flushList(); flushTable();
  if (inCodeBlock) {
    html += '<pre><code' + (codeLang ? ' class="language-' + escHtml(codeLang) + '"' : '') + '>' + escHtml(codeContent) + '</code></pre>\n';
  }
  
  return html ? '<div class="tg-bubble">' + html + '</div>' : '<div class="tg-bubble"><p style="color: var(--text-muted); font-style: italic;"></p></div>';
}

function parseInline(text) {
  text = escHtml(text);
  text = text.replace(/\$\$([\s\S]+?)\$\$/g, '<div class="math-block math">$1</div>');
  text = text.replace(/\$([^\$\n]+?)\$/g, '<span class="math">$1</span>');
  text = text.replace(/`([^`\n]+?)`/g, '<code>$1</code>');
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  text = text.replace(/\*\*([^\*]+?)\*\*/g, '<b>$1</b>');
  text = text.replace(/__([^_]+?)__/g, '<b>$1</b>');
  text = text.replace(/\*([^\*]+?)\*/g, '<i>$1</i>');
  text = text.replace(/_([^_]+?)_/g, '<i>$1</i>');
  text = text.replace(/~~([^~]+?)~~/g, '<s>$1</s>');
  text = text.replace(/\|\|([^|]+?)\|\|/g, '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
  text = text.replace(/==([^=]+?)==/g, '<span class="highlight">$1</span>');
  text = text.replace(/&lt;sup&gt;([\s\S]*?)&lt;\/sup&gt;/gi, '<sup>$1</sup>');
  text = text.replace(/&lt;sub&gt;([\s\S]*?)&lt;\/sub&gt;/gi, '<sub>$1</sub>');
  text = text.replace(/&lt;tg-map\s+lat=&quot;([^&]+)&quot;\s+long=&quot;([^&]+)&quot;(?:\s+zoom=&quot;([^&]+)&quot;)?\s*\/&gt;/gi,
    function(m, lat, lng, zoom) {
      return '<div class="tg-map">📍 Map: ' + lat + ', ' + lng + (zoom ? ' (zoom: ' + zoom + ')' : '') + '</div>';
    });
  text = text.replace(/&lt;aside&gt;([\s\S]*?)&lt;\/aside&gt;/gi, '<aside>$1</aside>');
  text = text.replace(/&lt;cite&gt;([\s\S]*?)&lt;\/cite&gt;/gi, '<cite>$1</cite>');
  return text;
}

// ===== HTML PARSER / SANITIZER =====
function parseHtmlContent(text) {
  if (!text.trim()) return '<div class="tg-bubble"><p style="color: var(--text-muted); font-style: italic;"></p></div>';
  
  var allowedTags = ['b','strong','i','em','u','ins','s','del','strike','code','pre','a',
    'blockquote','br','p','br/','tg-spoiler','tg-blockquote','tg-collage','tg-slideshow',
    'details','summary','tg-map','mark','sup','sub','h1','h2','h3','h4','h5','h6',
    'ul','ol','li','table','thead','tbody','tr','th','td','hr','div','span','img',
    'aside','cite','figure','figcaption','footer','tg-emoji','tg-time','tg-math',
    'tg-math-block','tg-reference','input','caption','video','audio','tg-thinking'];
  
  text = text.replace(/<span\s+class=["']tg-spoiler["']\s*>([\s\S]*?)<\/span>/gi,
    '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
  text = text.replace(/<tg-spoiler>([\s\S]*?)<\/tg-spoiler>/gi,
    '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
  text = text.replace(/<tg-blockquote[^>]*expandable[^>]*>([\s\S]*?)<\/tg-blockquote>/gi,
    '<details><summary>Quote</summary><blockquote>$1</blockquote></details>');
  text = text.replace(/<tg-blockquote[^>]*>([\s\S]*?)<\/tg-blockquote>/gi, '<blockquote>$1</blockquote>');
  text = text.replace(/<tg-map\s+lat=["']([^"']+)["']\s+long=["']([^"']+)["'](?:\s+zoom=["']([^"']+)["'])?\s*\/?>/gi,
    '<div class="tg-map">📍 Map: $1, $2</div>');
  text = text.replace(/<tg-emoji[^>]*>([\s\S]*?)<\/tg-emoji>/gi, '<span class="tg-emoji">$1</span>');
  text = text.replace(/<tg-time\s+unix=["'](\d+)["']\s+format=["']([^"']+)["'][^>]*>([\s\S]*?)<\/tg-time>/gi,
    function(m, unix, fmt, content) {
      try {
        var d = new Date(parseInt(unix) * 1000);
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var formatted = days[d.getUTCDay()] + ', ' + months[d.getUTCMonth()] + ' ' + d.getUTCDate() + ', ' + d.getUTCFullYear();
        return '<span class="tg-time" title="Unix: ' + unix + ' (' + fmt + ')">' + content + '</span>';
      } catch(e) { return '<span class="tg-time">' + content + '</span>'; }
    });
  text = text.replace(/<tg-math>([\s\S]*?)<\/tg-math>/gi, '<span class="math">$1</span>');
  text = text.replace(/<tg-math-block>([\s\S]*?)<\/tg-math-block>/gi, '<div class="math-block math">$1</div>');
  text = text.replace(/<tg-reference\s+name=["']([^"']+)["'][^>]*>([\s\S]*?)<\/tg-reference>/gi,
    '<sup class="tg-reference" title="$1">[$2]</sup>');
  text = text.replace(/<aside>([\s\S]*?)<\/aside>/gi, function(m, content) {
    var inner = content;
    var citeHtml = '';
    var citeMatch = inner.match(/<cite>([\s\S]*?)<\/cite>/i);
    if (citeMatch) {
      citeHtml = '<cite>' + citeMatch[1] + '</cite>';
      inner = inner.replace(citeMatch[0], '');
    }
    return '<div class="pull-quote">' + inner.trim() + citeHtml + '</div>';
  });
  text = text.replace(/<footer>([\s\S]*?)<\/footer>/gi, '<div class="tg-footer">$1</div>');
  text = text.replace(/<figure>([\s\S]*?)<\/figure>/gi, function(m, content) {
    var figcaption = '';
    var fcMatch = content.match(/<figcaption>([\s\S]*?)<\/figcaption>/i);
    if (fcMatch) figcaption = '<div class="tg-figcaption">' + fcMatch[1] + '</div>';
    var inner = content.replace(/<figcaption>[\s\S]*?<\/figcaption>/gi, '');
    return '<div class="tg-figure">' + inner.trim() + figcaption + '</div>';
  });
  text = text.replace(/<tg-collage>([\s\S]*?)<\/tg-collage>/gi, function(m, content) {
    var figcaption = '';
    var fcMatch = content.match(/<figcaption>([\s\S]*?)<\/figcaption>/i);
    if (fcMatch) figcaption = '<div class="tg-figcaption">' + fcMatch[1] + '</div>';
    var inner = content.replace(/<figcaption>[\s\S]*?<\/figcaption>/gi, '');
    return '<div class="tg-collage">' + inner.trim() + '</div>' + figcaption;
  });
  text = text.replace(/<tg-slideshow>([\s\S]*?)<\/tg-slideshow>/gi, function(m, content) {
    var figcaption = '';
    var fcMatch = content.match(/<figcaption>([\s\S]*?)<\/figcaption>/i);
    if (fcMatch) figcaption = '<div class="tg-figcaption">' + fcMatch[1] + '</div>';
    var inner = content.replace(/<figcaption>[\s\S]*?<\/figcaption>/gi, '');
    return '<div class="tg-slideshow">' + inner.trim() + '</div>' + figcaption;
  });
  text = text.replace(/<a\s+name=["']([^"']+)["']\s*><\/a>/gi,
    '<span class="tg-anchor" id="$1"></span>');
  text = text.replace(/<\/?([a-z][a-z0-9-]*)\b[^>]*>/gi, function(match, tag) {
    tag = tag.toLowerCase();
    if (allowedTags.includes(tag) || tag.startsWith('tg-')) return match;
    return '';
  });
  text = text.replace(/<tg-spoiler>/gi, '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">');
  text = text.replace(/<\/tg-spoiler>/gi, '</span>');
  return '<div class="tg-bubble">' + text + '</div>';
}

// ===== PREVIEW UPDATE =====
window.updatePreview = function() {
  updateCharCounter();
  updatePlaceholder();
  var text = editor.value;
  if (currentMode === 'markdown') {
    preview.innerHTML = parseMarkdown(text);
  } else {
    preview.innerHTML = parseHtmlContent(text);
  }
};

// ===== FORMAT INSERTION =====
window.insertFormat = function(type) {
  closeHeadingDropdown();
  
  if (type === 'ai') {
    showToast('Free AI — no Cocoon subscription needed!', 'info');
    return;
  }
  
  if (type === 'emoji') {
    showToast('Emoji picker coming soon — for FREE, obviously.', 'info');

// ===== COPY TO CLIPBOARD =====
window.copyToClipboard = function() {
  var text = editor.value;
  if (!text) { showToast('Nothing to copy', 'info'); return; }
  navigator.clipboard.writeText(text).then(function() {
    showToast('Copied to clipboard! (Premium feature, free for you)', 'success');
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard!', 'success');
  });
};

// ===== SEND TO TELEGRAM =====
window.sendToTelegram = async function() {
  var token = localStorage.getItem('tg_bot_token');
  var chatId = localStorage.getItem('tg_chat_id');
  
  if (!token || !chatId) {
    showToast('Please configure Bot Token and Chat ID in Settings first', 'error');
    openSettings();
    return;
  }
  
  var text = editor.value;
  if (!text.trim()) {
    showToast('Nothing to send — editor is empty', 'error');
    return;
  }
  
  if (text.length > MAX_CHARS) {
    showToast('Message exceeds ' + MAX_CHARS + ' character limit (' + text.length + ' chars)', 'error');
    return;
  }
  
  var parseMode = document.getElementById('parseMode').value;
  var baseUrl = 'https://api.telegram.org/bot' + token;
  
  try {
    var richBody = { chat_id: chatId, rich_message: {} };
    if (parseMode === 'MarkdownV2') {
      richBody.rich_message.markdown = text;
    } else {
      richBody.rich_message.html = text;
    }
    
    var res = await fetch(baseUrl + '/sendRichMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(richBody)
    });
    
    var data = await res.json();
    
    if (data.ok) {
      showToast('Message sent successfully! (Free, obviously) ✓', 'success');
      return;
    }
    
    if (data.description && (data.description.includes('method not found') || data.description.includes('not found'))) {
      throw new Error('fallback');
    }
    
    showToast('Error: ' + (data.description || 'Unknown error'), 'error');
    return;
  } catch (e) {
    if (e.message === 'fallback' || e instanceof TypeError) {
      try {
        var fallbackBody = {
          chat_id: chatId,
          text: text,
          parse_mode: parseMode
        };
        
        var res2 = await fetch(baseUrl + '/sendMessage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fallbackBody)
        });
        
        var data2 = await res2.json();
        if (data2.ok) {
          showToast('Message sent via sendMessage fallback! (Still free) ✓', 'success');
        } else {
          showToast('Error: ' + (data2.description || 'Failed to send'), 'error');
        }
      } catch (e2) {
        showToast('Network error: ' + e2.message, 'error');
      }
    } else {
      showToast('Error: ' + e.message, 'error');
    }
  }
};

// ===== TOAST NOTIFICATIONS =====
function showToast(message, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  
  var icon = '';
  if (type === 'success') icon = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
  else if (type === 'error') icon = '<svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>';
  else icon = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>';
  
  toast.innerHTML = icon + '<span>' + escHtml(message) + '</span>';
  container.appendChild(toast);
  setTimeout(function() { if (toast.parentNode) toast.remove(); }, 3200);
}
window.showToast = showToast;
