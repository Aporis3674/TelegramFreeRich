<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TelegramFreeRich</title>
<meta name="description" content="Free Rich Text Editor for Telegram — Because bots should not have more rights than humans">
<meta name="theme-color" content="#0d0d12">
<link rel="manifest" href="manifest.json">
<style>
/* ===== CSS VARIABLES ===== */
:root {
  /* Dark theme (default) */
  --bg: #0d0d12;
  --bg-secondary: #111118;
  --surface: #16161e;
  --surface2: #1e1e2a;
  --surface3: #262636;
  --border: #2a2a3e;
  --border-light: #333348;
  --text: #f0f0f5;
  --text-secondary: #8888a0;
  --text-muted: #555566;
  --accent: #33b4c9;
  --accent-hover: #3cc4d9;
  --accent2: #7c5cff;
  --accent2-hover: #9b7eff;
  --danger: #ff4466;
  --danger-hover: #ff6688;
  --success: #44cc88;
  --warning: #ffaa33;
  --shadow: 0 2px 12px rgba(0,0,0,0.4);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.6);
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 16px;
  --radius-full: 9999px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'Fira Code', 'JetBrains Mono', 'Cascadia Code', Consolas, monospace;
  --font-size: 16px;
  --font-size-sm: 14px;
  --font-size-xs: 12px;
  --line-height: 1.6;
  --toolbar-height: 52px;
  --header-height: 56px;
  --transition: 0.2s ease;
}

[data-theme="light"] {
  --bg: #f5f5f7;
  --bg-secondary: #ffffff;
  --surface: #ffffff;
  --surface2: #f0f0f2;
  --surface3: #e5e5ea;
  --border: #d1d1d6;
  --border-light: #c7c7cc;
  --text: #1c1c1e;
  --text-secondary: #636366;
  --text-muted: #aeaeb2;
  --shadow: 0 2px 12px rgba(0,0,0,0.08);
  --shadow-lg: 0 8px 32px rgba(0,0,0,0.12);
}

/* ===== RESET ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: var(--font-size); -webkit-text-size-adjust: 100%; }
body {
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  line-height: var(--line-height);
  overflow: hidden;
  height: 100vh;
  height: 100dvh;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== APP LAYOUT ===== */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
  height: 100dvh;
}

/* ===== HEADER ===== */
.header {
  height: var(--header-height);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  background: var(--bg-secondary);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
  z-index: 100;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-logo {
  width: 32px;
  height: 32px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex;
  align-items: center;
  justify-content: center;
}
.header-logo svg { width: 18px; height: 18px; fill: white; }
.header-title {
  font-size: 16px;
  font-weight: 600;
  letter-spacing: -0.01em;
}
.header-subtitle {
  font-size: var(--font-size-xs);
  color: var(--text-muted);
  display: none;
}
@media (min-width: 768px) {
  .header-subtitle { display: block; }
}
.header-right {
  display: flex;
  align-items: center;
  gap: 8px;
}
.header-btn {
  width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all var(--transition);
}
.header-btn:hover {
  background: var(--surface2);
  color: var(--text);
}
.header-btn svg { width: 20px; height: 20px; }
.char-counter {
  font-size: var(--font-size-xs);
  color: var(--text-muted);
  font-variant-numeric: tabular-nums;
  padding: 0 8px;
}
.char-counter.warning { color: var(--warning); }
.char-counter.danger { color: var(--danger); }

/* ===== MAIN CONTENT ===== */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}

/* ===== EDITOR PANE ===== */
.editor-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  min-width: 0;
  position: relative;
}
.editor-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  scroll-behavior: smooth;
}
.editor-area {
  max-width: 720px;
  margin: 0 auto;
  min-height: calc(100vh - var(--header-height) - var(--toolbar-height) - 120px);
  outline: none;
  font-size: var(--font-size);
  line-height: var(--line-height);
  color: var(--text);
  word-wrap: break-word;
  overflow-wrap: break-word;
}
.editor-area:empty::before {
  content: attr(data-placeholder);
  color: var(--text-muted);
  pointer-events: none;
}

/* ===== EDITOR ELEMENT STYLES ===== */
.editor-area h1 { font-size: 28px; font-weight: 700; margin: 24px 0 12px; line-height: 1.3; }
.editor-area h2 { font-size: 24px; font-weight: 600; margin: 20px 0 10px; line-height: 1.3; }
.editor-area h3 { font-size: 20px; font-weight: 600; margin: 16px 0 8px; line-height: 1.4; }
.editor-area h4 { font-size: 18px; font-weight: 600; margin: 14px 0 6px; line-height: 1.4; }
.editor-area h5 { font-size: 16px; font-weight: 600; margin: 12px 0 6px; line-height: 1.5; }
.editor-area h6 { font-size: 14px; font-weight: 600; margin: 10px 0 4px; line-height: 1.5; }
.editor-area p { margin: 8px 0; }
.editor-area blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 16px;
  margin: 12px 0;
  color: var(--text-secondary);
  background: var(--surface);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}
.editor-area blockquote.pull-quote {
  border-left-color: var(--accent2);
  font-style: italic;
  font-size: 18px;
  padding: 16px 20px;
}
.editor-area pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin: 12px 0;
  overflow-x: auto;
  font-family: var(--font-mono);
  font-size: 14px;
  line-height: 1.5;
}
.editor-area code {
  font-family: var(--font-mono);
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 4px;
  font-size: 0.9em;
}
.editor-area pre code {
  background: none;
  padding: 0;
  border-radius: 0;
}
.editor-area hr {
  border: none;
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}
.editor-area a { color: var(--accent); text-decoration: none; }
.editor-area a:hover { text-decoration: underline; }
.editor-area ul, .editor-area ol { padding-left: 24px; margin: 8px 0; }
.editor-area li { margin: 4px 0; }
.editor-area img {
  max-width: 100%;
  border-radius: var(--radius-sm);
  margin: 8px 0;
}
.editor-area video {
  max-width: 100%;
  border-radius: var(--radius-sm);
  margin: 8px 0;
}
.editor-area audio { margin: 8px 0; width: 100%; }
.editor-area table {
  border-collapse: collapse;
  width: 100%;
  margin: 12px 0;
}
.editor-area th, .editor-area td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
}
.editor-area th { background: var(--surface2); font-weight: 600; }
.editor-area caption {
  caption-side: top;
  text-align: left;
  font-size: 13px;
  color: var(--text-secondary);
  padding: 4px 0;
  font-weight: 500;
}
.editor-area footer {
  border-top: 1px solid var(--border);
  margin-top: 24px;
  padding-top: 12px;
  font-size: 13px;
  color: var(--text-muted);
  text-align: center;
}
.editor-area details {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin: 12px 0;
  padding: 12px 16px;
}
.editor-area summary {
  cursor: pointer;
  font-weight: 500;
  color: var(--accent);
}
.editor-area .tg-spoiler {
  background: var(--text);
  color: transparent;
  border-radius: 4px;
  padding: 0 4px;
  cursor: pointer;
  transition: all 0.3s;
  user-select: none;
}
.editor-area .tg-spoiler.revealed {
  background: var(--surface2);
  color: var(--text);
}
.editor-area .tg-math {
  font-family: var(--font-mono);
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 4px;
  color: var(--accent2);
}
.editor-area .tg-math-block {
  font-family: var(--font-mono);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 16px;
  margin: 12px 0;
  text-align: center;
  color: var(--accent2);
  font-size: 18px;
}
.editor-area .tg-map {
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  overflow: hidden;
  margin: 12px 0;
}
.editor-area .tg-map iframe {
  width: 100%;
  height: 200px;
  border: none;
}
.editor-area .tg-collage {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
  gap: 4px;
  margin: 12px 0;
  border-radius: var(--radius-sm);
  overflow: hidden;
}
.editor-area .tg-collage img {
  width: 100%;
  height: 150px;
  object-fit: cover;
  border-radius: 0;
  margin: 0;
}
.editor-area .tg-slideshow-wrap {
  position: relative;
  margin: 12px 0;
  border-radius: var(--radius-sm);
  overflow: hidden;
  background: var(--surface);
}
.editor-area .tg-slideshow-track {
  display: flex;
  transition: transform 0.3s ease;
}
.editor-area .tg-slideshow-slide {
  min-width: 100%;
  display: flex;
  align-items: center;
  justify-content: center;
}
.editor-area .tg-slideshow-slide img,
.editor-area .tg-slideshow-slide video {
  width: 100%;
  max-height: 300px;
  object-fit: contain;
  border-radius: 0;
  margin: 0;
}
.editor-area .tg-slideshow-prev,
.editor-area .tg-slideshow-next {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(0,0,0,0.5);
  color: #fff;
  border: none;
  width: 36px;
  height: 36px;
  border-radius: 50%;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 2;
  transition: background 0.2s;
}
.editor-area .tg-slideshow-prev:hover,
.editor-area .tg-slideshow-next:hover { background: rgba(0,0,0,0.8); }
.editor-area .tg-slideshow-prev { left: 8px; }
.editor-area .tg-slideshow-next { right: 8px; }
.editor-area .tg-slideshow-dots {
  display: flex;
  justify-content: center;
  gap: 6px;
  padding: 8px 0;
}
.editor-area .tg-slideshow-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: var(--text-muted);
  cursor: pointer;
  transition: background 0.2s;
}
.editor-area .tg-slideshow-dot.active { background: var(--accent); }
.editor-area .tg-figcaption {
  font-size: 13px;
  color: var(--text-secondary);
  text-align: center;
  margin-top: 6px;
  font-style: italic;
}
.editor-area .tg-spoiler-media {
  position: relative;
  display: inline-block;
  filter: blur(10px);
  cursor: pointer;
  border-radius: var(--radius-sm);
  overflow: hidden;
  transition: filter 0.3s;
}
.editor-area .tg-spoiler-media:hover,
.editor-area .tg-spoiler-media.revealed { filter: none; }
.editor-area .tg-spoiler-media img { border-radius: 0; margin: 0; }
.editor-area .tg-mention { color: var(--accent); text-decoration: none; font-weight: 500; }
.editor-area .tg-custom-emoji { font-size: 1.2em; }
.editor-area .tg-time { color: var(--text-secondary); font-size: 0.9em; font-style: italic; }
.editor-area .tg-anchor { color: var(--accent2); font-size: 0.85em; text-decoration: none; }
.editor-area .checklist { list-style: none; padding-left: 0; }
.editor-area .checklist li { display: flex; align-items: center; gap: 8px; }
.editor-area .checklist input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); }
.editor-area .footnotes {
  border-top: 1px solid var(--border);
  margin-top: 24px;
  padding-top: 12px;
  font-size: 13px;
  color: var(--text-secondary);
}
.editor-area .footnote-item { margin: 4px 0; }
.editor-area .footnote-ref {
  color: var(--accent);
  cursor: pointer;
  font-size: 0.8em;
  vertical-align: super;
}

/* ===== TOOLBAR ===== */
.toolbar {
  height: var(--toolbar-height);
  display: flex;
  align-items: center;
  gap: 2px;
  padding: 0 12px;
  background: var(--bg-secondary);
  border-top: 1px solid var(--border);
  overflow-x: auto;
  overflow-y: hidden;
  flex-shrink: 0;
  scrollbar-width: none;
  -ms-overflow-style: none;
}
.toolbar::-webkit-scrollbar { display: none; }
.tb-btn {
  min-width: 36px;
  height: 36px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text-secondary);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 14px;
  font-weight: 600;
  transition: all var(--transition);
  flex-shrink: 0;
  padding: 0 8px;
}
.tb-btn:hover {
  background: var(--surface2);
  color: var(--text);
}
.tb-btn.active {
  background: var(--accent);
  color: white;
}
.tb-btn svg { width: 18px; height: 18px; }
.tb-btn.danger:hover { background: var(--danger); color: white; }
.tb-divider {
  width: 1px;
  height: 24px;
  background: var(--border);
  margin: 0 4px;
  flex-shrink: 0;
}
.tb-group {
  display: flex;
  align-items: center;
  gap: 2px;
}

/* ===== PLUS BUTTON ===== */
.plus-btn {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 20px;
  font-weight: 300;
  transition: all var(--transition);
  flex-shrink: 0;
  margin-right: 4px;
}
.plus-btn:hover { background: var(--accent-hover); transform: scale(1.05); }
.plus-btn svg { width: 20px; height: 20px; }

/* ===== SEND BUTTON ===== */
.send-btn {
  height: 36px;
  padding: 0 16px;
  border-radius: var(--radius-full);
  border: none;
  background: var(--accent);
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 13px;
  font-weight: 600;
  transition: all var(--transition);
  flex-shrink: 0;
  margin-left: auto;
}
.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.send-btn svg { width: 16px; height: 16px; }

/* ===== PREVIEW PANE ===== */
.preview-pane {
  width: 40%;
  border-left: 1px solid var(--border);
  background: var(--bg-secondary);
  display: flex;
  flex-direction: column;
  overflow: hidden;
}
.preview-header {
  height: 44px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
  font-weight: 600;
  color: var(--text-secondary);
  flex-shrink: 0;
}
.preview-header-btns { display: flex; gap: 4px; }
.preview-scroll {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
}
.preview-bubble {
  background: var(--surface);
  border-radius: var(--radius) var(--radius) var(--radius) 4px;
  padding: 12px 16px;
  max-width: 100%;
  font-size: 15px;
  line-height: 1.5;
  word-wrap: break-word;
  white-space: pre-wrap;
}
.preview-bubble h1 { font-size: 24px; font-weight: 700; margin: 16px 0 8px; }
.preview-bubble h2 { font-size: 20px; font-weight: 600; margin: 14px 0 6px; }
.preview-bubble h3 { font-size: 17px; font-weight: 600; margin: 12px 0 4px; }
.preview-bubble blockquote {
  border-left: 3px solid var(--accent);
  padding: 4px 12px;
  color: var(--text-secondary);
  margin: 8px 0;
}
.preview-bubble pre {
  background: var(--surface2);
  border-radius: var(--radius-sm);
  padding: 12px;
  font-family: var(--font-mono);
  font-size: 13px;
  overflow-x: auto;
  margin: 8px 0;
}
.preview-bubble code {
  font-family: var(--font-mono);
  background: var(--surface2);
  padding: 1px 4px;
  border-radius: 3px;
  font-size: 0.9em;
}
.preview-bubble pre code { background: none; padding: 0; }
.preview-bubble a { color: var(--accent); }
.preview-bubble img { max-width: 100%; border-radius: var(--radius-sm); }
.preview-bubble table { border-collapse: collapse; width: 100%; margin: 8px 0; }
.preview-bubble th, .preview-bubble td { border: 1px solid var(--border); padding: 6px 10px; }
.preview-bubble th { background: var(--surface2); }
.preview-empty {
  text-align: center;
  color: var(--text-muted);
  padding: 40px 20px;
  font-size: 14px;
}

/* ===== DROPDOWN MENUS ===== */
.dropdown-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 6px;
  z-index: 200;
  display: none;
  max-height: 400px;
  overflow-y: auto;
  min-width: 200px;
}
.dropdown-menu.open { display: block; }
.dropdown-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  border: none;
  background: transparent;
  color: var(--text);
  cursor: pointer;
  font-size: 14px;
  width: 100%;
  text-align: left;
  transition: background var(--transition);
}
.dropdown-item:hover { background: var(--surface2); }
.dropdown-item .item-icon {
  width: 24px;
  text-align: center;
  color: var(--text-secondary);
  font-weight: 600;
  font-size: 13px;
  flex-shrink: 0;
}
.dropdown-item .item-label { flex: 1; }
.dropdown-item .item-shortcut {
  font-size: 11px;
  color: var(--text-muted);
  font-family: var(--font-mono);
}
.dropdown-divider {
  height: 1px;
  background: var(--border);
  margin: 4px 8px;
}
.badge {
  font-size: 10px;
  padding: 1px 6px;
  border-radius: var(--radius-full);
  background: var(--accent2);
  color: white;
  font-weight: 600;
}

/* ===== TABLE GRID PICKER ===== */
.table-picker {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 12px;
  z-index: 200;
  display: none;
}
.table-picker.open { display: block; }
.table-picker-grid {
  display: grid;
  grid-template-columns: repeat(6, 24px);
  gap: 3px;
}
.table-picker-cell {
  width: 24px;
  height: 24px;
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  transition: all 0.1s;
}
.table-picker-cell.highlighted {
  background: var(--accent);
  border-color: var(--accent);
}
.table-picker-label {
  text-align: center;
  font-size: 12px;
  color: var(--text-secondary);
  margin-top: 8px;
}

/* ===== SETTINGS PANEL ===== */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 300;
  display: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.settings-overlay.open { display: block; opacity: 1; }
.settings-panel {
  position: fixed;
  top: 0;
  right: -400px;
  width: 380px;
  max-width: 90vw;
  height: 100vh;
  background: var(--bg-secondary);
  border-left: 1px solid var(--border);
  z-index: 301;
  display: flex;
  flex-direction: column;
  transition: right 0.3s ease;
}
.settings-panel.open { right: 0; }
.settings-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
}
.settings-header h3 { font-size: 16px; font-weight: 600; }
.settings-body {
  flex: 1;
  overflow-y: auto;
  padding: 20px;
}
.settings-field { margin-bottom: 20px; }
.settings-field label {
  display: block;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-secondary);
  margin-bottom: 6px;
}
.settings-field input,
.settings-field select {
  width: 100%;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  background: var(--surface);
  color: var(--text);
  font-size: 14px;
  font-family: var(--font);
  transition: border-color var(--transition);
}
.settings-field input:focus,
.settings-field select:focus {
  outline: none;
  border-color: var(--accent);
}
.settings-note {
  font-size: 12px;
  color: var(--text-muted);
  margin-top: 4px;
}
.settings-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
}
.save-btn {
  width: 100%;
  padding: 10px;
  border-radius: var(--radius-sm);
  border: none;
  background: var(--accent);
  color: white;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: background var(--transition);
}
.save-btn:hover { background: var(--accent-hover); }
.settings-fun {
  text-align: center;
  font-size: 12px;
  color: var(--text-muted);
  padding: 12px;
}
.send-method-group { margin-bottom: 20px; }
.send-method-group label {
  display: flex;
  align-items: flex-start;
  gap: 8px;
  padding: 10px 12px;
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  margin-bottom: 8px;
  cursor: pointer;
  transition: border-color var(--transition);
  font-size: 13px;
}
.send-method-group label:hover { border-color: var(--accent); }
.send-method-group input[type="radio"] { margin-top: 3px; accent-color: var(--accent); }
.send-method-group .method-title { font-weight: 600; display: block; }
.send-method-group .method-desc { color: var(--text-secondary); font-size: 12px; display: block; margin-top: 2px; }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%) translateY(20px);
  padding: 10px 20px;
  border-radius: var(--radius-full);
  font-size: 13px;
  font-weight: 500;
  z-index: 400;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  white-space: nowrap;
}
.toast.show {
  opacity: 1;
  transform: translateX(-50%) translateY(0);
}
.toast.success { background: var(--success); color: white; }
.toast.error { background: var(--danger); color: white; }
.toast.info { background: var(--accent); color: white; }

/* ===== SLASH MENU ===== */
.slash-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  box-shadow: var(--shadow-lg);
  padding: 6px;
  z-index: 200;
  display: none;
  max-height: 320px;
  overflow-y: auto;
  min-width: 240px;
}
.slash-menu.open { display: block; }
.slash-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  transition: background var(--transition);
}
.slash-item:hover, .slash-item.selected { background: var(--surface2); }
.slash-item-icon { width: 28px; height: 28px; border-radius: 6px; background: var(--surface2); display: flex; align-items: center; justify-content: center; font-size: 14px; flex-shrink: 0; }
.slash-item-text { flex: 1; }
.slash-item-name { font-size: 13px; font-weight: 500; }
.slash-item-desc { font-size: 11px; color: var(--text-muted); }

/* ===== RESPONSIVE ===== */
@media (max-width: 768px) {
  .preview-pane { display: none; }
  .main.mobile-preview .preview-pane {
    display: flex;
    position: fixed;
    inset: 0;
    top: var(--header-height);
    z-index: 50;
    width: 100%;
  }
  .main.mobile-preview .editor-pane { display: none; }
  .toolbar { padding: 0 8px; }
  .editor-scroll { padding: 16px; }
}
@media (min-width: 769px) and (max-width: 1024px) {
  .preview-pane { width: 50%; }
}

/* ===== ANIMATIONS ===== */
@keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
@keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
@keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
.animate-in { animation: fadeIn 0.2s ease; }
.animate-shake { animation: shake 0.3s ease; }
.animate-spin { animation: spin 1s linear infinite; }

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--border-light); }

/* ===== FOCUS MODE ===== */
body.focus-mode .header,
body.focus-mode .preview-pane { display: none; }
body.focus-mode .toolbar { opacity: 0; transition: opacity 0.3s; }
body.focus-mode .toolbar:hover { opacity: 1; }
body.focus-mode .editor-scroll { padding: 40px; }

/* ===== READONLY MODE ===== */
.editor-area[contenteditable="false"] { cursor: default; }
.editor-area[contenteditable="false"] * { cursor: default; }
</style>
</head>

      </div>
      <div style="height:4px;background:var(--surface2);border-radius:2px;overflow:hidden;">
        <div id="settingsCharFill" style="height:100%;background:var(--accent);border-radius:2px;transition:width 0.3s;width:0%"></div>
      </div>
    </div>
  </div>
  <div class="settings-footer">
    <button class="save-btn" onclick="saveSettings()">Save Settings</button>
    <div class="settings-fun">All features free. No Premium required.</div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script>
// ===== STATE =====
const state = {
  footnoteCount: 0,
  currentOutput: '',
  lastMessageId: null,
  sendMethod: 'sendMessage'
};

// ===== SERVICE WORKER =====
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  loadSettings();
  initEditor();
  initToolbar();
  initTablePicker();
  initThemeToggle();
  initKeyboardShortcuts();
  initDragDrop();
  initPreviewUpdate();
});

// ===== EDITOR INIT =====
function initEditor() {
  const editor = document.getElementById('editor');
  editor.addEventListener('input', () => {
    updateCharCount();
    updatePreview();
  });
  editor.addEventListener('click', (e) => {
    if (e.target.classList && e.target.classList.contains('tg-spoiler')) {
      e.target.classList.toggle('revealed');
    }
    if (e.target.type === 'checkbox') {
      e.target.checked = !e.target.checked;
    }
  });
  editor.addEventListener('keyup', updateBlockType);
  editor.addEventListener('mouseup', updateBlockType);
}

// ===== TOOLBAR =====
function initToolbar() {
  // execCommand buttons
  document.querySelectorAll('[data-cmd]').forEach(btn => {
    btn.addEventListener('click', () => {
      document.getElementById('editor').focus();
      document.execCommand(btn.dataset.cmd, false, null);
      updateCharCount();
      updatePreview();
    });
  });
  // Plus button
  document.getElementById('plusBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    closeAllMenus();
    const menu = document.getElementById('insertMenu');
    const rect = e.currentTarget.getBoundingClientRect();
    menu.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
    menu.style.left = rect.left + 'px';
    menu.classList.toggle('open');
  });
  // Block type button
  document.getElementById('blockTypeBtn').addEventListener('click', (e) => {
    e.stopPropagation();
    closeAllMenus();
    const dd = document.getElementById('blockDropdown');
    const rect = e.currentTarget.getBoundingClientRect();
    dd.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
    dd.style.left = rect.left + 'px';
    dd.classList.toggle('open');
  });
  // Settings
  document.getElementById('settingsBtn').addEventListener('click', toggleSettings);
  document.getElementById('settingsClose').addEventListener('click', toggleSettings);
  document.getElementById('settingsOverlay').addEventListener('click', toggleSettings);
  // Close menus on outside click
  document.addEventListener('click', (e) => {
    if (!e.target.closest('.dropdown-menu') && !e.target.closest('.table-picker') && !e.target.closest('.plus-btn') && !e.target.closest('#blockTypeBtn')) {
      closeAllMenus();
    }
  });
}

// ===== THEME =====
function initThemeToggle() {
  const saved = localStorage.getItem('tfr_theme') || 'dark';
  document.documentElement.setAttribute('data-theme', saved);
  document.getElementById('themeToggle').addEventListener('click', () => {
    const current = document.documentElement.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    document.documentElement.setAttribute('data-theme', next);
    localStorage.setItem('tfr_theme', next);
  });
}

// ===== FORMATTING =====
function insertInlineCode() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const text = range.toString() || 'code';
  const code = document.createElement('code');
  code.textContent = text;
  range.deleteContents();
  range.insertNode(code);
  range.selectNodeContents(code);
  sel.removeAllRanges();
  sel.addRange(range);
  updatePreview();
}

function insertSpoiler() {
  wrapSelection('span', 'tg-spoiler', 'spoiler');
}

function insertHighlight() {
  wrapSelection('mark', '', 'highlighted text');
}

function insertMath() {
  const formula = prompt('Inline formula (LaTeX):');
  if (!formula) return;
  const span = document.createElement('span');
  span.className = 'tg-math';
  span.textContent = formula;
  insertAtCursor(span);
  updatePreview();
}

function insertMathBlock() {
  closeAllMenus();
  const formula = prompt('Block formula (LaTeX):');
  if (!formula) return;
  const div = document.createElement('div');
  div.className = 'tg-math-block';
  div.textContent = formula;
  insertAtCursor(div);
  updatePreview();
}

function insertLink() {
  const sel = window.getSelection();
  const text = sel.toString() || 'link text';
  const url = prompt('URL:');
  if (!url) return;
  const a = document.createElement('a');
  a.href = url;
  a.textContent = text;
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.deleteContents();
    range.insertNode(a);
  } else {
    document.getElementById('editor').appendChild(a);
  }
  updatePreview();
}

function insertDivider() {
  closeAllMenus();
  insertAtCursor(document.createElement('hr'));
  updatePreview();
}

function insertCodeBlock() {
  closeAllMenus();
  const pre = document.createElement('pre');
  const code = document.createElement('code');
  code.textContent = '// your code here';
  pre.appendChild(code);
  insertAtCursor(pre);
  const range = document.createRange();
  range.selectNodeContents(code);
  const sel = window.getSelection();
  sel.removeAllRanges();
  sel.addRange(range);
  updatePreview();
}

function insertCollapsible() {
  closeAllMenus();
  const details = document.createElement('details');
  const summary = document.createElement('summary');
  summary.textContent = 'Click to expand';
  const content = document.createElement('div');
  content.style.paddingTop = '8px';
  content.textContent = 'Hidden content here...';
  details.appendChild(summary);
  details.appendChild(content);
  insertAtCursor(details);
  updatePreview();
}

function insertChecklist() {
  closeAllMenus();
  const ul = document.createElement('ul');
  ul.className = 'checklist';
  for (let i = 0; i < 3; i++) {
    const li = document.createElement('li');
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    li.appendChild(cb);
    li.appendChild(document.createTextNode(' Task ' + (i + 1)));
    ul.appendChild(li);
  }
  insertAtCursor(ul);
  updatePreview();
}

function insertMedia() {
  closeAllMenus();
  const type = prompt('Type (image/video/audio):', 'image');
  if (!type) return;
  const url = prompt('URL:');
  if (!url) return;
  if (type === 'image') {
    const img = document.createElement('img');
    img.src = url;
    img.alt = 'image';
    insertAtCursor(img);
  } else if (type === 'video') {
    const video = document.createElement('video');
    video.src = url;
    video.controls = true;
    insertAtCursor(video);
  } else {
    const audio = document.createElement('audio');
    audio.src = url;
    audio.controls = true;
    insertAtCursor(audio);
  }
  updatePreview();
}

function insertSpoilerMedia() {
  closeAllMenus();
  const type = prompt('Type (image/video):', 'image');
  if (!type) return;
  const url = prompt('URL:');
  if (!url) return;
  const wrapper = document.createElement('div');
  wrapper.className = 'tg-spoiler-media';
  wrapper.title = 'Click to reveal';
  if (type === 'image') {
    const img = document.createElement('img');
    img.src = url;
    img.alt = 'spoiler';
    wrapper.appendChild(img);
  } else {
    const video = document.createElement('video');
    video.src = url;
    video.controls = true;
    wrapper.appendChild(video);
  }
  wrapper.addEventListener('click', () => wrapper.classList.toggle('revealed'));
  insertAtCursor(wrapper);
  updatePreview();
}

function insertCollage() {
  closeAllMenus();
  const urls = prompt('Image URLs (comma separated):');
  if (!urls) return;
  const caption = prompt('Caption (optional):');
  const div = document.createElement('div');
  div.className = 'tg-collage';
  urls.split(',').forEach(url => {
    const img = document.createElement('img');
    img.src = url.trim();
    img.alt = 'collage';
    div.appendChild(img);
  });
  if (caption) {
    const cap = document.createElement('figcaption');
    cap.className = 'tg-figcaption';
    cap.textContent = caption;
    div.appendChild(cap);
  }
  insertAtCursor(div);
  updatePreview();
}

function insertSlideshow() {
  closeAllMenus();
  const urls = prompt('Media URLs (comma separated):');
  if (!urls) return;
  const caption = prompt('Caption (optional):');
  const container = document.createElement('div');
  container.className = 'tg-slideshow-wrap';
  const track = document.createElement('div');
  track.className = 'tg-slideshow-track';
  const items = urls.split(',');
  items.forEach(url => {
    const u = url.trim();
    const slide = document.createElement('div');
    slide.className = 'tg-slideshow-slide';
    if (u.match(/\.(mp4|webm|ogg)$/i)) {
      const video = document.createElement('video');
      video.src = u;
      video.controls = true;
      slide.appendChild(video);
    } else {
      const img = document.createElement('img');
      img.src = u;
      img.alt = 'slide';
      slide.appendChild(img);
    }
    track.appendChild(slide);
  });
  container.appendChild(track);
  // Prev/Next buttons
  const prevBtn = document.createElement('button');
  prevBtn.className = 'tg-slideshow-prev';
  prevBtn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20"><path d="M15 18l-6-6 6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>';
  prevBtn.onclick = (e) => {
    e.stopPropagation();
    const idx = parseInt(container.dataset.current || '0');
    container.dataset.current = Math.max(0, idx - 1);
    track.style.transform = 'translateX(-' + (container.dataset.current * 100) + '%)';
    updateDots();
  };
  const nextBtn = document.createElement('button');
  nextBtn.className = 'tg-slideshow-next';
  nextBtn.innerHTML = '<svg viewBox="0 0 24 24" width="20" height="20"><path d="M9 18l6-6-6-6" stroke="currentColor" stroke-width="2" fill="none" stroke-linecap="round"/></svg>';
  nextBtn.onclick = (e) => {
    e.stopPropagation();
    const idx = parseInt(container.dataset.current || '0');
    container.dataset.current = Math.min(items.length - 1, idx + 1);
    track.style.transform = 'translateX(-' + (container.dataset.current * 100) + '%)';
    updateDots();
  };
  container.appendChild(prevBtn);
  container.appendChild(nextBtn);
  // Dots
  const dots = document.createElement('div');
  dots.className = 'tg-slideshow-dots';
  function updateDots() {
    const idx = parseInt(container.dataset.current || '0');
    dots.querySelectorAll('.tg-slideshow-dot').forEach((d, j) => d.classList.toggle('active', j === idx));
  }
  items.forEach((_, i) => {
    const dot = document.createElement('span');
    dot.className = 'tg-slideshow-dot' + (i === 0 ? ' active' : '');
    dot.onclick = (e) => {
      e.stopPropagation();
      container.dataset.current = i;
      track.style.transform = 'translateX(-' + (i * 100) + '%)';
      updateDots();
    };
    dots.appendChild(dot);
  });
  container.appendChild(dots);
  container.dataset.current = '0';
  if (caption) {
    const cap = document.createElement('figcaption');
    cap.className = 'tg-figcaption';
    cap.textContent = caption;
    container.appendChild(cap);
  }
  insertAtCursor(container);
  updatePreview();
}

function insertMap() {
  closeAllMenus();
  const lat = prompt('Latitude:');
  if (!lat) return;
  const lon = prompt('Longitude:');
  if (!lon) return;
  const div = document.createElement('div');
  div.className = 'tg-map';
  div.dataset.lat = lat;
  div.dataset.long = lon;
  const iframe = document.createElement('iframe');
  iframe.src = 'https://www.openstreetmap.org/export/embed.html?bbox=' + (parseFloat(lon)-0.01) + ',' + (parseFloat(lat)-0.01) + ',' + (parseFloat(lon)+0.01) + ',' + (parseFloat(lat)+0.01) + '&layer=mapnik&marker=' + lat + ',' + lon;
  iframe.style.cssText = 'width:100%;height:200px;border:none;';
  iframe.loading = 'lazy';
  div.appendChild(iframe);
  insertAtCursor(div);
  updatePreview();
}

function insertMention() {
  const username = prompt('Username (without @):');
  if (!username) return;
  const a = document.createElement('a');
  a.href = 'tg://user?id=' + username;
  a.className = 'tg-mention';
  a.textContent = '@' + username;
  a.contentEditable = 'false';
  insertAtCursor(a);
  updatePreview();
}

function insertCustomEmoji() {
  const emojiId = prompt('Custom emoji ID:');
  if (!emojiId) return;
  const emoji = prompt('Display emoji:');
  if (!emoji) return;
  const span = document.createElement('span');
  span.className = 'tg-custom-emoji';
  span.dataset.emojiId = emojiId;
  span.textContent = emoji;
  span.contentEditable = 'false';
  insertAtCursor(span);
  updatePreview();
}

function insertDateTime() {
  const format = prompt('Format (w/wDT/wT):', 'wDT');
  if (!format) return;
  const span = document.createElement('span');
  span.className = 'tg-time';
  span.dataset.unix = Math.floor(Date.now() / 1000);
  span.dataset.format = format;
  span.textContent = new Date().toLocaleString();
  span.contentEditable = 'false';
  insertAtCursor(span);
  updatePreview();
}

function insertAnchor() {
  const name = prompt('Anchor name:');
  if (!name) return;
  const a = document.createElement('a');
  a.name = name;
  a.className = 'tg-anchor';
  a.textContent = '⚓ ' + name;
  a.contentEditable = 'false';
  insertAtCursor(a);
  updatePreview();
}

function insertFootnote() {
  closeAllMenus();
  state.footnoteCount++;
  const text = prompt('Footnote text:');
  if (!text) return;
  const ref = document.createElement('sup');
  ref.className = 'footnote-ref';
  ref.textContent = '[' + state.footnoteCount + ']';
  ref.dataset.fn = state.footnoteCount;
  insertAtCursor(ref);
  const editor = document.getElementById('editor');
  let fnSection = editor.querySelector('.footnotes');
  if (!fnSection) {
    fnSection = document.createElement('div');
    fnSection.className = 'footnotes';
    fnSection.innerHTML = '<strong>Footnotes:</strong>';
    editor.appendChild(fnSection);
  }
  const item = document.createElement('div');
  item.className = 'footnote-item';
  item.innerHTML = '<strong>[' + state.footnoteCount + ']</strong> ' + escapeHTML(text);
  fnSection.appendChild(item);
  updatePreview();
}

function insertTable() {
  closeAllMenus();
  const picker = document.getElementById('tablePicker');
  const btn = document.querySelector('.tb-btn[onclick="insertTable()"]');
  const rect = btn.getBoundingClientRect();
  picker.style.bottom = (window.innerHeight - rect.top + 4) + 'px';
  picker.style.left = Math.min(rect.left, window.innerWidth - 180) + 'px';
  picker.classList.toggle('open');
}

function insertBlock(tag) {
  closeAllMenus();
  const editor = document.getElementById('editor');
  editor.focus();
  if (tag === 'p') {
    document.execCommand('formatBlock', false, 'p');
  } else if (['h1','h2','h3','h4','h5','h6'].includes(tag)) {
    document.execCommand('formatBlock', false, tag);
  } else if (tag === 'blockquote') {
    document.execCommand('formatBlock', false, 'blockquote');
  } else if (tag === 'pullquote') {
    const bq = document.createElement('blockquote');
    bq.className = 'pull-quote';
    bq.innerHTML = '<p>Pull quote text</p>';
    insertAtCursor(bq);
  } else if (tag === 'footer') {
    const footer = document.createElement('footer');
    footer.textContent = '— End of message —';
    insertAtCursor(footer);
  }
  updateBlockType();
  updatePreview();
}

function setBlock(tag) {
  closeAllMenus();
  document.getElementById('editor').focus();
  document.execCommand('formatBlock', false, tag === 'pre' ? 'pre' : tag);
  updateBlockType();
  updatePreview();
}

// ===== TABLE PICKER =====
function initTablePicker() {
  const grid = document.getElementById('tablePickerGrid');
  for (let r = 0; r < 6; r++) {
    for (let c = 0; c < 6; c++) {
      const cell = document.createElement('div');
      cell.className = 'table-picker-cell';
      cell.dataset.row = r;
      cell.dataset.col = c;
      cell.addEventListener('mouseenter', () => highlightTableGrid(r, c));
      cell.addEventListener('click', () => createTable(r + 1, c + 1));
      grid.appendChild(cell);
    }
  }
}

function highlightTableGrid(row, col) {
  document.querySelectorAll('.table-picker-cell').forEach(c => {
    const r = parseInt(c.dataset.row);
    const cl = parseInt(c.dataset.col);
    c.classList.toggle('highlighted', r <= row && cl <= col);
  });
  document.getElementById('tablePickerLabel').textContent = (col + 1) + ' × ' + (row + 1);
}

function createTable(rows, cols) {
  closeAllMenus();
  const table = document.createElement('table');
  const thead = document.createElement('thead');
  const headRow = document.createElement('tr');
  for (let c = 0; c < cols; c++) {
    const th = document.createElement('th');
    th.textContent = 'Header ' + (c + 1);
    headRow.appendChild(th);
  }
  thead.appendChild(headRow);
  table.appendChild(thead);
  const tbody = document.createElement('tbody');
  for (let r = 0; r < rows - 1; r++) {
    const tr = document.createElement('tr');
    for (let c = 0; c < cols; c++) {
      const td = document.createElement('td');
      td.textContent = '';
      tr.appendChild(td);
    }
    tbody.appendChild(tr);
  }
  table.appendChild(tbody);
  insertAtCursor(table);
  updatePreview();
}

// ===== BLOCK TYPE =====
function updateBlockType() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  let node = sel.anchorNode;
  if (node.nodeType === 3) node = node.parentElement;
  const blockTags = ['P','H1','H2','H3','H4','H5','H6','BLOCKQUOTE','PRE','LI','DIV'];
  while (node && node.id !== 'editor') {
    if (blockTags.includes(node.tagName)) {
      const labels = { P:'¶', H1:'H1', H2:'H2', H3:'H3', H4:'H4', H5:'H5', H6:'H6', BLOCKQUOTE:'❝', PRE:'</>', LI:'•', DIV:'□' };
      document.getElementById('blockTypeBtn').textContent = labels[node.tagName] || '¶';
      return;
    }
    node = node.parentElement;
  }
  document.getElementById('blockTypeBtn').textContent = '¶';
}

// ===== HELPERS =====
function wrapSelection(tag, className, placeholder) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const text = range.toString() || placeholder;
  const el = document.createElement(tag);
  if (className) el.className = className;
  el.textContent = text;
  range.deleteContents();
  range.insertNode(el);
  range.selectNodeContents(el);
  sel.removeAllRanges();
  sel.addRange(range);
  updatePreview();
}

function insertAtCursor(el) {
  const sel = window.getSelection();
  const editor = document.getElementById('editor');
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    if (editor.contains(range.commonAncestorContainer)) {
      range.deleteContents();
      range.insertNode(el);
      range.setStartAfter(el);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    } else {
      editor.appendChild(el);
    }
  } else {
    editor.appendChild(el);
  }
  updateCharCount();
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

function closeAllMenus() {
  document.querySelectorAll('.dropdown-menu.open, .table-picker.open').forEach(m => m.classList.remove('open'));
}

// ===== CHAR COUNT =====
function updateCharCount() {
  const editor = document.getElementById('editor');
  const len = editor.textContent.length;
  const formatted = len.toLocaleString();
  document.getElementById('charCount').textContent = formatted + ' / 32,768';
  document.getElementById('settingsCharCount').textContent = formatted;
  const pct = Math.min(100, (len / 32768) * 100);
  const fill = document.getElementById('settingsCharFill');
  fill.style.width = pct + '%';
  fill.style.background = pct > 90 ? 'var(--danger)' : pct > 70 ? 'var(--warning)' : 'var(--accent)';
  const counter = document.getElementById('charCount');
  counter.className = 'char-counter' + (pct > 90 ? ' danger' : pct > 70 ? ' warning' : '');
}

// ===== KEYBOARD SHORTCUTS =====
function initKeyboardShortcuts() {
  document.getElementById('editor').addEventListener('keydown', (e) => {
    if (e.ctrlKey || e.metaKey) {
      if (e.key === 'k') { e.preventDefault(); insertLink(); }
      else if (e.key === 'e') { e.preventDefault(); insertInlineCode(); }
      else if (e.shiftKey && e.key === 'X') { e.preventDefault(); document.execCommand('strikethrough'); updatePreview(); }
      else if (e.shiftKey && (e.key === 'S' || e.key === 's')) { e.preventDefault(); insertSpoiler(); }
      else if (e.shiftKey && (e.key === 'H' || e.key === 'h')) { e.preventDefault(); insertHighlight(); }
    }
    if (e.key === 'Tab') {
      const sel = window.getSelection();
      if (sel.rangeCount) {
        let node = sel.anchorNode;
        if (node.nodeType === 3) node = node.parentElement;
        if (node.closest('pre')) {
          e.preventDefault();
          document.execCommand('insertText', false, '  ');
        }
      }
    }
  });
}

// ===== DRAG AND DROP =====
function initDragDrop() {
  const editor = document.getElementById('editor');
  editor.addEventListener('dragover', (e) => { e.preventDefault(); editor.style.outline = '2px dashed var(--accent)'; });
  editor.addEventListener('dragleave', () => { editor.style.outline = ''; });
  editor.addEventListener('drop', (e) => {
    e.preventDefault();
    editor.style.outline = '';
    const files = e.dataTransfer.files;
    if (!files.length) return;
    Array.from(files).forEach(file => {
      const url = URL.createObjectURL(file);
      if (file.type.startsWith('image/')) {
        const img = document.createElement('img');
        img.src = url;
        img.alt = file.name;
        insertAtCursor(img);
      } else if (file.type.startsWith('video/')) {
        const video = document.createElement('video');
        video.src = url;
        video.controls = true;
        insertAtCursor(video);
      } else if (file.type.startsWith('audio/')) {
        const audio = document.createElement('audio');
        audio.src = url;
        audio.controls = true;
        insertAtCursor(audio);
      }
    });
    updatePreview();
  });
}

// ===== PREVIEW =====
function initPreviewUpdate() {
  // Live preview updated on every input (handled in initEditor)
}

function updatePreview() {
  const editor = document.getElementById('editor');
  const content = editor.innerHTML.trim();
  const empty = document.getElementById('previewEmpty');
  const preview = document.getElementById('previewContent');
  if (!content || content === '<br>') {
    empty.style.display = 'block';
    preview.style.display = 'none';
  } else {
    empty.style.display = 'none';
    preview.style.display = 'block';
    preview.innerHTML = editor.innerHTML;
  }
}

// ===== SETTINGS =====
function toggleSettings() {
  const overlay = document.getElementById('settingsOverlay');
  const panel = document.getElementById('settingsPanel');
  const isOpen = panel.classList.contains('open');
  if (isOpen) {
    panel.classList.remove('open');
    setTimeout(() => overlay.classList.remove('open'), 300);
  } else {
    overlay.classList.add('open');
    setTimeout(() => panel.classList.add('open'), 10);
    updateCharCount();
  }
}

function saveSettings() {
  const method = document.querySelector('input[name="sendMethod"]:checked').value;
  const settings = {
    token: document.getElementById('cfgToken').value,
    chatId: document.getElementById('cfgChatId').value,
    sendMethod: method
  };
  localStorage.setItem('tfr_settings', JSON.stringify(settings));
  state.sendMethod = method;
  showToast('Settings saved!', 'success');
}

function loadSettings() {
  try {
    const s = JSON.parse(localStorage.getItem('tfr_settings'));
    if (s) {
      document.getElementById('cfgToken').value = s.token || '';
      document.getElementById('cfgChatId').value = s.chatId || '';
      state.sendMethod = s.sendMethod || 'sendMessage';
      const radio = document.querySelector('input[name="sendMethod"][value="' + state.sendMethod + '"]');
      if (radio) radio.checked = true;
    }
  } catch (e) {}
}

// ===== TOAST =====
function showToast(msg, type) {
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.className = 'toast show ' + (type || 'info');
  setTimeout(() => toast.className = 'toast', 3000);
}

// ===== CLEAR ALL =====
function clearAll() {
  if (!confirm('Clear everything? This cannot be undone.')) return;
  const editor = document.getElementById('editor');
  editor.innerHTML = '';
  state.footnoteCount = 0;
  updateCharCount();
  updatePreview();
  showToast('Cleared!', 'success');
}

// ===== COPY OUTPUT =====
function copyOutput() {
  const mode = state.sendMethod === 'sendRichMessage' ? 'blocks' : 'HTML';
  const output = convertDOMToTelegram(mode);
  navigator.clipboard.writeText(output).then(() => showToast('Copied!', 'success')).catch(() => showToast('Copy failed', 'error'));
}

// ===== SEND =====
async function sendMessage() {
  const settings = JSON.parse(localStorage.getItem('tfr_settings') || '{}');
  if (!settings.token || !settings.chatId) {
    showToast('Configure Bot Token and Chat ID in Settings', 'error');
    toggleSettings();
    return;
  }
  const editor = document.getElementById('editor');
  const text = editor.textContent.trim();
  if (!text) { showToast('Nothing to send', 'error'); return; }

  const baseUrl = 'https://api.telegram.org/bot' + settings.token;
  const method = state.sendMethod;
  const sendBtn = document.getElementById('sendBtn');
  sendBtn.disabled = true;
  sendBtn.innerHTML = '<span class="animate-spin">⏳</span> Sending...';
  showToast('Sending...', 'info');

  try {
    let body;
    if (method === 'sendRichMessage') {
      const blocks = convertDOMToRichBlocks(editor);
      body = { chat_id: settings.chatId, rich_message: { blocks: blocks } };
    } else if (method === 'sendRichMessageDraft') {
      body = { chat_id: settings.chatId, rich_message: { markdown: convertDOMToTelegram('markdown') }, draft_id: Date.now() };
    } else {
      body = { chat_id: settings.chatId, text: editor.innerHTML, parse_mode: 'HTML' };
    }

    const resp = await fetch(baseUrl + '/' + method, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    const data = await resp.json();
    if (data.ok) {
      state.lastMessageId = data.result && data.result.message_id;
      showToast('Sent successfully!', 'success');
    } else {
      // Fallback for sendRichMessage
      if (method === 'sendRichMessage') {
        showToast('Rich send failed, trying HTML...', 'info');
        const resp2 = await fetch(baseUrl + '/sendMessage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ chat_id: settings.chatId, text: editor.innerHTML, parse_mode: 'HTML' })
        });
        const data2 = await resp2.json();
        if (data2.ok) {
          state.lastMessageId = data2.result.message_id;
          showToast('Sent as HTML (fallback)', 'success');
        } else {
          showToast('Failed: ' + (data2.description || 'Unknown'), 'error');
        }
      } else {
        showToast('Failed: ' + (data.description || 'Unknown'), 'error');
      }
    }
  } catch (err) {
    showToast('Network error: ' + err.message, 'error');
  } finally {
    sendBtn.disabled = false;
    sendBtn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg> Send';
  }
}

// ===== DOM TO TELEGRAM (HTML mode) =====
function convertDOMToTelegram(mode) {
  const editor = document.getElementById('editor');
  if (mode === 'blocks') return JSON.stringify(convertDOMToRichBlocks(editor), null, 2);
  return editor.innerHTML;
}

// ===== DOM TO RICHBLOCKS (for sendRichMessage) =====
function convertDOMToRichBlocks(container) {
  const blocks = [];
  const nodes = Array.from(container.childNodes);
  for (const node of nodes) {
    const block = nodeToRichBlock(node);
    if (block) blocks.push(block);
  }
  return blocks;
}

function nodeToRichBlock(node) {
  if (node.nodeType === 3) {
    const text = node.textContent.trim();
    if (!text) return null;
    return { type: 'RichBlockHeading', level: 1, text: [richTextFromText(text)] }; // fallback as paragraph
  }
  if (node.nodeType !== 1) return null;
  const tag = node.tagName;

  switch (tag) {
    case 'H1': case 'H2': case 'H3': case 'H4': case 'H5': case 'H6':
      return { type: 'RichBlockHeading', level: parseInt(tag[1]), text: extractRichText(node) };
    case 'P':
      return { type: 'RichBlockHeading', level: 1, text: extractRichText(node) }; // paragraph as heading level 1 fallback
    case 'BLOCKQUOTE':
      if (node.classList.contains('pull-quote')) {
        return { type: 'RichBlockPullQuotation', text: extractRichText(node), cite: '' };
      }
      return { type: 'RichBlockBlockQuotation', text: extractRichText(node) };
    case 'PRE': {
      const code = node.querySelector('code');
      return { type: 'RichBlockCode', code_language: '', text: code ? code.textContent : node.textContent };
    }
    case 'HR':
      return { type: 'RichBlockDivider' };
    case 'FOOTER':
      return { type: 'RichBlockFooter', text: extractRichText(node) };
    case 'DETAILS': {
      const summary = node.querySelector('summary');
      const summaryText = summary ? summary.textContent : 'Details';
      let content = '';
      for (const ch of node.childNodes) { if (ch !== summary) content += ch.textContent; }
      return { type: 'RichBlockDetails', title: [richTextFromText(summaryText)], blocks: [] };
    }
    case 'UL': {
      if (node.classList.contains('checklist')) {
        const items = Array.from(node.querySelectorAll('li')).map(li => {
          const cb = li.querySelector('input[type="checkbox"]');
          return { text: extractRichText(li), checked: cb ? cb.checked : false };
        });
        return { type: 'RichBlockTaskList', items: items };
      }
      const items = Array.from(node.querySelectorAll(':scope > li')).map(li => ({
        text: extractRichText(li)
      }));
      return { type: 'RichBlockList', style: 'bullet', items: items };
    }
    case 'OL': {
      const items = Array.from(node.querySelectorAll(':scope > li')).map(li => ({
        text: extractRichText(li)
      }));
      return { type: 'RichBlockList', style: 'number', items: items, start: parseInt(node.start) || 1 };
    }
    case 'TABLE': {
      const caption = node.querySelector('caption');
      const rows = Array.from(node.querySelectorAll('tr'));
      const tableRows = rows.map(row => {
        return Array.from(row.querySelectorAll('td, th')).map(cell => ({
          text: extractRichText(cell),
          colspan: cell.colSpan > 1 ? cell.colSpan : undefined,
          rowspan: cell.rowSpan > 1 ? cell.rowSpan : undefined,
          align: cell.style.textAlign || undefined
        }));
      });
      return {
        type: 'RichBlockTable',
        bordered: node.classList.contains('bordered'),
        striped: node.classList.contains('striped'),
        caption: caption ? [richTextFromText(caption.textContent)] : undefined,
        rows: tableRows
      };
    }
    case 'IMG':
      return { type: 'RichBlockPhoto', url: node.src, caption: [richTextFromText(node.alt || '')] };
    case 'VIDEO':
      return { type: 'RichBlockVideo', url: node.src };
    case 'AUDIO':
      return { type: 'RichBlockAudio', url: node.src };
    case 'DIV': {
      if (node.classList.contains('tg-map')) {
        return { type: 'RichBlockMap', lat: parseFloat(node.dataset.lat) || 0, long: parseFloat(node.dataset.long) || 0 };
      }
      if (node.classList.contains('tg-collage')) {
        const imgs = Array.from(node.querySelectorAll('img')).map(img => ({ url: img.src }));
        return { type: 'RichBlockCollage', items: imgs };
      }
      if (node.classList.contains('tg-slideshow-wrap')) {
        const items = Array.from(node.querySelectorAll('.tg-slideshow-slide')).map(slide => {
          const img = slide.querySelector('img');
          const video = slide.querySelector('video');
          if (img) return { url: img.src, type: 'photo' };
          if (video) return { url: video.src, type: 'video' };
          return { url: '', type: 'photo' };
        });
        return { type: 'RichBlockSlideshow', items: items };
      }
      if (node.classList.contains('tg-math-block')) {
        return { type: 'RichBlockCode', code_language: 'math', text: node.textContent };
      }
      if (node.classList.contains('footnotes')) {
        return { type: 'RichBlockDivider' };
      }
      // Generic div — treat as paragraph
      const innerBlocks = [];
      for (const ch of node.childNodes) {
        const b = nodeToRichBlock(ch);
        if (b) innerBlocks.push(b);
      }
      return innerBlocks.length === 1 ? innerBlocks[0] : { type: 'RichBlockHeading', level: 1, text: [richTextFromText(node.textContent)] };
    }
    default: {
      const text = node.textContent.trim();
      if (!text) return null;
      return { type: 'RichBlockHeading', level: 1, text: [richTextFromText(text)] };
    }
  }
}

function extractRichText(node) {
  const result = [];
  for (const child of node.childNodes) {
    const rt = nodeToRichText(child);
    if (rt) result.push(rt);
  }
  return result;
}

function nodeToRichText(node) {
  if (node.nodeType === 3) {
    const text = node.textContent;
    if (!text.trim()) return null;
    return { type: 'RichTextBold', text: text }; // plain text as bold fallback
  }
  if (node.nodeType !== 1) return null;
  const tag = node.tagName;
  const inner = extractRichText(node);

  switch (tag) {
    case 'B': case 'STRONG': return { type: 'RichTextBold', text: inner };
    case 'I': case 'EM': return { type: 'RichTextItalic', text: inner };
    case 'U': case 'INS': return { type: 'RichTextUnderline', text: inner };
    case 'S': case 'STRIKE': case 'DEL': return { type: 'RichTextStrikethrough', text: inner };
    case 'CODE': return { type: 'RichTextCode', text: node.textContent };
    case 'A': return { type: 'RichTextUrl', text: inner, url: node.href };
    case 'MARK': return { type: 'RichTextMarked', text: inner };
    case 'SUB': return { type: 'RichTextSubscript', text: inner };
    case 'SUP': return { type: 'RichTextSuperscript', text: inner };
    case 'SPAN': {
      if (node.classList.contains('tg-spoiler')) return { type: 'RichTextSpoiler', text: inner };
      if (node.classList.contains('tg-math')) return { type: 'RichTextMathematicalExpression', text: node.textContent };
      if (node.classList.contains('tg-mention')) return { type: 'RichTextMention', text: node.textContent, user_id: node.href.split('=').pop() };
      if (node.classList.contains('tg-custom-emoji')) return { type: 'RichTextCustomEmoji', text: node.textContent, custom_emoji_id: node.dataset.emojiId };
      if (node.classList.contains('tg-time')) return { type: 'RichTextDateTime', text: node.textContent, unix: parseInt(node.dataset.unix), format: node.dataset.format };
      return { type: 'RichTextBold', text: inner };
    }
    default: return inner.length ? { type: 'RichTextBold', text: inner } : null;
  }
}

function richTextFromText(text) {
  return { type: 'RichTextBold', text: text };
}

// ===== MARKDOWN CONVERTER =====
function convertToMarkdown(container) {
  let result = '';
  for (const child of container.childNodes) {
    result += nodeToMd(child);
  }
  return result.trim();
}

function nodeToMd(node) {
  if (node.nodeType === 3) return node.textContent;
  if (node.nodeType !== 1) return '';
  const tag = node.tagName;
  const inner = Array.from(node.childNodes).map(c => nodeToMd(c)).join('');
  switch (tag) {
    case 'B': case 'STRONG': return '*' + inner + '*';
    case 'I': case 'EM': return '_' + inner + '_';
    case 'U': return '__' + inner + '__';
    case 'S': return '~' + inner + '~';
    case 'CODE': return '`' + inner + '`';
    case 'A': return '[' + inner + '](' + node.href + ')';
    case 'H1': return '# ' + inner.trim() + '\n';
    case 'H2': return '## ' + inner.trim() + '\n';
    case 'H3': return '### ' + inner.trim() + '\n';
    case 'BLOCKQUOTE': return '> ' + inner.trim() + '\n';
    case 'PRE': return '```\n' + node.textContent + '\n```\n';
    case 'HR': return '---\n';
    case 'IMG': return '![' + (node.alt || 'image') + '](' + node.src + ')';
    case 'LI': return '- ' + inner.trim() + '\n';
    case 'BR': return '\n';
    case 'MARK': return '==' + inner + '==';
    case 'SPAN': {
      if (node.classList.contains('tg-spoiler')) return '||' + inner + '||';
      if (node.classList.contains('tg-math')) return '$' + node.textContent + '$';
      return inner;
    }
    default: return inner;
  }
}
