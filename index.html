<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TelegramFreeRich — Premium Rich Text Editor, Completely Free</title>
<style>
:root {
  --bg: #1a1a1a;
  --surface: #2a2a2a;
  --surface2: #333333;
  --toolbar-bg: #333333;
  --accent: #33b4c9;
  --accent-hover: #42c8de;
  --premium: #9b59b6;
  --text: #ffffff;
  --text-muted: #888888;
  --border: #3a3a3a;
  --danger: #ff4466;
  --success: #44ffaa;
  --warn: #ffaa44;
  --send-bg: #33b4c9;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Text', 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
}
body { display: flex; flex-direction: column; }

/* ===== HEADER (Telegram-style top bar) ===== */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 12px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-shrink: 0;
}
.header-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.hamburger {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.hamburger:hover { color: var(--text); background: var(--toolbar-bg); }
.hamburger svg { width: 22px; height: 22px; fill: currentColor; }
.header-title {
  font-size: 17px;
  font-weight: 700;
  letter-spacing: -0.3px;
  color: var(--text);
}
.header-title .free-badge {
  color: var(--accent);
  font-weight: 800;
}
.header-center {
  display: flex;
  align-items: center;
  gap: 6px;
}
.mode-tabs {
  display: flex;
  gap: 0;
  background: var(--bg);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.mode-tab {
  padding: 5px 16px;
  font-size: 12px;
  font-weight: 600;
  cursor: pointer;
  background: transparent;
  color: var(--text-muted);
  border: none;
  transition: all 0.2s;
}
.mode-tab.active {
  background: var(--accent);
  color: white;
}
.mode-tab:not(.active):hover { color: var(--text); }
.header-right {
  display: flex;
  align-items: center;
  gap: 6px;
}
.char-counter {
  font-size: 11px;
  padding: 4px 10px;
  border-radius: 14px;
  background: var(--bg);
  border: 1px solid var(--border);
  font-variant-numeric: tabular-nums;
  white-space: nowrap;
  color: var(--text-muted);
}
.char-counter.warn { color: var(--warn); border-color: var(--warn); }
.char-counter.danger { color: var(--danger); border-color: var(--danger); background: rgba(255,68,102,0.1); }

/* Undo/Redo pill (Telegram-style) */
.undo-redo-pill {
  display: flex;
  background: var(--surface2);
  border-radius: 20px;
  overflow: hidden;
  border: 1px solid var(--border);
}
.undo-redo-pill button {
  width: 34px; height: 34px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.undo-redo-pill button:hover { color: var(--text); background: rgba(255,255,255,0.05); }
.undo-redo-pill button svg { width: 18px; height: 18px; fill: currentColor; }
.undo-redo-pill button + button { border-left: 1px solid var(--border); }

/* Icon buttons */
.btn-icon {
  width: 34px; height: 34px;
  border-radius: 50%;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
}
.btn-icon:hover { color: var(--text); background: var(--toolbar-bg); }
.btn-icon svg { width: 20px; height: 20px; fill: currentColor; }

/* ===== IRONIC BANNER ===== */
.irony-banner {
  background: linear-gradient(90deg, rgba(51,180,201,0.1), rgba(155,89,182,0.1));
  border-bottom: 1px solid var(--border);
  padding: 6px 16px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 12px;
  color: var(--text-muted);
  font-style: italic;
  flex-shrink: 0;
  animation: bannerSlide 0.5s ease;
}
.irony-banner .free-text { color: var(--accent); font-weight: 600; font-style: normal; }
.irony-banner .premium-text { color: var(--premium); font-weight: 600; font-style: normal; text-decoration: line-through; }
.irony-banner-dismiss {
  margin-left: 12px;
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 2px 6px;
  border-radius: 4px;
  transition: all 0.2s;
}
.irony-banner-dismiss:hover { color: var(--text); background: var(--surface2); }
@keyframes bannerSlide { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* ===== TITLE FIELD (Telegram-style) ===== */
.title-section {
  background: var(--surface);
  padding: 14px 24px 0 24px;
  flex-shrink: 0;
}
.title-input {
  width: 100%;
  background: transparent;
  border: none;
  outline: none;
  font-size: 26px;
  font-weight: 700;
  color: var(--text);
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
  font-family: Georgia, 'Times New Roman', serif;
}
.title-input::placeholder { color: var(--text-muted); }

/* ===== MAIN EDITOR AREA ===== */
.main {
  flex: 1;
  display: flex;
  overflow: hidden;
  position: relative;
}
.editor-pane, .preview-pane {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
  min-width: 0;
}
.editor-pane { border-right: 1px solid var(--border); }

/* Mobile toggle tabs */
.mobile-tabs {
  display: none;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.mobile-tab-row {
  display: flex;
  gap: 0;
  padding: 6px 16px;
}
.mobile-tab-btn {
  flex: 1;
  padding: 7px 0;
  font-size: 12px;
  font-weight: 600;
  text-align: center;
  cursor: pointer;
  background: transparent;
  color: var(--text-muted);
  border: 1px solid var(--border);
  transition: all 0.2s;
}
.mobile-tab-btn:first-child { border-radius: 8px 0 0 8px; }
.mobile-tab-btn:last-child { border-radius: 0 8px 8px 0; }
.mobile-tab-btn.active { background: var(--accent); color: white; border-color: var(--accent); }

/* Editor textarea */
.editor-textarea {
  flex: 1;
  width: 100%;
  resize: none;
  border: none;
  outline: none;
  background: var(--bg);
  color: var(--text);
  padding: 16px 24px;
  font-family: 'SF Mono', 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Menlo', monospace;
  font-size: 14px;
  line-height: 1.65;
  tab-size: 2;
  unicode-bidi: plaintext;
}
.editor-textarea::placeholder { color: var(--text-muted); }
.editor-textarea::-webkit-scrollbar { width: 6px; }
.editor-textarea::-webkit-scrollbar-track { background: transparent; }
.editor-textarea::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Preview pane — Telegram message bubble style */
.preview-content {
  flex: 1;
  overflow-y: auto;
  padding: 16px 24px;
  background: var(--bg);
  font-size: 14px;
  line-height: 1.7;
}
.preview-content::-webkit-scrollbar { width: 6px; }
.preview-content::-webkit-scrollbar-track { background: transparent; }
.preview-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Telegram message bubble in preview */
.tg-bubble {
  background: var(--surface);
  border-radius: 12px 12px 12px 0;
  padding: 10px 14px;
  max-width: 95%;
  position: relative;
  margin: 4px 0;
}
.tg-bubble::before {
  content: '';
  position: absolute;
  bottom: 0;
  left: -6px;
  width: 12px;
  height: 12px;
  background: var(--surface);
  clip-path: polygon(100% 0, 100% 100%, 0 100%);
}

/* Preview markdown styles */
.preview-content h1 { font-size: 1.7em; font-weight: 700; margin: 0.5em 0 0.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
.preview-content h2 { font-size: 1.4em; font-weight: 700; margin: 0.5em 0 0.3em; }
.preview-content h3 { font-size: 1.2em; font-weight: 600; margin: 0.5em 0 0.3em; }
.preview-content h4 { font-size: 1.1em; font-weight: 600; margin: 0.5em 0 0.3em; }
.preview-content h5 { font-size: 1em; font-weight: 600; margin: 0.5em 0 0.3em; }
.preview-content h6 { font-size: 0.9em; font-weight: 600; margin: 0.5em 0 0.3em; color: var(--text-muted); }
.preview-content b, .preview-content strong { font-weight: 700; }
.preview-content code {
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'SF Mono', 'JetBrains Mono', monospace;
  font-size: 0.9em;
}
.preview-content pre {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 14px;
  margin: 10px 0;
  overflow-x: auto;
  font-size: 0.85em;
  line-height: 1.5;
}
.preview-content pre code { background: none; padding: 0; }
.preview-content blockquote {
  border-left: 3px solid var(--accent);
  margin: 10px 0;
  padding: 8px 16px;
  background: rgba(51,180,201,0.08);
  border-radius: 0 8px 8px 0;
  color: var(--text-muted);
}
.preview-content a { color: var(--accent); text-decoration: none; }
.preview-content a:hover { text-decoration: underline; }
.preview-content ul, .preview-content ol { margin: 6px 0; padding-left: 24px; }
.preview-content li { margin: 3px 0; }
.preview-content table { border-collapse: collapse; margin: 10px 0; width: 100%; }
.preview-content th, .preview-content td {
  border: 1px solid var(--border); padding: 8px 12px; text-align: left;
}
.preview-content th { background: var(--surface2); font-weight: 600; }
.preview-content hr { border: none; border-top: 1px solid var(--border); margin: 16px 0; }
.preview-content .spoiler {
  background: var(--text-muted); color: transparent; padding: 2px 4px;
  border-radius: 4px; cursor: pointer; transition: all 0.3s; user-select: none;
}
.preview-content .spoiler.revealed { background: transparent; color: var(--text); }
.preview-content .highlight {
  background: rgba(51,180,201,0.25); padding: 1px 3px; border-radius: 3px;
}
.preview-content .math {
  font-family: 'Times New Roman', serif; font-style: italic;
  color: var(--accent);
}
.preview-content .math-block {
  text-align: center; margin: 12px 0; font-size: 1.1em;
}
.preview-content img { max-width: 100%; border-radius: 8px; margin: 8px 0; }
.preview-content .task-item { list-style: none; margin-left: -20px; }
.preview-content .task-item input { margin-right: 6px; accent-color: var(--accent); }
.preview-content details {
  margin: 8px 0; border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}
.preview-content details summary {
  padding: 8px 14px; background: var(--surface2);
  cursor: pointer; font-weight: 600;
}
.preview-content details[open] summary { border-bottom: 1px solid var(--border); }
.preview-content details > div { padding: 12px 14px; }
.preview-content .tg-map, .preview-content .tg-map-preview {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; text-align: center;
  color: var(--text-muted); margin: 10px 0;
}
.preview-content .pull-quote {
  border-left: 4px solid var(--accent);
  padding: 12px 16px; margin: 12px 0;
  background: rgba(51,180,201,0.06);
  border-radius: 0 8px 8px 0;
  font-style: italic; color: var(--text-muted);
}
.preview-content .pull-quote cite {
  display: block; font-size: 0.85em; font-style: normal;
  color: var(--accent); margin-top: 6px; font-weight: 600;
}
.preview-content cite { font-style: normal; color: var(--accent); font-size: 0.9em; }
.preview-content .tg-footer {
  font-size: 0.8em; color: var(--text-muted);
  border-top: 1px solid var(--border); padding-top: 8px; margin-top: 12px;
}
.preview-content .tg-figure {
  margin: 12px 0; border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden; background: var(--surface);
}
.preview-content .tg-figure img, .preview-content .tg-figure video { display: block; max-width: 100%; }
.preview-content .tg-figcaption {
  padding: 8px 12px; font-size: 0.85em; color: var(--text-muted);
  border-top: 1px solid var(--border);
}
.preview-content .tg-figcaption cite { display: inline; }
.preview-content figure {
  margin: 12px 0; border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden; background: var(--surface);
}
.preview-content figure img { display: block; max-width: 100%; }
.preview-content figcaption {
  padding: 8px 12px; font-size: 0.85em; color: var(--text-muted);
  border-top: 1px solid var(--border);
}
.preview-content .tg-collage {
  display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 4px; margin: 12px 0; border-radius: 8px; overflow: hidden;
}
.preview-content .tg-collage img { width: 100%; display: block; }
.preview-content .tg-slideshow {
  display: flex; gap: 8px; overflow-x: auto; padding: 8px 0;
  scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch; margin: 12px 0;
}
.preview-content .tg-slideshow img, .preview-content .tg-slideshow video {
  flex-shrink: 0; max-width: 240px; border-radius: 6px; scroll-snap-align: start;
}
.preview-content .tg-time {
  font-family: monospace; font-size: 0.9em;
  color: var(--accent); background: rgba(51,180,201,0.1);
  padding: 2px 6px; border-radius: 4px;
}
.preview-content .tg-reference {
  font-size: 0.85em; color: var(--accent); vertical-align: super; cursor: help;
}
.preview-content .tg-anchor { scroll-margin-top: 20px; }
.preview-content .tg-emoji { font-size: 1.2em; }
.preview-content mark {
  background: rgba(255,170,68,0.25); padding: 1px 3px; border-radius: 3px; color: var(--text);
}
.preview-content sup { vertical-align: super; font-size: 0.75em; }
.preview-content sub { vertical-align: sub; font-size: 0.75em; }
.preview-content aside {
  border-left: 4px solid var(--accent);
  padding: 12px 16px; margin: 12px 0;
  background: rgba(51,180,201,0.06);
  border-radius: 0 8px 8px 0;
}
.preview-content aside cite {
  display: block; font-size: 0.85em;
  color: var(--accent); margin-bottom: 4px; font-weight: 600;
}

/* Resize handle */
.resize-handle {
  width: 5px;
  background: var(--border);
  cursor: col-resize;
  transition: background 0.2s;
  flex-shrink: 0;
}
.resize-handle:hover, .resize-handle.dragging { background: var(--accent); }

/* ===== FLOATING TOOLBAR (Telegram-style) ===== */
.floating-toolbar-wrap {
  background: var(--surface);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.floating-toolbar {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
}
.floating-toolbar::-webkit-scrollbar { height: 0; }
.tb-btn {
  width: 40px; height: 40px;
  min-width: 40px;
  border-radius: 50%;
  background: var(--toolbar-bg);
  border: none;
  color: var(--text);
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.15s;
  position: relative;
  font-size: 13px;
  font-weight: 600;
}
.tb-btn:hover { background: #444; }
.tb-btn.active {
  background: var(--accent);
  color: white;
}
.tb-btn svg { width: 20px; height: 20px; fill: currentColor; }
.tb-btn .tb-label {
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 0.5px;
}
/* Premium star badge — FREE here! */
.premium-star {
  position: absolute;
  top: -2px;
  right: -2px;
  width: 14px;
  height: 14px;
  background: var(--premium);
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 8px;
  color: white;
  font-weight: 700;
  border: 1.5px solid var(--surface);
  cursor: help;
}
.tb-btn[title]:hover::after {
  content: attr(title);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: #111;
  color: var(--text);
  padding: 4px 8px;
  border-radius: 6px;
  font-size: 11px;
  white-space: nowrap;
  pointer-events: none;
  z-index: 100;
  font-weight: 500;
}

/* Send button — Telegram-style teal circle */
.tb-send {
  width: 44px; height: 44px;
  min-width: 44px;
  border-radius: 50%;
  background: var(--send-bg);
  border: none;
  color: white;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: all 0.2s;
  margin-left: auto;
  box-shadow: 0 2px 8px rgba(51,180,201,0.3);
}
.tb-send:hover { background: var(--accent-hover); transform: scale(1.05); }
.tb-send svg { width: 22px; height: 22px; fill: white; }

/* Toolbar separator */
.tb-sep {
  width: 1px;
  height: 28px;
  background: var(--border);
  margin: 0 4px;
  flex-shrink: 0;
}

/* ===== BOTTOM CONTENT TYPE ROW (Telegram-style) ===== */
.content-types {
  display: flex;
  gap: 0;
  padding: 6px 8px 8px;
  overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  border-top: 1px solid var(--border);
}
.content-types::-webkit-scrollbar { height: 0; }
.content-type-btn {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  padding: 6px 14px;
  border-radius: 10px;
  background: transparent;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  transition: all 0.2s;
  flex-shrink: 0;
  position: relative;
}
.content-type-btn:hover { background: var(--toolbar-bg); color: var(--text); }
.content-type-btn.active {
  color: var(--accent);
  background: rgba(51,180,201,0.12);
}
.content-type-btn svg { width: 22px; height: 22px; fill: currentColor; }
.content-type-btn span {
  font-size: 10px;
  font-weight: 600;
  white-space: nowrap;
}
.content-type-btn .ct-free {
  position: absolute;
  top: 2px;
  right: 6px;
  font-size: 7px;
  color: var(--accent);
  font-weight: 800;
  letter-spacing: 0.5px;
}

/* ===== SETTINGS PANEL (Slide-in from right) ===== */
.settings-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  z-index: 500;
  display: none;
  align-items: stretch;
  justify-content: flex-end;
  backdrop-filter: blur(4px);
}
.settings-overlay.open { display: flex; animation: fadeIn 0.2s; }
.settings-panel {
  background: var(--surface);
  width: 380px;
  max-width: 90vw;
  padding: 24px;
  box-shadow: -8px 0 32px rgba(0,0,0,0.4);
  animation: slideInRight 0.3s ease;
  overflow-y: auto;
}
@keyframes slideInRight { from { transform: translateX(100%); } to { transform: translateX(0); } }
.settings-panel h2 {
  font-size: 18px;
  margin-bottom: 24px;
  display: flex;
  align-items: center;
  gap: 10px;
  padding-bottom: 16px;
  border-bottom: 1px solid var(--border);
}
.settings-panel h2 svg { width: 20px; height: 20px; fill: var(--accent); }
.settings-free-note {
  font-size: 11px;
  color: var(--accent);
  font-weight: 600;
  margin-top: -16px;
  margin-bottom: 20px;
}
.field { margin-bottom: 16px; }
.field label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text-muted);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}
.field input, .field select {
  width: 100%;
  padding: 10px 14px;
  border-radius: 10px;
  border: 1px solid var(--border);
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field select { cursor: pointer; }
.field input[type="password"] { font-family: monospace; letter-spacing: 2px; }
.settings-actions { display: flex; gap: 10px; margin-top: 24px; }
.settings-actions button {
  flex: 1;
  padding: 10px;
  border-radius: 10px;
  border: none;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent-hover); }
.btn-secondary { background: var(--toolbar-bg); color: var(--text-muted); border: 1px solid var(--border) !important; }
.btn-secondary:hover { color: var(--text); border-color: var(--accent) !important; }

/* ===== TOAST ===== */
.toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 1000;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 20px;
  border-radius: 12px;
  font-size: 13px;
  font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  display: flex;
  align-items: center;
  gap: 8px;
  max-width: 360px;
}
.toast svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
.toast.success { background: #0d3320; color: var(--success); border: 1px solid rgba(68,255,170,0.3); }
.toast.error { background: #330d15; color: var(--danger); border: 1px solid rgba(255,68,102,0.3); }
.toast.info { background: var(--surface); color: var(--accent); border: 1px solid var(--border); }
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { to { transform: translateX(100%); opacity: 0; } }
@keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

}

<script>
(function() {
'use strict';

// ===== STATE =====
let currentMode = 'markdown';
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const charCounter = document.getElementById('charCounter');
const MAX_CHARS = 32768;

// ===== HEADING DROPDOWN POSITIONING =====
// We need to position the dropdown relative to the toolbar
var headingBtn = document.querySelector('.tb-btn[onclick*="heading-menu"]');
if (headingBtn) {
  headingBtn.id = 'headingDropBtn';
}
var headingMenu = document.getElementById('heading-menu');

function toggleHeadingDropdown() {
  var menu = headingMenu;
  if (menu.style.display === 'none' || !menu.style.display) {
    // Position it relative to the button
    var btn = headingBtn;
    if (btn) {
      var rect = btn.getBoundingClientRect();
      menu.style.position = 'fixed';
      menu.style.left = rect.left + 'px';
      menu.style.bottom = (window.innerHeight - rect.top + 8) + 'px';
    }
    menu.style.display = 'block';
  } else {
    menu.style.display = 'none';
  }
}

// ===== LOAD SAVED SETTINGS =====
function loadSettings() {
  var token = localStorage.getItem('tg_bot_token') || '';
  var chatId = localStorage.getItem('tg_chat_id') || '';
  document.getElementById('botToken').value = token;
  document.getElementById('chatId').value = chatId;
}
loadSettings();

// ===== MODE SWITCH =====
window.switchMode = function(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(function(t) {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  document.getElementById('parseMode').value = mode === 'html' ? 'HTML' : 'MarkdownV2';
  updatePreview();
};

// ===== MOBILE SWITCH =====
window.mobileSwitch = function(panel) {
  var editorPane = document.getElementById('editorPane');
  var previewPane = document.getElementById('previewPane');
  var editBtn = document.getElementById('mobileEditBtn');
  var prevBtn = document.getElementById('mobilePreviewBtn');
  if (panel === 'edit') {
    editorPane.classList.remove('mobile-hide');
    previewPane.classList.remove('mobile-show');
    editBtn.classList.add('active');
    prevBtn.classList.remove('active');
  } else {
    editorPane.classList.add('mobile-hide');
    previewPane.classList.add('mobile-show');
    editBtn.classList.remove('active');
    prevBtn.classList.add('active');
  }
};

// ===== CHARACTER COUNTER =====
function updateCharCounter() {
  var len = editor.value.length;
  charCounter.textContent = len.toLocaleString() + ' / ' + MAX_CHARS.toLocaleString();
  charCounter.className = 'char-counter' + (len > MAX_CHARS ? ' danger' : len > MAX_CHARS * 0.9 ? ' warn' : '');
}

// ===== ESCAPE HTML =====
function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== MARKDOWN PARSER =====
function parseMarkdown(text) {
  if (!text.trim()) return '<div class="tg-bubble"><p style="color: var(--text-muted); font-style: italic;">Preview will appear here...</p></div>';
  
  var html = '';
  var lines = text.split('\n');
  var i = 0;
  var inCodeBlock = false;
  var codeContent = '';
  var codeLang = '';
  var inTable = false;
  var tableRows = [];
  var inBlockquote = false;
  var blockquoteContent = '';
  var inList = false;
  var listType = '';
  var listItems = [];
  
  function flushBlockquote() {
    if (inBlockquote && blockquoteContent) {
      html += '<blockquote>' + parseInline(blockquoteContent.trim()) + '</blockquote>\n';
      blockquoteContent = '';
      inBlockquote = false;
    }
  }
  
  function flushList() {
    if (inList && listItems.length) {
      var tag = listType === 'ol' ? 'ol' : 'ul';
      html += '<' + tag + '>\n';
      listItems.forEach(function(item) {
        if (item.startsWith('[ ] ') || item.startsWith('[x] ') || item.startsWith('[X] ')) {
          var checked = item[1] === 'x' || item[1] === 'X';
          html += '<li class="task-item"><input type="checkbox"' + (checked ? ' checked' : '') + ' disabled> ' + parseInline(item.slice(4)) + '</li>\n';
        } else {
          html += '<li>' + parseInline(item) + '</li>\n';
        }
      });
      html += '</' + tag + '>\n';
      listItems = [];
      inList = false;
    }
  }
  
  function flushTable() {
    if (inTable && tableRows.length) {
      html += '<table>\n';
      tableRows.forEach(function(row, ri) {
        var tag = ri === 0 ? 'th' : 'td';
        if (ri === 1 && tableRows.length > 1) html += '<tbody>\n';
        if (ri === 0) html += '<thead>\n';
        var cells = row.split('|').map(function(c) { return c.trim(); }).filter(function(c) { return c; });
        if (ri === 1 && cells.every(function(c) { return /^[-:]+$/.test(c); })) return;
        html += '<tr>';
        cells.forEach(function(c) { html += '<' + tag + '>' + parseInline(c) + '</' + tag + '>'; });
        html += '</tr>\n';
        if (ri === 0 && tableRows.length > 1) html += '</thead>\n';
      });
      if (tableRows.length > 1) html += '</tbody>\n';
      html += '</table>\n';
      tableRows = [];
      inTable = false;
    }
  }
  
  while (i < lines.length) {
    var line = lines[i];
    
    // Code block
    if (line.trimStart().startsWith('```')) {
      flushBlockquote(); flushList(); flushTable();
      if (inCodeBlock) {
        html += '<pre><code' + (codeLang ? ' class="language-' + escHtml(codeLang) + '"' : '') + '>' + escHtml(codeContent) + '</code></pre>\n';
        inCodeBlock = false; codeContent = ''; codeLang = '';
      } else {
        flushList();
        inCodeBlock = true;
        codeLang = line.trimStart().slice(3).trim();
      }
      i++; continue;
    }
    
    if (inCodeBlock) {
      codeContent += (codeContent ? '\n' : '') + line;
      i++; continue;
    }
    
    // Table
    if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
      flushBlockquote(); flushList();
      if (!inTable) inTable = true;
      tableRows.push(line.trim());
      i++; continue;
    } else {
      flushTable();
    }
    
    // Blockquote
    if (line.startsWith('>')) {
      flushList();
      if (!inBlockquote) inBlockquote = true;
      blockquoteContent += line.slice(1).trim() + '\n';
      i++; continue;
    } else {
      flushBlockquote();
    }
    
    // List items
    var ulMatch = line.match(/^(\s*)([-*+])\s+(.*)/);
    var olMatch = line.match(/^(\s*)(\d+)\.\s+(.*)/);
    if (ulMatch || olMatch) {
      flushBlockquote(); flushTable();
      var item = ulMatch ? ulMatch[3] : olMatch[3];
      var type = ulMatch ? 'ul' : 'ol';
      if (!inList || listType !== type) { flushList(); inList = true; listType = type; }
      listItems.push(item);
      i++; continue;
    } else {
      flushList();
    }
    
    // Divider
    if (/^[-*_]{3,}\s*$/.test(line.trim())) {
      flushBlockquote(); flushList(); flushTable();
      html += '<hr>\n';
      i++; continue;
    }
    
    // Headings
    var hMatch = line.match(/^(#{1,6})\s+(.*)/);
    if (hMatch) {
      flushBlockquote(); flushList(); flushTable();
      var level = hMatch[1].length;
      html += '<h' + level + '>' + parseInline(hMatch[2]) + '</h' + level + '>\n';
      i++; continue;
    }
    
    // Empty line
    if (!line.trim()) {
      flushBlockquote(); flushList(); flushTable();
      i++; continue;
    }
    
    // Regular paragraph
    flushBlockquote(); flushList(); flushTable();
    html += '<p>' + parseInline(line) + '</p>\n';
    i++;
  }
  
  flushBlockquote(); flushList(); flushTable();
  if (inCodeBlock) {
    html += '<pre><code' + (codeLang ? ' class="language-' + escHtml(codeLang) + '"' : '') + '>' + escHtml(codeContent) + '</code></pre>\n';
  }
  
  return html ? '<div class="tg-bubble">' + html + '</div>' : '<div class="tg-bubble"><p style="color: var(--text-muted); font-style: italic;">Preview will appear here...</p></div>';
}

function parseInline(text) {
  // Escape HTML first
  text = escHtml(text);
  
  // Math blocks $$...$$
  text = text.replace(/\$\$([\s\S]+?)\$\$/g, '<div class="math-block math">$1</div>');
  // Inline math $...$
  text = text.replace(/\$([^\$\n]+?)\$/g, '<span class="math">$1</span>');
  
  // Code (must come before other inline)
  text = text.replace(/`([^`\n]+?)`/g, '<code>$1</code>');
  
  // Media
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  
  // Bold
  text = text.replace(/\*\*([^\*]+?)\*\*/g, '<b>$1</b>');
  text = text.replace(/__([^_]+?)__/g, '<b>$1</b>');
  
  // Italic
  text = text.replace(/\*([^\*]+?)\*/g, '<i>$1</i>');
  text = text.replace(/_([^_]+?)_/g, '<i>$1</i>');
  
  // Strikethrough
  text = text.replace(/~~([^~]+?)~~/g, '<s>$1</s>');
  
  // Spoiler
  text = text.replace(/\|\|([^|]+?)\|\|/g, '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
  
  // Highlight
  text = text.replace(/==([^=]+?)==/g, '<span class="highlight">$1</span>');
  
  // Superscript / Subscript
  text = text.replace(/&lt;sup&gt;([\s\S]*?)&lt;\/sup&gt;/gi, '<sup>$1</sup>');
  text = text.replace(/&lt;sub&gt;([\s\S]*?)&lt;\/sub&gt;/gi, '<sub>$1</sub>');
  // tg-map
  text = text.replace(/&lt;tg-map\s+lat=&quot;([^&]+)&quot;\s+long=&quot;([^&]+)&quot;(?:\s+zoom=&quot;([^&]+)&quot;)?\s*\/&gt;/gi,
    function(m, lat, lng, zoom) {
      return '<div class="tg-map">\ud83d\udccd Map: ' + lat + ', ' + lng + (zoom ? ' (zoom: ' + zoom + ')' : '') + '</div>';
    });
  // aside
  text = text.replace(/&lt;aside&gt;([\s\S]*?)&lt;\/aside&gt;/gi, '<aside>$1</aside>');
  text = text.replace(/&lt;cite&gt;([\s\S]*?)&lt;\/cite&gt;/gi, '<cite>$1</cite>');
  
  return text;
}

// ===== HTML PARSER / SANITIZER =====
function parseHtmlContent(text) {
  if (!text.trim()) return '<div class="tg-bubble"><p style="color: var(--text-muted); font-style: italic;">Preview will appear here...</p></div>';
  
  var allowedTags = ['b','strong','i','em','u','ins','s','del','strike','code','pre','a',
    'blockquote','br','p','br/','tg-spoiler','tg-blockquote','tg-collage','tg-slideshow',
    'details','summary','tg-map','mark','sup','sub','h1','h2','h3','h4','h5','h6',
    'ul','ol','li','table','thead','tbody','tr','th','td','hr','div','span','img',
    'aside','cite','figure','figcaption','footer','tg-emoji','tg-time','tg-math',
    'tg-math-block','tg-reference','input','caption','video','audio','tg-thinking'];
  
  var allowedAttrs = {
    'a': ['href','name'],
    'img': ['src','alt','width','height','tg-spoiler'],
    'video': ['src'],
    'audio': ['src'],
    'figure': [],
    'figcaption': [],
    'cite': [],
    'tg-map': ['lat','long','zoom'],
    'tg-emoji': ['emoji-id'],
    'tg-time': ['unix','format'],
    'tg-reference': ['name'],
    'input': ['type','checked'],
    'ol': ['start','type','reversed'],
    'li': ['value','type'],
    'td': ['colspan','rowspan','align','valign'],
    'th': ['colspan','rowspan','align','valign'],
    'table': ['bordered','striped'],
    'span': ['class'],
    'tg-blockquote': ['expandable'],
    'code': ['class'],
    '*': []
  };
  
  // Process spoiler spans
  text = text.replace(/<span\s+class=["']tg-spoiler["']\s*>([\s\S]*?)<\/span>/gi,
    '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
  text = text.replace(/<tg-spoiler>([\s\S]*?)<\/tg-spoiler>/gi,
    '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
  
  // Blockquote expandable
  text = text.replace(/<tg-blockquote[^>]*expandable[^>]*>([\s\S]*?)<\/tg-blockquote>/gi,
    '<details><summary>Quote</summary><blockquote>$1</blockquote></details>');
  text = text.replace(/<tg-blockquote[^>]*>([\s\S]*?)<\/tg-blockquote>/gi, '<blockquote>$1</blockquote>');
  
  // tg-map
  text = text.replace(/<tg-map\s+lat=["']([^"']+)["']\s+long=["']([^"']+)["'](?:\s+zoom=["']([^"']+)["'])?\s*\/?>/gi,
    '<div class="tg-map">\ud83d\udccd Map: $1, $2' + (('$3') ? ' (zoom: $3)' : '') + '</div>');
  
  // tg-emoji
  text = text.replace(/<tg-emoji[^>]*>([\s\S]*?)<\/tg-emoji>/gi, '<span class="tg-emoji">$1</span>');
  
  // tg-time
  text = text.replace(/<tg-time\s+unix=["'](\d+)["']\s+format=["']([^"']+)["'][^>]*>([\s\S]*?)<\/tg-time>/gi,
    function(m, unix, fmt, content) {
      try {
        var d = new Date(parseInt(unix) * 1000);
        var months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        var days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        var formatted = days[d.getUTCDay()] + ', ' + months[d.getUTCMonth()] + ' ' + d.getUTCDate() + ', ' + d.getUTCFullYear();
        return '<span class="tg-time" title="Unix: ' + unix + ' (' + fmt + ')">' + content + '</span>';
      } catch(e) { return '<span class="tg-time">' + content + '</span>'; }
    });
  
  // tg-math
  text = text.replace(/<tg-math>([\s\S]*?)<\/tg-math>/gi, '<span class="math">$1</span>');
  text = text.replace(/<tg-math-block>([\s\S]*?)<\/tg-math-block>/gi, '<div class="math-block math">$1</div>');
  
  // tg-reference
  text = text.replace(/<tg-reference\s+name=["']([^"']+)["'][^>]*>([\s\S]*?)<\/tg-reference>/gi,
    '<sup class="tg-reference" title="$1">[$2]</sup>');
  
  // aside — pull quote
  text = text.replace(/<aside>([\s\S]*?)<\/aside>/gi, function(m, content) {
    var inner = content;
    var citeHtml = '';
    var citeMatch = inner.match(/<cite>([\s\S]*?)<\/cite>/i);
    if (citeMatch) {
      citeHtml = '<cite>' + citeMatch[1] + '</cite>';
      inner = inner.replace(citeMatch[0], '');
    }
    return '<div class="pull-quote">' + inner.trim() + citeHtml + '</div>';
  });
  
  text = text.replace(/<footer>([\s\S]*?)<\/footer>/gi, '<div class="tg-footer">$1</div>');
  
  text = text.replace(/<figure>([\s\S]*?)<\/figure>/gi, function(m, content) {
    var figcaption = '';
    var fcMatch = content.match(/<figcaption>([\s\S]*?)<\/figcaption>/i);
    if (fcMatch) figcaption = '<div class="tg-figcaption">' + fcMatch[1] + '</div>';
    var inner = content.replace(/<figcaption>[\s\S]*?<\/figcaption>/gi, '');
    return '<div class="tg-figure">' + inner.trim() + figcaption + '</div>';
  });
  
  text = text.replace(/<tg-collage>([\s\S]*?)<\/tg-collage>/gi, function(m, content) {
    var figcaption = '';
    var fcMatch = content.match(/<figcaption>([\s\S]*?)<\/figcaption>/i);
    if (fcMatch) figcaption = '<div class="tg-figcaption">' + fcMatch[1] + '</div>';
    var inner = content.replace(/<figcaption>[\s\S]*?<\/figcaption>/gi, '');
    return '<div class="tg-collage">' + inner.trim() + '</div>' + figcaption;
  });
  
  text = text.replace(/<tg-slideshow>([\s\S]*?)<\/tg-slideshow>/gi, function(m, content) {
    var figcaption = '';
    var fcMatch = content.match(/<figcaption>([\s\S]*?)<\/figcaption>/i);
    if (fcMatch) figcaption = '<div class="tg-figcaption">' + fcMatch[1] + '</div>';
    var inner = content.replace(/<figcaption>[\s\S]*?<\/figcaption>/gi, '');
    return '<div class="tg-slideshow">' + inner.trim() + '</div>' + figcaption;
  });
  
  text = text.replace(/<a\s+name=["']([^"']+)["']\s*><\/a>/gi,
    '<span class="tg-anchor" id="$1"></span>');
  
  // Sanitize
  text = text.replace(/<\/?([a-z][a-z0-9-]*)\b[^>]*>/gi, function(match, tag) {
    tag = tag.toLowerCase();
    if (allowedTags.includes(tag) || tag.startsWith('tg-')) return match;
    return '';
  });
  
  text = text.replace(/<tg-spoiler>/gi, '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">');
  text = text.replace(/<\/tg-spoiler>/gi, '</span>');
  
  return '<div class="tg-bubble">' + text + '</div>';
}

      case 'emoji': insert = '<tg-emoji emoji-id="5368324170671202286">' + (selected || '\ud83d\udc4d') + '</tg-emoji>'; selectStart = 37; selectEnd = 37 + (selected || '\ud83d\udc4d').length; break;
      case 'datetime': insert = '<tg-time unix="1647531900" format="wDT">' + (selected || 'tomorrow') + '</tg-time>'; selectStart = 37; selectEnd = 37 + (selected || 'tomorrow').length; break;
      case 'mailto': insert = '<a href="mailto:' + (selected || 'user@example.com') + '">' + (selected || 'user@example.com') + '</a>'; selectStart = 15; selectEnd = 15 + (selected || 'user@example.com').length; break;
      case 'tel': insert = '<a href="tel:+123****7890">' + (selected || '+123 456 7890') + '</a>'; selectStart = 24; selectEnd = 24 + (selected || '+123 456 7890').length; break;
      case 'mention': insert = '<a href="tg://user?id=123456789">' + (selected || '@username') + '</a>'; selectStart = 31; selectEnd = 31 + (selected || '@username').length; break;
    }
  }
  
  editor.focus();
  editor.setRangeText(insert, start, end, 'end');
  editor.selectionStart = start + selectStart;
  editor.selectionEnd = start + selectEnd;
  updatePreview();
};

// ===== DROPDOWN =====
window.toggleDropdown = function(id) {
  // For heading-menu, use our custom function
  if (id === 'heading-menu') {
    toggleHeadingDropdown();
    return;
  }
  var menu = document.getElementById(id);
  var isOpen = menu.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) menu.classList.add('open');
};

function closeAllDropdowns() {
  document.querySelectorAll('.dropdown-menu').forEach(function(m) { m.classList.remove('open'); });
  if (headingMenu) headingMenu.style.display = 'none';
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.dropdown') && !e.target.closest('#heading-menu') && !e.target.closest('#headingDropBtn')) {
    closeAllDropdowns();
  }
});

// ===== KEYBOARD SHORTCUTS =====
editor.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && !e.altKey) {
    switch (e.key.toLowerCase()) {
      case 'b': e.preventDefault(); insertFormat('bold'); break;
      case 'i': e.preventDefault(); insertFormat('italic'); break;
      case 'u': e.preventDefault(); insertFormat('underline'); break;
      case 'k': e.preventDefault(); insertFormat('link'); break;
      case 'e': e.preventDefault(); insertFormat('code'); break;
    }
  }
  // Tab support
  if (e.key === 'Tab') {
    e.preventDefault();
    var start = editor.selectionStart;
    editor.setRangeText('  ', start, start, 'end');
    updatePreview();
  }
});

// ===== RESIZE HANDLE =====
var resizeHandle = document.getElementById('resizeHandle');
var isResizing = false;
resizeHandle.addEventListener('mousedown', function(e) {
  isResizing = true;
  resizeHandle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
  if (!isResizing) return;
  var main = document.querySelector('.main');
  var rect = main.getBoundingClientRect();
  var ratio = (e.clientX - rect.left) / rect.width;
  var clamped = Math.max(0.2, Math.min(0.8, ratio));
  document.getElementById('editorPane').style.flex = '0 0 ' + (clamped * 100) + '%';
  document.getElementById('previewPane').style.flex = '1';
});
document.addEventListener('mouseup', function() {
  if (isResizing) {
    isResizing = false;
    resizeHandle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// ===== LIVE PREVIEW =====
editor.addEventListener('input', updatePreview);

// ===== SETTINGS =====
window.openSettings = function() {
  document.getElementById('settingsOverlay').classList.add('open');
};
window.closeSettings = function() {
  document.getElementById('settingsOverlay').classList.remove('open');
};
window.saveSettings = function() {
  var token = document.getElementById('botToken').value.trim();
  var chatId = document.getElementById('chatId').value.trim();
  localStorage.setItem('tg_bot_token', token);
  localStorage.setItem('tg_chat_id', chatId);
  closeSettings();
  showToast('Settings saved successfully — for free!', 'success');
};

// ===== COPY TO CLIPBOARD =====
window.copyToClipboard = function() {
  var text = editor.value;
  if (!text) { showToast('Nothing to copy', 'info'); return; }
  navigator.clipboard.writeText(text).then(function() {
    showToast('Copied to clipboard! (Premium feature, free for you)', 'success');
  }).catch(function() {
    var ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard!', 'success');
  });
};

// ===== SEND TO TELEGRAM =====
window.sendToTelegram = async function() {
  var token = localStorage.getItem('tg_bot_token');
  var chatId = localStorage.getItem('tg_chat_id');
  
  if (!token || !chatId) {
    showToast('Please configure Bot Token and Chat ID in Settings first', 'error');
    openSettings();
    return;
  }
  
  var text = editor.value;
  if (!text.trim()) {
    showToast('Nothing to send \u2014 editor is empty', 'error');
    return;
  }
  
  if (text.length > MAX_CHARS) {
    showToast('Message exceeds ' + MAX_CHARS + ' character limit (' + text.length + ' chars)', 'error');
    return;
  }
  
  var parseMode = document.getElementById('parseMode').value;
  var baseUrl = 'https://api.telegram.org/bot' + token;
  
  // Try sendRichMessage first
  try {
    var richBody = { chat_id: chatId, rich_message: {} };
    if (parseMode === 'MarkdownV2') {
      richBody.rich_message.markdown = text;
    } else {
      richBody.rich_message.html = text;
    }
    
    var res = await fetch(baseUrl + '/sendRichMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(richBody)
    });
    
    var data = await res.json();
    
    if (data.ok) {
      showToast('Message sent successfully! (Free, obviously) \u2713', 'success');
      return;
    }
    
    if (data.description && (data.description.includes('method not found') || data.description.includes('not found'))) {
      throw new Error('fallback');
    }
    
    showToast('Error: ' + (data.description || 'Unknown error'), 'error');
    return;
  } catch (e) {
    if (e.message === 'fallback' || e instanceof TypeError) {
      try {
        var fallbackBody = {
          chat_id: chatId,
          text: text,
          parse_mode: parseMode
        };
        
        var res2 = await fetch(baseUrl + '/sendMessage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fallbackBody)
        });
        
        var data2 = await res2.json();
        if (data2.ok) {
          showToast('Message sent via sendMessage fallback! (Still free) \u2713', 'success');
        } else {
          showToast('Error: ' + (data2.description || 'Failed to send'), 'error');
        }
      } catch (e2) {
        showToast('Network error: ' + e2.message, 'error');
      }
    } else {
      showToast('Error: ' + e.message, 'error');
    }
  }
};

// ===== TOAST NOTIFICATIONS =====
function showToast(message, type) {
  type = type || 'info';
  var container = document.getElementById('toastContainer');
  var toast = document.createElement('div');
  toast.className = 'toast ' + type;
  
  var icon = '';
  if (type === 'success') icon = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
  else if (type === 'error') icon = '<svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>';
  else icon = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>';
  
  toast.innerHTML = icon + '<span>' + escHtml(message) + '</span>';
  container.appendChild(toast);
  setTimeout(function() { if (toast.parentNode) toast.remove(); }, 3200);
}
window.showToast = showToast;

// Close settings on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeSettings();
    closeAllDropdowns();
  }
});

// ===== INIT =====
updatePreview();

})();
</script>
