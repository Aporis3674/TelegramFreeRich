<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>TelegramFreeRich — Rich Text Editor</title>
<style>
/* ===== CSS RESET & VARIABLES ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #0d0d12;
  --surface: #16161e;
  --surface2: #1e1e2a;
  --surface3: #262636;
  --accent: #33b4c9;
  --accent2: #7c5cff;
  --text: #f0f0f5;
  --text2: #8888a0;
  --text3: #555566;
  --border: #2a2a3e;
  --danger: #ff4466;
  --success: #44ffaa;
  --radius: 12px;
  --radius-sm: 8px;
  --radius-lg: 20px;
  --font: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
  --mono: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Consolas', monospace;
  --toolbar-h: 56px;
  --topbar-h: 56px;
}

html, body {
  height: 100%; width: 100%;
  font-family: var(--font);
  background: var(--bg);
  color: var(--text);
  overflow: hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* ===== SCROLLBAR ===== */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--surface3); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text3); }

/* ===== LANDING ===== */
#landing {
  position: fixed; inset: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  z-index: 100;
  transition: opacity 0.6s ease, transform 0.6s ease;
  overflow: hidden;
}
#landing.hidden {
  opacity: 0; transform: translateY(-40px);
  pointer-events: none;
}
/* Animated gradient orbs */
#landing .orb {
  position: absolute;
  border-radius: 50%;
  filter: blur(120px);
  opacity: 0.12;
  animation: orbFloat 12s ease-in-out infinite alternate;
}
#landing .orb-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
#landing .orb-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: -4s; }
#landing .orb-3 { width: 300px; height: 300px; background: #ff44aa; top: 50%; left: 50%; transform: translate(-50%, -50%); animation-delay: -8s; opacity: 0.06; }
@keyframes orbFloat {
  0% { transform: translate(0, 0) scale(1); }
  50% { transform: translate(40px, -30px) scale(1.1); }
  100% { transform: translate(-20px, 20px) scale(0.95); }
}

.telegram-icon {
  width: 120px; height: 120px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 28px;
  box-shadow: 0 0 60px rgba(51,180,201,0.25), 0 0 120px rgba(124,92,255,0.15);
  cursor: pointer;
  transition: transform 0.3s ease, box-shadow 0.3s ease;
  position: relative; z-index: 1;
}
.telegram-icon:hover { transform: scale(1.06); box-shadow: 0 0 80px rgba(51,180,201,0.35), 0 0 160px rgba(124,92,255,0.2); }
.telegram-icon svg { width: 56px; height: 56px; fill: #fff; }

.landing-title {
  font-size: 28px; font-weight: 700;
  color: var(--text);
  margin-bottom: 8px;
  position: relative; z-index: 1;
}
.landing-subtitle {
  font-size: 15px;
  color: var(--text2);
  margin-bottom: 40px;
  position: relative; z-index: 1;
}
.scroll-hint {
  font-size: 13px;
  color: var(--text3);
  animation: bounceDown 2s ease-in-out infinite;
  position: relative; z-index: 1;
  cursor: pointer;
  display: flex; flex-direction: column; align-items: center; gap: 6px;
}
.scroll-hint svg { width: 20px; height: 20px; stroke: var(--text3); animation: bounceDown 2s ease-in-out infinite; }
@keyframes bounceDown {
  0%, 100% { transform: translateY(0); opacity: 0.5; }
  50% { transform: translateY(8px); opacity: 1; }
}

/* ===== EDITOR SCREEN ===== */
#editor-screen {
  position: fixed; inset: 0;
  display: none; flex-direction: column;
  background: var(--bg);
  z-index: 50;
}
#editor-screen.active { display: flex; }

/* Top Bar */
.topbar {
  height: var(--topbar-h);
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center;
  padding: 0 16px;
  flex-shrink: 0;
  z-index: 60;
}
.topbar-left { display: flex; align-items: center; gap: 12px; flex: 1; }
.topbar-right { display: flex; align-items: center; gap: 10px; }
.back-btn {
  width: 36px; height: 36px;
  background: none; border: none;
  color: var(--text2); cursor: pointer;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
}
.back-btn:hover { background: var(--surface2); color: var(--text); }
.back-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }
.topbar-title { font-size: 15px; font-weight: 600; color: var(--text); }
.char-count { font-size: 12px; color: var(--text3); margin-left: 8px; }

.icon-btn {
  width: 36px; height: 36px;
  background: none; border: none;
  color: var(--text2); cursor: pointer;
  border-radius: var(--radius-sm);
  display: flex; align-items: center; justify-content: center;
  transition: background 0.2s, color 0.2s;
}
.icon-btn:hover { background: var(--surface2); color: var(--text); }
.icon-btn svg { width: 20px; height: 20px; stroke: currentColor; fill: none; stroke-width: 2; }

.send-btn {
  height: 36px; padding: 0 18px;
  background: linear-gradient(135deg, var(--accent), #2a9daf);
  border: none; border-radius: 18px;
  color: #fff; font-size: 14px; font-weight: 600;
  cursor: pointer; display: flex; align-items: center; gap: 8px;
  transition: opacity 0.2s, transform 0.15s;
}
.send-btn:hover { opacity: 0.9; }
.send-btn:active { transform: scale(0.97); }
.send-btn svg { width: 16px; height: 16px; fill: #fff; stroke: none; }

/* Content Area */
.content-area {
  flex: 1;
  overflow-y: auto;
  padding: 32px 16px 120px;
  display: flex; justify-content: center;
}
.content-area .editor-wrap {
  width: 100%; max-width: 720px;
}

/* The contenteditable */
#editor {
  min-height: 300px;
  outline: none;
  font-size: 15px;
  line-height: 1.7;
  color: var(--text);
  caret-color: var(--accent);
}
#editor:empty::before {
  content: 'Start typing your message...';
  color: var(--text3);
  pointer-events: none;
}

/* ===== WYSIWYG ELEMENT STYLES ===== */
#editor h1 { font-size: 28px; font-weight: 700; margin: 16px 0 8px; line-height: 1.3; }
#editor h2 { font-size: 24px; font-weight: 700; margin: 14px 0 6px; line-height: 1.3; }
#editor h3 { font-size: 20px; font-weight: 600; margin: 12px 0 6px; line-height: 1.35; }
#editor h4 { font-size: 18px; font-weight: 600; margin: 10px 0 4px; }
#editor h5 { font-size: 16px; font-weight: 600; margin: 8px 0 4px; }
#editor h6 { font-size: 14px; font-weight: 600; margin: 8px 0 4px; color: var(--text2); }

#editor b, #editor strong { font-weight: 700; }
#editor i, #editor em { font-style: italic; }
#editor u { text-decoration: underline; text-underline-offset: 2px; }
#editor s, #editor strike { text-decoration: line-through; opacity: 0.7; }

#editor a { color: var(--accent); text-decoration: underline; text-underline-offset: 2px; cursor: pointer; }

#editor code {
  font-family: var(--mono);
  font-size: 13px;
  background: var(--surface2);
  padding: 2px 6px;
  border-radius: 4px;
  color: #e0b0ff;
}
#editor pre {
  background: #1a1a2e;
  border-radius: var(--radius-sm);
  padding: 16px;
  margin: 12px 0;
  overflow-x: auto;
  border: 1px solid var(--border);
}
#editor pre code {
  background: none; padding: 0;
  font-size: 13px; line-height: 1.5;
  color: #c8d0e0;
}

#editor blockquote {
  border-left: 3px solid var(--accent);
  padding: 8px 16px;
  margin: 12px 0;
  color: var(--text2);
  background: rgba(51,180,201,0.04);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

#editor mark, #editor .tg-highlight {
  background: rgba(255,230,0,0.2);
  color: #ffe066;
  padding: 1px 4px;
  border-radius: 3px;
}

#editor .tg-spoiler {
  background: var(--surface3);
  color: transparent;
  border-radius: 3px;
  padding: 1px 4px;
  cursor: pointer;
  transition: background 0.3s, color 0.3s;
  user-select: none;
}
#editor .tg-spoiler.revealed {
  background: rgba(255,255,255,0.06);
  color: var(--text);
}

#editor ul, #editor ol { padding-left: 24px; margin: 8px 0; }
#editor li { margin: 4px 0; }
#editor ul li { list-style-type: disc; }
#editor ol li { list-style-type: decimal; }

#editor .checklist { list-style: none; padding-left: 0; }
#editor .checklist li { display: flex; align-items: flex-start; gap: 8px; }
#editor .checklist li input[type="checkbox"] {
  margin-top: 5px; accent-color: var(--accent);
  width: 16px; height: 16px; cursor: pointer;
}

#editor table {
  width: 100%;
  border-collapse: collapse;
  margin: 12px 0;
  font-size: 14px;
}
#editor table th, #editor table td {
  border: 1px solid var(--border);
  padding: 8px 12px;
  text-align: left;
}
#editor table th {
  background: var(--surface2);
  font-weight: 600;
}
#editor table tr:nth-child(even) td {
  background: rgba(255,255,255,0.02);
}

#editor hr {
  border: none;
  height: 1px;
  background: var(--border);
  margin: 20px 0;
}

#editor img {
  max-width: 100%;
  border-radius: var(--radius-sm);
  margin: 8px 0;
}

#editor details {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin: 12px 0;
}
#editor details summary {
  cursor: pointer;
  font-weight: 600;
  color: var(--text2);
  padding: 4px 0;
}

#editor .tg-map {
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 24px;
  margin: 12px 0;
  text-align: center;
  color: var(--text2);
  font-size: 13px;
}

#editor .tg-math, #editor .tg-math-block {
  font-family: var(--mono);
  font-size: 14px;
  color: #a0d0ff;
}
#editor .tg-math-block {
  display: block;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 12px 16px;
  margin: 12px 0;
  text-align: center;
}

#editor .pull-quote {
  border-left: 4px solid var(--accent2);
  padding: 12px 20px;
  margin: 16px 0;
  font-size: 18px;
  font-style: italic;
  color: var(--text2);
  background: rgba(124,92,255,0.04);
  border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
}

#editor .footnote-ref {
  color: var(--accent);
  font-size: 11px;
  vertical-align: super;
  cursor: pointer;
  font-weight: 600;
}
#editor .footnotes {
  border-top: 1px solid var(--border);
  margin-top: 24px;
  padding-top: 12px;
  font-size: 13px;
  color: var(--text2);
}
#editor .footnote-item { margin: 4px 0; }

/* ===== FLOATING TOOLBAR ===== */
.toolbar-wrapper {
  position: fixed;
  bottom: 0; left: 0; right: 0;
  z-index: 70;
  display: none;
  justify-content: center;
  padding: 0 8px 12px;
}
#editor-screen.active .toolbar-wrapper { display: flex; }

.toolbar {
  display: flex; align-items: center;
  gap: 2px;
  background: rgba(22,22,30,0.85);
  backdrop-filter: blur(20px) saturate(1.8);
  -webkit-backdrop-filter: blur(20px) saturate(1.8);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 6px 8px;
  max-width: calc(100vw - 16px);
  overflow-x: auto;
  overflow-y: hidden;
  scrollbar-width: none;
}
.toolbar::-webkit-scrollbar { display: none; }

.tb-divider {
  width: 1px; height: 28px;
  background: var(--border);
  margin: 0 4px;
  flex-shrink: 0;
}

.tb-btn {
  min-width: 36px; height: 36px;
  background: none; border: none;
  color: var(--text2);
  border-radius: var(--radius-sm);
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  font-size: 14px; font-weight: 600;
  transition: background 0.15s, color 0.15s;
  flex-shrink: 0;
  position: relative;
  padding: 0 6px;
  font-family: var(--font);
}
.tb-btn:hover { background: var(--surface2); color: var(--text); }
.tb-btn.active { background: rgba(51,180,201,0.15); color: var(--accent); }
.tb-btn svg { width: 18px; height: 18px; stroke: currentColor; fill: none; stroke-width: 2; }
.tb-btn .icon { font-size: 15px; line-height: 1; }

.plus-btn {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), var(--accent2));
  border: none; border-radius: 50%;
  color: #fff; font-size: 20px; font-weight: 300;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: transform 0.2s, opacity 0.2s;
}
.plus-btn:hover { transform: scale(1.08); }
.plus-btn:active { transform: scale(0.95); }

/* Block type dropdown */
.block-dropdown-btn {
  height: 32px; padding: 0 10px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text2);
  font-size: 12px;
  cursor: pointer;
  display: flex; align-items: center; gap: 4px;
  flex-shrink: 0;
  font-family: var(--font);
  transition: background 0.15s, color 0.15s;
}
.block-dropdown-btn:hover { background: var(--surface3); color: var(--text); }
.block-dropdown-btn svg { width: 12px; height: 12px; stroke: currentColor; fill: none; stroke-width: 2; }

/* ===== DROPDOWN MENUS ===== */
.dropdown-menu {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 6px;
  min-width: 180px;
  max-height: 360px;
  overflow-y: auto;
  z-index: 200;
  display: none;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.dropdown-menu.open { display: block; }
.dropdown-item {
  display: flex; align-items: center; gap: 10px;
  padding: 8px 12px;
  border-radius: var(--radius-sm);
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: background 0.15s, color 0.15s;
  border: none; background: none;
  width: 100%;
  text-align: left;
  font-family: var(--font);
}
.dropdown-item:hover { background: var(--surface2); color: var(--text); }
.dropdown-item .item-icon { width: 20px; text-align: center; font-size: 14px; flex-shrink: 0; }
.dropdown-item .item-label { flex: 1; }
.dropdown-item .badge {
  font-size: 9px; background: var(--accent2); color: #fff;
  padding: 1px 5px; border-radius: 8px; font-weight: 700;
}
.dropdown-divider { height: 1px; background: var(--border); margin: 4px 0; }

/* ===== TABLE GRID PICKER ===== */
.table-picker {
  position: fixed;
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px;
  z-index: 200;
  display: none;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.table-picker.open { display: block; }
.table-picker-grid {
  display: grid;
  grid-template-columns: repeat(6, 24px);
  gap: 3px;
}
.table-picker-cell {
  width: 24px; height: 24px;
  border: 1px solid var(--border);
  border-radius: 3px;
  cursor: pointer;
  transition: background 0.1s, border-color 0.1s;
}
.table-picker-cell.highlighted {
  background: rgba(51,180,201,0.25);
  border-color: var(--accent);
}
.table-picker-label {
  text-align: center;
  font-size: 12px;
  color: var(--text2);
  margin-top: 8px;
}

/* ===== INSERT MENU ===== */
.insert-menu {
  position: fixed;
  bottom: 76px;
  left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px;
  min-width: 260px;
  max-height: 400px;
  overflow-y: auto;
  z-index: 200;
  display: none;
  box-shadow: 0 12px 40px rgba(0,0,0,0.5);
}
.insert-menu.open { display: block; }

/* ===== SETTINGS PANEL ===== */
.settings-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 300;
  display: none;
  opacity: 0;
  transition: opacity 0.3s;
}
.settings-overlay.open { display: block; opacity: 1; }
.settings-panel {
  position: fixed;
  top: 0; right: -400px;
  width: 380px; max-width: 90vw;
  height: 100%;
  background: var(--surface);
  border-left: 1px solid var(--border);
  z-index: 310;
  display: flex; flex-direction: column;
  transition: right 0.35s ease;
  box-shadow: -8px 0 40px rgba(0,0,0,0.4);
}
.settings-panel.open { right: 0; }
.settings-header {
  height: var(--topbar-h);
  display: flex; align-items: center;
  padding: 0 16px;
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}
.settings-header h3 { flex: 1; font-size: 16px; font-weight: 600; }
.settings-body {
  flex: 1; overflow-y: auto; padding: 24px 20px;
}
.settings-field { margin-bottom: 20px; }
.settings-field label {
  display: block; font-size: 13px; font-weight: 600;
  color: var(--text2); margin-bottom: 6px;
}
.settings-field input, .settings-field select {
  width: 100%; height: 40px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  color: var(--text);
  font-size: 14px;
  padding: 0 12px;
  font-family: var(--font);
  transition: border-color 0.2s;
}
.settings-field input:focus, .settings-field select:focus {
  outline: none;
  border-color: var(--accent);
}
.settings-field select { cursor: pointer; }
.settings-field select option { background: var(--surface); }

.char-counter-bar {
  background: var(--surface2);
  border-radius: 4px;
  height: 6px;
  margin-top: 6px;
  overflow: hidden;
}
.char-counter-fill {
  height: 100%;
  background: var(--accent);
  border-radius: 4px;
  transition: width 0.3s;
}
.char-counter-fill.warning { background: #ffaa00; }
.char-counter-fill.danger { background: var(--danger); }

.settings-note {
  font-size: 12px;
  color: var(--text3);
  margin-top: 4px;
  font-style: italic;
}

.settings-footer {
  padding: 16px 20px;
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}
.save-btn {
  width: 100%; height: 44px;
  background: linear-gradient(135deg, var(--accent), #2a9daf);
  border: none; border-radius: var(--radius-sm);
  color: #fff; font-size: 15px; font-weight: 600;
  cursor: pointer;
  transition: opacity 0.2s;
}
.save-btn:hover { opacity: 0.9; }

.settings-fun {
  text-align: center;
  padding: 16px 0 0;
  font-size: 12px;
  color: var(--text3);
}

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 100px; left: 50%;
  transform: translateX(-50%) translateY(20px);
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 12px 20px;
  font-size: 14px;
  color: var(--text);
  z-index: 400;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s, transform 0.3s;
  box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  display: flex; align-items: center; gap: 8px;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); pointer-events: auto; }
.toast.success { border-color: var(--success); }
.toast.error { border-color: var(--danger); }

/* ===== PREVIEW MODAL ===== */
.preview-overlay {
  position: fixed; inset: 0;
  background: rgba(0,0,0,0.7);
  z-index: 350;
  display: none; align-items: center; justify-content: center;
}
.preview-overlay.open { display: flex; }
.preview-modal {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  width: 90%; max-width: 600px; max-height: 80vh;
  overflow-y: auto; padding: 24px;
}
.preview-modal pre {
  font-family: var(--mono);
  font-size: 13px;
  white-space: pre-wrap;
  word-break: break-all;
  color: var(--text);
  background: var(--surface2);
  padding: 16px;
  border-radius: var(--radius-sm);
}

/* ===== MOBILE ===== */
@media (max-width: 600px) {
  .toolbar { padding: 4px 6px; gap: 1px; }
  .tb-btn { min-width: 32px; height: 32px; font-size: 12px; }
  .plus-btn { width: 32px; height: 32px; font-size: 18px; }
  .tb-divider { margin: 0 2px; }
  .content-area { padding: 20px 12px 110px; }
  .topbar-title { font-size: 13px; }

/* ===== NEW FEATURE STYLES ===== */
.tg-mention { color: var(--accent); text-decoration: none; font-weight: 500; }

.tg-anchor { color: var(--accent2); font-size: 0.85em; text-decoration: none; }
.tg-spoiler-media { position: relative; display: inline-block; filter: blur(10px); cursor: pointer; border-radius: 8px; overflow: hidden; transition: filter 0.3s; }
.tg-spoiler-media:hover, .tg-spoiler-media.revealed { filter: none; }
.tg-spoiler-media img, .tg-spoiler-media video { max-width: 100%; border-radius: 8px; display: block; }
.tg-collage { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 4px; margin: 12px 0; border-radius: 8px; overflow: hidden; }
.tg-collage img { width: 100%; height: 150px; object-fit: cover; border-radius: 4px; }
.tg-slideshow { display: flex; gap: 4px; overflow-x: auto; margin: 12px 0; padding-bottom: 4px; scroll-snap-type: x mandatory; }
.tg-slideshow img, .tg-slideshow video { min-width: 200px; max-width: 300px; border-radius: 8px; scroll-snap-align: start; flex-shrink: 0; }
.tg-figcaption { font-size: 13px; color: var(--text2); text-align: center; margin-top: 6px; font-style: italic; }
.tg-map iframe { width: 100%; height: 200px; border: 1px solid var(--border); border-radius: 8px; }
table.bordered { border-collapse: collapse; width: 100%; margin: 12px 0; }
table.bordered th, table.bordered td { border: 1px solid var(--border); padding: 8px 12px; text-align: left; }
table.bordered caption { font-size: 13px; color: var(--text2); margin-bottom: 4px; font-weight: 600; }
table.striped tr:nth-child(even) { background: var(--surface2); }
table th { background: var(--surface2); font-weight: 600; }

<script>
// ===== STATE =====
let footnoteCount = 0;
let currentOutput = '';

// ===== INIT =====
document.addEventListener('DOMContentLoaded', () => {
  loadSettings();
  initTablePicker();
  initEditor();
  initKeyboardShortcuts();
  initSpoilerClicks();
  initScrollLanding();
});

// ===== LANDING / EDITOR TOGGLE =====
function showEditor() {
  document.getElementById('landing').classList.add('hidden');
  const ed = document.getElementById('editor-screen');
  ed.classList.add('active');
  setTimeout(() => document.getElementById('editor').focus(), 400);
}
function showLanding() {
  document.getElementById('editor-screen').classList.remove('active');
  document.getElementById('landing').classList.remove('hidden');
}

// Auto-show editor on scroll
function initScrollLanding() {
  let scrolled = false;
  window.addEventListener('wheel', (e) => {
    if (!scrolled && e.deltaY > 0 && !document.getElementById('editor-screen').classList.contains('active')) {
      scrolled = true;
      showEditor();
    }
  }, { passive: true });
  // Touch support
  let touchStartY = 0;
  window.addEventListener('touchstart', (e) => { touchStartY = e.touches[0].clientY; }, { passive: true });
  window.addEventListener('touchmove', (e) => {
    if (!scrolled && touchStartY - e.touches[0].clientY > 30 && !document.getElementById('editor-screen').classList.contains('active')) {
      scrolled = true;
      showEditor();
    }
  }, { passive: true });
}

// ===== EDITOR INIT =====
function initEditor() {
  const editor = document.getElementById('editor');
  editor.addEventListener('input', updateCharCount);
  editor.addEventListener('input', updateBlockType);
  // Click on spoiler to reveal
  editor.addEventListener('click', (e) => {
    if (e.target.classList.contains('tg-spoiler')) {
      e.target.classList.toggle('revealed');
    }
    // Checkbox toggle
    if (e.target.type === 'checkbox') {
      e.target.checked = !e.target.checked;
    }
  });
}

// ===== EXEC COMMAND =====
function execCmd(cmd, value) {
  document.getElementById('editor').focus();
  document.execCommand(cmd, false, value || null);
  updateCharCount();
}

// ===== FORMATTING FUNCTIONS =====
function insertInlineCode() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  if (range.collapsed) {
    const code = document.createElement('code');
    code.textContent = 'code';
    range.insertNode(code);
    range.selectNodeContents(code);
    sel.removeAllRanges();
    sel.addRange(range);
  } else {
    const text = range.toString();
    const code = document.createElement('code');
    code.textContent = text;
    range.deleteContents();
    range.insertNode(code);
  }
}

function insertSpoiler() {
  wrapSelection('span', 'tg-spoiler', 'spoiler');
}

function insertHighlight() {
  wrapSelection('mark', '', 'highlighted text');
}

function insertMath() {
  const formula = prompt('Enter inline formula (LaTeX):');
  if (!formula) return;
  const span = document.createElement('span');
  span.className = 'tg-math';
  span.textContent = formula;
  insertAtCursor(span);
}

function insertMathBlock() {
  closeAllMenus();
  const formula = prompt('Enter block formula (LaTeX):');
  if (!formula) return;
  const div = document.createElement('div');
  div.className = 'tg-math-block';
  div.textContent = formula;
  insertAtCursor(div);
}

function insertLink() {
  const sel = window.getSelection();
  const text = sel.toString() || 'link text';
  const url = prompt('Enter URL:');
  if (!url) return;
  const a = document.createElement('a');
  a.href = url;
  a.textContent = text;
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    range.deleteContents();

function updateBlockType() {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  let node = sel.anchorNode;
  if (node.nodeType === 3) node = node.parentElement;
  const blockTags = ['P','H1','H2','H3','H4','H5','H6','BLOCKQUOTE','PRE','LI','DIV'];
  while (node && node.id !== 'editor') {
    if (blockTags.includes(node.tagName)) {
      const labels = { P:'Paragraph', H1:'Heading 1', H2:'Heading 2', H3:'Heading 3', H4:'Heading 4', H5:'Heading 5', H6:'Heading 6', BLOCKQUOTE:'Blockquote', PRE:'Code Block', LI:'List Item', DIV:'Block' };
      document.getElementById('currentBlockType').textContent = labels[node.tagName] || node.tagName;
      return;
    }
    node = node.parentElement;
  }
  document.getElementById('currentBlockType').textContent = 'Paragraph';
}

// ===== HELPERS =====
function wrapSelection(tag, className, placeholder) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  const range = sel.getRangeAt(0);
  const text = range.toString() || placeholder;
  const el = document.createElement(tag);
  if (className) el.className = className;
  el.textContent = text;
  range.deleteContents();
  range.insertNode(el);
  // Select the wrapped content
  range.selectNodeContents(el);
  sel.removeAllRanges();
  sel.addRange(range);
}

function insertAtCursor(el) {
  const sel = window.getSelection();
  const editor = document.getElementById('editor');
  if (sel.rangeCount) {
    const range = sel.getRangeAt(0);
    // Make sure we're inside the editor
    if (editor.contains(range.commonAncestorContainer)) {
      range.deleteContents();
      range.insertNode(el);
      // Move cursor after element
      range.setStartAfter(el);
      range.collapse(true);
      sel.removeAllRanges();
      sel.addRange(range);
    } else {
      editor.appendChild(el);
    }
  } else {
    editor.appendChild(el);
  }
  updateCharCount();
}

function escapeHTML(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

      else if (e.key === 'e') { e.preventDefault(); insertInlineCode(); }
      else if (e.shiftKey && e.key === 'X') { e.preventDefault(); execCmd('strikethrough'); }
      else if (e.shiftKey && (e.key === 'S' || e.key === 's')) { e.preventDefault(); insertSpoiler(); }
      else if (e.shiftKey && (e.key === 'H' || e.key === 'h')) { e.preventDefault(); insertHighlight(); }
    }
    // Tab in code blocks
    if (e.key === 'Tab') {
      const sel = window.getSelection();
      if (sel.rangeCount) {
        let node = sel.anchorNode;
        if (node.nodeType === 3) node = node.parentElement;
        if (node.closest('pre')) {
          e.preventDefault();
          document.execCommand('insertText', false, '  ');
        }
      }
    }
  });
}

function addTableCaption() {

  const table = node.closest('table');

function mergeCells(direction) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  let node = sel.anchorNode;
  if (node.nodeType === 3) node = node.parentElement;
  const td = node.closest('td, th');
  if (!td) { showToast('Place cursor in a cell first', 'error'); return; }
  if (direction === 'h') {
    const next = td.nextElementSibling;
    if (next && (next.tagName === 'TD' || next.tagName === 'TH')) {
      td.colSpan = (td.colSpan || 1) + 1;
      next.remove();
      showToast('Cells merged', 'success');
    }
  } else {
    const tr = td.closest('tr');
    const idx = td.cellIndex;
    const nextRow = tr.nextElementSibling;
    if (nextRow) {
      const below = nextRow.cells[idx];
      if (below) {
        td.rowSpan = (td.rowSpan || 1) + 1;
        below.remove();
        showToast('Cells merged', 'success');
      }
    }
  }
}

function alignCell(align) {
  const sel = window.getSelection();
  if (!sel.rangeCount) return;
  let node = sel.anchorNode;
  if (node.nodeType === 3) node = node.parentElement;
  const td = node.closest('td, th');
  if (!td) { showToast('Place cursor in a cell first', 'error'); return; }
  td.style.textAlign = align;
}

// ===== sendRichMessageDraft (typing/streaming) =====
function sendDraft() {
  const settings = JSON.parse(localStorage.getItem('tfr_settings') || '{}');
  if (!settings.token || !settings.chatId) { showToast('Configure Bot Token and Chat ID in Settings first', 'error'); return; }
  const mode = settings.parseMode || 'MarkdownV2';
  const text = convertDOMToTelegram(mode);
  if (!text.trim()) { showToast('Nothing to send', 'error'); return; }
  const url = 'https://api.telegram.org/bot' + settings.token + '/sendMessage';
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: settings.chatId,
      text: text,
      parse_mode: mode,
      disable_notification: true
    })
  }).then(r => r.json()).then(d => {
    if (d.ok) showToast('Draft sent!', 'success');
    else showToast('Error: ' + (d.description || 'Unknown'), 'error');
  }).catch(() => showToast('Network error', 'error'));
}

function editLastMessage(messageId) {
  const settings = JSON.parse(localStorage.getItem('tfr_settings') || '{}');
  if (!settings.token || !settings.chatId) { showToast('Configure Bot Token and Chat ID first', 'error'); return; }
  if (!messageId) { showToast('Provide a message_id to edit', 'error'); return; }
  const mode = settings.parseMode || 'MarkdownV2';
  const text = convertDOMToTelegram(mode);
  const url = 'https://api.telegram.org/bot' + settings.token + '/editMessageText';
  fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      chat_id: settings.chatId,
      message_id: messageId,
      text: text,
      parse_mode: mode
    })
  }).then(r => r.json()).then(d => {
    if (d.ok) showToast('Message edited!', 'success');
    else showToast('Error: ' + (d.description || 'Unknown'), 'error');
  }).catch(() => showToast('Network error', 'error'));
}

// ===== DOM TO TELEGRAM CONVERTER =====
function convertDOMToTelegram(mode) {
  const editor = document.getElementById('editor');
  if (mode === 'HTML') return domToHTML(editor);
  return domToMarkdown(editor);
}

// --- MARKDOWN CONVERTER ---
function domToMarkdown(root) {
  let result = '';
  const children = Array.from(root.childNodes);
  for (const child of children) {
    result += nodeToMd(child);
  }
  return result.trim();
}

function nodeToMd(node) {
  if (node.nodeType === 3) {
    return escapeMdText(node.textContent);
  }
  if (node.nodeType !== 1) return '';
  const tag = node.tagName;
  const inner = Array.from(node.childNodes).map(c => nodeToMd(c)).join('');

  switch (tag) {
    case 'B': case 'STRONG': return '*' + inner + '*';
    case 'I': case 'EM': return '_' + inner.replace(/_/g, '\\_') + '_';
    case 'U': case 'INS': return '__' + inner + '__';
    case 'S': case 'STRIKE': case 'DEL': return '~' + inner + '~';
    case 'A': {
      const href = node.getAttribute('href') || '';
      return '[' + inner + '](' + escapeMdUrl(href) + ')';
    }
    case 'CODE': {
      if (node.parentElement && node.parentElement.tagName === 'PRE') return inner;
      return '`' + inner + '`';
    }
    case 'PRE': return '\n```\n' + node.textContent + '\n```\n';
    case 'H1': return '\n# ' + inner.trim() + '\n';
    case 'H2': return '\n## ' + inner.trim() + '\n';
    case 'H3': return '\n### ' + inner.trim() + '\n';
    case 'H4': return '\n#### ' + inner.trim() + '\n';
    case 'H5': return '\n##### ' + inner.trim() + '\n';
    case 'H6': return '\n###### ' + inner.trim() + '\n';
    case 'BLOCKQUOTE': {
      if (node.classList.contains('pull-quote')) {
        return '\n> ' + inner.trim().split('\n').join('\n> ') + '\n';
      }
      return '\n' + inner.trim().split('\n').map(l => '> ' + l).join('\n') + '\n';
    }
    case 'MARK': return '==' + inner + '==';
    case 'BR': return '\n';
    case 'HR': return '\n---\n';
    case 'IMG': return '![' + (node.alt || 'image') + '](' + (node.src || '') + ')';
    case 'DIV': {
      if (node.classList.contains('tg-spoiler')) return '||' + inner + '||';
      if (node.classList.contains('tg-collage')) {
        const imgs = node.querySelectorAll('img');
        const cap = node.querySelector('.tg-figcaption');
        let r = '\n';
        imgs.forEach(img => r += '![' + (img.alt || 'collage') + '](' + img.src + ')\n');
        if (cap) r += '_' + cap.textContent + '_\n';
        return r;
      }
      if (node.classList.contains('tg-slideshow')) {
        const items = node.querySelectorAll('img, video, audio');
        const cap = node.querySelector('.tg-figcaption');
        let r = '\n';
        items.forEach(item => {
          if (item.tagName === 'IMG') r += '![' + (item.alt || 'slide') + '](' + item.src + ')\n';
          else r += '[' + item.tagName + '](' + (item.src || '') + ')\n';
        });
        if (cap) r += '_' + cap.textContent + '_\n';
        return r;
      }
      if (node.classList.contains('tg-spoiler-media')) {
        const child = node.querySelector('img, video, audio');
        if (!child) return inner;
        if (child.tagName === 'IMG') return '||![' + (child.alt || 'image') + '](' + child.src + ')||';
        return '||[' + child.tagName + '](' + (child.src || '') + ')||';
      }
      if (node.classList.contains('tg-map')) {
        return '\n[📍 Location](https://maps.google.com/?q=' + (node.dataset.lat || '') + ',' + (node.dataset.long || '') + ')\n';
      }
      if (node.classList.contains('tg-math-block')) return '\n$$\n' + node.textContent + '\n$$\n';
      if (node.classList.contains('footnotes')) return '\n---\n' + inner;
      if (node.classList.contains('footnote-item')) return inner;
      return '\n' + inner;
    }
    case 'SPAN': {
      if (node.classList.contains('tg-spoiler')) return '||' + inner + '||';
      if (node.classList.contains('tg-math')) return '$' + node.textContent + '$';
      return inner;
    }
    case 'SUP': {
      if (node.classList.contains('footnote-ref')) return '^[' + node.textContent + ']';
      return '^' + inner;
    }
    case 'SUB': return '~' + inner + '~';
    case 'UL': {
      if (node.classList.contains('checklist')) {
        return '\n' + Array.from(node.children).map(li => {
          const cb = li.querySelector('input[type="checkbox"]');
          const checked = cb && cb.checked ? 'x' : ' ';
          const text = li.textContent.trim();
          return '- [' + checked + '] ' + text;
        }).join('\n') + '\n';
      }
      return '\n' + Array.from(node.children).map(li => '- ' + nodeToMd(li).trim()).join('\n') + '\n';
    }
    case 'OL': return '\n' + Array.from(node.children).map((li, i) => (i + 1) + '. ' + nodeToMd(li).trim()).join('\n') + '\n';
    case 'LI': return inner;
    case 'TABLE': return tableToMd(node);
    case 'DETAILS': {
      const summary = node.querySelector('summary');
      const summaryText = summary ? summary.textContent : 'Details';
      // Remove summary from content for the rest
      let content = '';
      for (const ch of node.childNodes) {
        if (ch !== summary) content += nodeToMd(ch);
      }
      return '\n<details><summary>' + escapeHTML(summaryText) + '</summary>' + content.trim() + '</details>\n';
    }
    case 'SUMMARY': return '';
    case 'FIGURE': {
      const img = node.querySelector('img');
      const cap = node.querySelector('figcaption');
      let r = '';
      if (img) r += '![' + (img.alt || 'image') + '](' + img.src + ')';
      if (cap) r += '\n_' + cap.textContent + '_';
      return '\n' + r + '\n';
    }
    case 'FIGCAPTION': return '';
    case 'FOOTER': return '\n' + inner.trim() + '\n';
    case 'SUB': return '~' + inner + '~';
    case 'SUP': {
      if (node.classList.contains('footnote-ref')) return '^[' + node.textContent + ']';
      return '^' + inner;
    }
    case 'SPAN': {
      if (node.classList.contains('tg-spoiler')) return '||' + inner + '||';
      if (node.classList.contains('tg-math')) return '$' + node.textContent + '$';
      if (node.classList.contains('tg-mention')) return '[' + inner + '](tg://user?id=' + node.href.split('=').pop() + ')';
      if (node.classList.contains('tg-custom-emoji')) return inner; // fallback text
      if (node.classList.contains('tg-time')) return inner; // display text
      return inner;
    }
    case 'P': return '\n' + inner.trim() + '\n';
    case 'VIDEO': return '\n[Video](' + (node.src || '') + ')\n';
    case 'AUDIO': return '\n[Audio](' + (node.src || '') + ')\n';
    default: return inner;
  }
}

function tableToMd(table) {
  const rows = [];
  const trs = table.querySelectorAll('tr');
  trs.forEach(tr => {
    const cells = Array.from(tr.querySelectorAll('th, td')).map(c => c.textContent.replace(/\|/g, '\\|').trim());
    rows.push('| ' + cells.join(' | ') + ' |');
  });
  if (rows.length < 1) return '';
  // Add separator after first row
  const headerRow = rows[0];
  const sep = '| ' + headerRow.split('|').filter(Boolean).slice(1, -1).map(() => '---').join(' | ') + ' |';
  return '\n' + headerRow + '\n' + sep + '\n' + rows.slice(1).join('\n') + '\n';
}

function escapeMdText(text) {
  // Escape special MarkdownV2 characters
  return text
    .replace(/\\/g, '\\\\')
    .replace(/([_*\[\]()~`>#+\-=|{}.!\\])/g, '\\$1');
}

function escapeMdUrl(url) {
  return url.replace(/\)/g, '\\)').replace(/\(/g, '\\(');
}

// --- HTML CONVERTER ---
function domToHTML(root) {
  let result = '';
  const children = Array.from(root.childNodes);
  for (const child of children) {
    result += nodeToHTML(child);
  }
  return result.trim();
}

function nodeToHTML(node) {
  if (node.nodeType === 3) return escapeHTML(node.textContent);
  if (node.nodeType !== 1) return '';
  const tag = node.tagName;
  const allowed = ['b','strong','i','em','u','ins','s','strike','del','a','code','pre','h1','h2','h3','h4','h5','h6','blockquote','br','hr','ul','ol','li','table','thead','tbody','tr','th','td'];
  const inner = Array.from(node.childNodes).map(c => nodeToHTML(c)).join('');

  // Spoiler
  if (node.classList.contains('tg-spoiler')) {
    return '<span class="tg-spoiler">' + inner + '</span>';
  }
  if (tag === 'MARK') return '<tg-spoiler>' + inner + '</tg-spoiler>'; // Telegram doesn't have highlight in HTML, use spoiler
  if (tag === 'DIV' && node.classList.contains('tg-math-block')) return '<pre>' + escapeHTML(node.textContent) + '</pre>';
  if (tag === 'SPAN' && node.classList.contains('tg-math')) return '<code>' + escapeHTML(node.textContent) + '</code>';
  if (tag === 'DIV' && node.classList.contains('tg-map')) {
    return '<a href="https://maps.google.com/?q=' + (node.dataset.lat || '') + ',' + (node.dataset.long || '') + '">📍 Location</a>';
  }
  if (tag === 'DIV' && node.classList.contains('footnotes')) return '<hr>' + inner;
  if (tag === 'DIV' && node.classList.contains('footnote-item')) return '<p>' + inner + '</p>';

  const lower = tag.toLowerCase();
  if (tag === 'A') {
    const href = node.getAttribute('href') || '';
    return '<a href="' + escapeHTML(href) + '">' + inner + '</a>';
  }
  if (tag === 'PRE') {
    const code = node.querySelector('code');
    return '<pre>' + escapeHTML(code ? code.textContent : node.textContent) + '</pre>';
  }
  if (tag === 'IMG') return '<a href="' + escapeHTML(node.src || '') + '">📷 Image</a>';
  if (tag === 'VIDEO') return '<a href="' + escapeHTML(node.src || '') + '">🎬 Video</a>';
  if (tag === 'AUDIO') return '<a href="' + escapeHTML(node.src || '') + '">🎵 Audio</a>';
  if (tag === 'FIGURE') {
    const img = node.querySelector('img');
    const cap = node.querySelector('figcaption');
    let r = '';
    if (img) r += '<a href="' + escapeHTML(img.src) + '">📷 Image</a>';
    if (cap) r += '\n<i>' + escapeHTML(cap.textContent) + '</i>';
    return r;
  }
  if (tag === 'DETAILS') {
    const summary = node.querySelector('summary');
    const summaryText = summary ? escapeHTML(summary.textContent) : 'Details';
    let content = '';
    for (const ch of node.childNodes) {
      if (ch !== summary) content += nodeToHTML(ch);
    }
    return '<b>' + summaryText + '</b>\n' + content;
  }
  if (tag === 'SUMMARY') return '';
  if (tag === 'SUP' && node.classList.contains('footnote-ref')) return '<sup>' + inner + '</sup>';
  if (tag === 'FOOTER') return '<p>' + inner.trim() + '</p>';

  if (allowed.includes(lower)) {
    return '<' + lower + '>' + inner + '</' + lower + '>';
  }
  if (tag === 'P') return '<p>' + inner + '</p>';
  if (tag === 'DIV' || tag === 'SECTION') return inner;
  if (tag === 'UL' && node.classList.contains('checklist')) {
    return '<ul>' + Array.from(node.children).map(li => {
      const cb = li.querySelector('input[type="checkbox"]');
      const checked = cb && cb.checked ? '☑' : '☐';
      return '<li>' + checked + ' ' + nodeToHTML(li).replace(/<li>|<\/li>/g, '') + '</li>';
    }).join('') + '</ul>';
  }
  return inner;
}

// ===== SEND MESSAGE =====
async function sendMessage() {
  const settings = JSON.parse(localStorage.getItem('tfr_settings') || '{}');
  if (!settings.token || !settings.chatId) {
    showToast('Please configure Bot Token and Chat ID in Settings', 'error');
    toggleSettings();
    return;
  }

  const mode = settings.parseMode || 'MarkdownV2';
  const text = convertDOMToTelegram(mode);

  if (!text || text.trim().length === 0) {
    showToast('Nothing to send — type something first!', 'error');
    return;
  }

  const chatId = settings.chatId;
  const baseUrl = 'https://api.telegram.org/bot' + settings.token;

  showToast('Sending...', '');

  // Try sendMessage with parse_mode
  try {
    const body = {
      chat_id: chatId,
      text: text,
      parse_mode: mode,
    };
    const resp = await fetch(baseUrl + '/sendMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
    const data = await resp.json();
    if (data.ok) {
      showToast('✓ Sent successfully!', 'success');
      return;
    }
    // If MarkdownV2 failed, try without parse_mode as plain text
    if (!data.ok && mode === 'MarkdownV2') {
      console.warn('MarkdownV2 failed, retrying as plain text', data.description);
      const resp2 = await fetch(baseUrl + '/sendMessage', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ chat_id: chatId, text: document.getElementById('editor').textContent }),
      });
      const data2 = await resp2.json();
      if (data2.ok) {
        showToast('✓ Sent as plain text (formatting error)', 'success');
      } else {
        showToast('✗ Send failed: ' + (data2.description || 'Unknown error'), 'error');
      }
    } else {
      showToast('✗ Send failed: ' + (data.description || 'Unknown error'), 'error');
    }
  } catch (err) {
    showToast('✗ Network error: ' + err.message, 'error');
  }
}
