<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Free Rich Text Editor — Telegram</title>
<style>
:root {
  --bg: #0a0a1a;
  --surface: #12122a;
  --surface2: #1a1a3e;
  --accent: #7c5cff;
  --accent2: #a78bfa;
  --text: #f0f0f5;
  --text2: #8888a0;
  --border: #2a2a4e;
  --danger: #ff4466;
  --success: #44ffaa;
  --warn: #ffaa44;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif; background: var(--bg); color: var(--text); }
body { display: flex; flex-direction: column; }

/* Banner */
.banner {
  background: linear-gradient(90deg, var(--surface2), var(--surface));
  border-bottom: 1px solid var(--border);
  padding: 8px 16px;
  display: flex; align-items: center; justify-content: space-between;
  font-size: 13px; color: var(--text2);
  animation: slideDown 0.4s ease;
}
.banner .banner-text { font-style: italic; }
.banner .banner-dismiss {
  background: none; border: none; color: var(--text2); cursor: pointer;
  font-size: 16px; padding: 2px 8px; border-radius: 4px;
  transition: color 0.2s, background 0.2s;
}
.banner .banner-dismiss:hover { color: var(--text); background: var(--surface2); }
.banner.hidden { display: none; }
@keyframes slideDown { from { transform: translateY(-100%); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

/* Header */
.header {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 10px 20px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
}
.header-left { display: flex; align-items: center; gap: 14px; }
.header-logo {
  width: 28px; height: 28px; background: var(--accent);
  border-radius: 8px; display: flex; align-items: center; justify-content: center;
}
.header-logo svg { width: 18px; height: 18px; fill: white; }
.header-title { font-size: 16px; font-weight: 700; letter-spacing: -0.3px; }
.header-title span { color: var(--accent2); }

/* Mode tabs */
.mode-tabs {
  display: flex; gap: 0; background: var(--bg); border-radius: 8px; overflow: hidden;
  border: 1px solid var(--border);
}
.mode-tab {
  padding: 6px 18px; font-size: 13px; font-weight: 600; cursor: pointer;
  background: transparent; color: var(--text2); border: none;
  transition: all 0.2s;
}
.mode-tab.active { background: var(--accent); color: white; }
.mode-tab:not(.active):hover { color: var(--text); background: var(--surface2); }

/* Header right */
.header-right { display: flex; align-items: center; gap: 8px; }
.char-counter {
  font-size: 12px; padding: 4px 10px; border-radius: 12px;
  background: var(--bg); border: 1px solid var(--border);
  font-variant-numeric: tabular-nums; white-space: nowrap;
}
.char-counter.warn { color: var(--warn); border-color: var(--warn); }
.char-counter.danger { color: var(--danger); border-color: var(--danger); background: rgba(255,68,102,0.1); }

.btn-icon {
  width: 34px; height: 34px; border-radius: 8px;
  background: var(--bg); border: 1px solid var(--border);
  color: var(--text2); cursor: pointer; display: flex;
  align-items: center; justify-content: center;
  transition: all 0.2s;
}
.btn-icon:hover { color: var(--text); border-color: var(--accent); background: var(--surface2); }
.btn-icon svg { width: 16px; height: 16px; fill: currentColor; }

.btn-send {
  padding: 7px 18px; border-radius: 8px; border: none;
  background: var(--accent); color: white; font-weight: 600;
  font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px;
  transition: all 0.2s;
}
.btn-send:hover { background: var(--accent2); transform: translateY(-1px); }
.btn-send svg { width: 14px; height: 14px; fill: white; }

/* Toolbar */
.toolbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 6px 12px;
  display: flex; flex-wrap: wrap; gap: 3px; align-items: center;
}
.toolbar-group { display: flex; gap: 2px; align-items: center; }
.toolbar-sep { width: 1px; height: 22px; background: var(--border); margin: 0 6px; }
.toolbar-btn {
  width: 32px; height: 32px; border-radius: 6px;
  background: transparent; border: none; color: var(--text2);
  cursor: pointer; display: flex; align-items: center; justify-content: center;
  transition: all 0.15s; position: relative;
}
.toolbar-btn:hover { color: var(--text); background: var(--surface2); }
.toolbar-btn.active { color: var(--accent); background: rgba(124,92,255,0.15); }
.toolbar-btn svg { width: 16px; height: 16px; fill: currentColor; }
.toolbar-btn .kbd-hint {
  position: absolute; bottom: -18px; left: 50%; transform: translateX(-50%);
  font-size: 9px; color: var(--text2); background: var(--surface);
  padding: 1px 4px; border-radius: 3px; white-space: nowrap;
  opacity: 0; pointer-events: none; transition: opacity 0.2s;
}
.toolbar-btn:hover .kbd-hint { opacity: 1; }

/* Dropdown */
.dropdown { position: relative; }
.dropdown-menu {
  position: absolute; top: 100%; left: 0; margin-top: 4px;
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 4px; min-width: 140px;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4); z-index: 100;
  display: none;
}
.dropdown-menu.open { display: block; animation: fadeIn 0.15s ease; }
.dropdown-item {
  padding: 7px 12px; border-radius: 5px; cursor: pointer;
  font-size: 13px; color: var(--text2); transition: all 0.15s;
  display: block; width: 100%; background: none; border: none; text-align: left;
}
.dropdown-item:hover { color: var(--text); background: var(--surface); }
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: translateY(0); } }

/* Main layout */
.main {
  flex: 1; display: flex; overflow: hidden; position: relative;
}
.editor-pane, .preview-pane {
  flex: 1; display: flex; flex-direction: column; overflow: hidden;
  min-width: 0;
}
.editor-pane { border-right: 1px solid var(--border); }
.pane-header {
  padding: 8px 16px; font-size: 11px; font-weight: 600;
  text-transform: uppercase; letter-spacing: 1px;
  color: var(--text2); background: var(--bg);
  border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 6px;
}
.pane-header svg { width: 12px; height: 12px; fill: var(--text2); }

#editor {
  flex: 1; width: 100%; resize: none; border: none; outline: none;
  background: var(--bg); color: var(--text); padding: 16px;
  font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', monospace;
  font-size: 14px; line-height: 1.6; tab-size: 2;
  unicode-bidi: plaintext;
}
#editor::placeholder { color: var(--text2); }

.preview-content {
  flex: 1; overflow-y: auto; padding: 16px; background: var(--bg);
  font-size: 14px; line-height: 1.7;
}
.preview-content::-webkit-scrollbar { width: 6px; }
.preview-content::-webkit-scrollbar-track { background: transparent; }
.preview-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
#editor::-webkit-scrollbar { width: 6px; }
#editor::-webkit-scrollbar-track { background: transparent; }
#editor::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

/* Resize handle */
.resize-handle {
  width: 5px; background: var(--border); cursor: col-resize;
  transition: background 0.2s; flex-shrink: 0;
}
.resize-handle:hover, .resize-handle.dragging { background: var(--accent); }

/* Settings panel */
.settings-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  z-index: 500; display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(4px);
}
.settings-overlay.open { display: flex; animation: fadeIn 0.2s; }
.settings-panel {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 16px; padding: 28px; width: 420px; max-width: 95vw;
  box-shadow: 0 16px 48px rgba(0,0,0,0.5);
  animation: scaleIn 0.25s ease;
}
@keyframes scaleIn { from { transform: scale(0.95); opacity: 0; } to { transform: scale(1); opacity: 1; } }
.settings-panel h2 {
  font-size: 18px; margin-bottom: 20px; display: flex;
  align-items: center; gap: 10px;
}
.settings-panel h2 svg { width: 20px; height: 20px; fill: var(--accent); }
.field { margin-bottom: 16px; }
.field label {
  display: block; font-size: 12px; font-weight: 600;
  color: var(--text2); margin-bottom: 6px;
  text-transform: uppercase; letter-spacing: 0.5px;
}
.field input, .field select {
  width: 100%; padding: 10px 14px; border-radius: 8px;
  border: 1px solid var(--border); background: var(--bg);
  color: var(--text); font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.field input:focus, .field select:focus { border-color: var(--accent); }
.field select { cursor: pointer; }
.field input[type="password"] { font-family: monospace; letter-spacing: 2px; }
.settings-actions { display: flex; gap: 10px; margin-top: 24px; }
.settings-actions button {
  flex: 1; padding: 10px; border-radius: 8px; border: none;
  font-size: 14px; font-weight: 600; cursor: pointer;
  transition: all 0.2s;
}
.btn-primary { background: var(--accent); color: white; }
.btn-primary:hover { background: var(--accent2); }
.btn-secondary { background: var(--surface2); color: var(--text2); border: 1px solid var(--border) !important; }
.btn-secondary:hover { color: var(--text); border-color: var(--accent) !important; }

/* Toast */
.toast-container {
  position: fixed; bottom: 24px; right: 24px; z-index: 1000;
  display: flex; flex-direction: column; gap: 8px;
}
.toast {
  padding: 12px 20px; border-radius: 10px;
  font-size: 13px; font-weight: 500;
  box-shadow: 0 8px 24px rgba(0,0,0,0.4);
  animation: toastIn 0.3s ease, toastOut 0.3s ease 2.7s forwards;
  display: flex; align-items: center; gap: 8px; max-width: 360px;
}
.toast svg { width: 16px; height: 16px; fill: currentColor; flex-shrink: 0; }
.toast.success { background: #0d3320; color: var(--success); border: 1px solid rgba(68,255,170,0.3); }
.toast.error { background: #330d15; color: var(--danger); border: 1px solid rgba(255,68,102,0.3); }
.toast.info { background: var(--surface2); color: var(--accent2); border: 1px solid var(--border); }
@keyframes toastIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
@keyframes toastOut { to { transform: translateX(100%); opacity: 0; } }

/* Preview styles */
.preview-content h1 { font-size: 1.7em; font-weight: 700; margin: 0.5em 0 0.3em; border-bottom: 1px solid var(--border); padding-bottom: 0.2em; }
.preview-content h2 { font-size: 1.4em; font-weight: 700; margin: 0.5em 0 0.3em; }
.preview-content h3 { font-size: 1.2em; font-weight: 600; margin: 0.5em 0 0.3em; }
.preview-content h4 { font-size: 1.1em; font-weight: 600; margin: 0.5em 0 0.3em; }
.preview-content h5 { font-size: 1em; font-weight: 600; margin: 0.5em 0 0.3em; }
.preview-content h6 { font-size: 0.9em; font-weight: 600; margin: 0.5em 0 0.3em; color: var(--text2); }
.preview-content b, .preview-content strong { font-weight: 700; }
.preview-content code {
  background: var(--surface2); padding: 2px 6px; border-radius: 4px;
  font-family: 'JetBrains Mono', monospace; font-size: 0.9em;
}
.preview-content pre {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 8px; padding: 14px; margin: 10px 0;
  overflow-x: auto; font-size: 0.85em; line-height: 1.5;
}
.preview-content pre code { background: none; padding: 0; }
.preview-content blockquote {
  border-left: 3px solid var(--accent); margin: 10px 0;
  padding: 8px 16px; background: var(--surface2);
  border-radius: 0 8px 8px 0; color: var(--text2);
}
.preview-content a { color: var(--accent2); text-decoration: none; }
.preview-content a:hover { text-decoration: underline; }
.preview-content ul, .preview-content ol { margin: 6px 0; padding-left: 24px; }
.preview-content li { margin: 3px 0; }
.preview-content table {
  border-collapse: collapse; margin: 10px 0; width: 100%;
}
.preview-content th, .preview-content td {
  border: 1px solid var(--border); padding: 8px 12px; text-align: left;
}
.preview-content th { background: var(--surface2); font-weight: 600; }
.preview-content hr {
  border: none; border-top: 1px solid var(--border); margin: 16px 0;
}
.preview-content .spoiler {
  background: var(--text2); color: transparent; padding: 2px 4px;
  border-radius: 4px; cursor: pointer; transition: all 0.3s;
  user-select: none;
}
.preview-content .spoiler.revealed {
  background: transparent; color: var(--text);
}
.preview-content .highlight {
  background: rgba(124,92,255,0.25); padding: 1px 3px; border-radius: 3px;
}
.preview-content .math {
  font-family: 'Times New Roman', serif; font-style: italic;
  color: var(--accent2);
}
.preview-content .math-block {
  text-align: center; margin: 12px 0; font-size: 1.1em;
}
.preview-content img {
  max-width: 100%; border-radius: 8px; margin: 8px 0;
}
.preview-content .task-item { list-style: none; margin-left: -20px; }
.preview-content .task-item input { margin-right: 6px; accent-color: var(--accent); }
.preview-content details {
  margin: 8px 0; border: 1px solid var(--border);
  border-radius: 8px; overflow: hidden;
}
.preview-content details summary {
  padding: 8px 14px; background: var(--surface2);
  cursor: pointer; font-weight: 600;
}
.preview-content details[open] summary { border-bottom: 1px solid var(--border); }
.preview-content details > div { padding: 12px 14px; }
.preview-content .tg-map {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: 8px; padding: 16px; text-align: center;
  color: var(--text2); margin: 10px 0;
}

/* Mobile */
@media (max-width: 768px) {
  .main { flex-direction: column; }
  .editor-pane { border-right: none; border-bottom: 1px solid var(--border); }
  .resize-handle { display: none; }
  .header { padding: 8px 12px; }
  .toolbar { padding: 4px 8px; }
  .header-title { font-size: 14px; }
}
</style>
</head>
<body>

<!-- Banner -->
<div class="banner" id="banner">
  <span class="banner-text">Free Rich Text Editor — Because bots shouldn't have more rights than humans</span>
  <button class="banner-dismiss" onclick="document.getElementById('banner').classList.add('hidden')" title="Dismiss">&times;</button>
</div>

<!-- Header -->
<div class="header">
  <div class="header-left">
    <div class="header-logo">
      <svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg>
    </div>
    <span class="header-title">Telegram <span>Rich Editor</span></span>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="markdown" onclick="switchMode('markdown')">Markdown</button>
      <button class="mode-tab" data-mode="html" onclick="switchMode('html')">HTML</button>
    </div>
  </div>
  <div class="header-right">
    <span class="char-counter" id="charCounter">0 / 32768</span>
    <button class="btn-icon" title="Copy to clipboard" onclick="copyToClipboard()">
      <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
    </button>
    <button class="btn-icon" title="Settings" onclick="openSettings()">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.484.484 0 00-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
    </button>
    <button class="btn-send" onclick="sendToTelegram()">
      <svg viewBox="0 0 24 24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
      Send
    </button>
  </div>
</div>

<!-- Toolbar -->
<div class="toolbar" id="toolbar">
  <div class="toolbar-group">
    <button class="toolbar-btn" title="Bold (Ctrl+B)" onclick="insertFormat('bold')">
      <svg viewBox="0 0 24 24"><path d="M15.6 10.79c.97-.67 1.65-1.77 1.65-2.79 0-2.26-1.75-4-4-4H7v14h7.04c2.09 0 3.71-1.7 3.71-3.79 0-1.52-.86-2.82-2.15-3.42zM10 6.5h3c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5h-3v-3zm3.5 9H10v-3h3.5c.83 0 1.5.67 1.5 1.5s-.67 1.5-1.5 1.5z"/></svg>
      <span class="kbd-hint">Ctrl+B</span>
    </button>
    <button class="toolbar-btn" title="Italic (Ctrl+I)" onclick="insertFormat('italic')">
      <svg viewBox="0 0 24 24"><path d="M10 4v3h2.21l-3.42 8H6v3h8v-3h-2.21l3.42-8H18V4z"/></svg>
      <span class="kbd-hint">Ctrl+I</span>
    </button>
    <button class="toolbar-btn" title="Underline (Ctrl+U)" onclick="insertFormat('underline')">
      <svg viewBox="0 0 24 24"><path d="M12 17c3.31 0 6-2.69 6-6V3h-2.5v8c0 1.93-1.57 3.5-3.5 3.5S8.5 12.93 8.5 11V3H6v8c0 3.31 2.69 6 6 6zm-7 2v2h14v-2H5z"/></svg>
      <span class="kbd-hint">Ctrl+U</span>
    </button>
    <button class="toolbar-btn" title="Strikethrough" onclick="insertFormat('strikethrough')">
      <svg viewBox="0 0 24 24"><path d="M10 19h4v-3h-4v3zM5 4v3h5v3h4V7h5V4H5zM3 14h18v-2H3v2z"/></svg>
    </button>
    <button class="toolbar-btn" title="Spoiler" onclick="insertFormat('spoiler')">
      <svg viewBox="0 0 24 24"><path d="M12 4.5C7 4.5 2.73 7.61 1 12c1.73 4.39 6 7.5 11 7.5s9.27-3.11 11-7.5c-1.73-4.39-6-7.5-11-7.5zM12 17c-2.76 0-5-2.24-5-5s2.24-5 5-5 5 2.24 5 5-2.24 5-5 5zm0-8c-1.66 0-3 1.34-3 3s1.34 3 3 3 3-1.34 3-3-1.34-3-3-3z"/></svg>
    </button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="toolbar-btn" title="Inline Code" onclick="insertFormat('code')">
      <svg viewBox="0 0 24 24"><path d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"/></svg>
    </button>
    <button class="toolbar-btn" title="Code Block" onclick="insertFormat('codeblock')">
      <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 14H4V8h16v10zm-8-1h2v-4h4v-2h-4V7h-2v4H8v2h4v4z"/></svg>
    </button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <div class="dropdown">
      <button class="toolbar-btn" title="Heading" onclick="toggleDropdown('heading-menu')">
        <svg viewBox="0 0 24 24"><path d="M5 4v3h5.5v12h3V7H19V4H5z"/></svg>
      </button>
      <div class="dropdown-menu" id="heading-menu">
        <button class="dropdown-item" onclick="insertFormat('h1')">Heading 1</button>
        <button class="dropdown-item" onclick="insertFormat('h2')">Heading 2</button>
        <button class="dropdown-item" onclick="insertFormat('h3')">Heading 3</button>
        <button class="dropdown-item" onclick="insertFormat('h4')">Heading 4</button>
        <button class="dropdown-item" onclick="insertFormat('h5')">Heading 5</button>
        <button class="dropdown-item" onclick="insertFormat('h6')">Heading 6</button>
      </div>

<script>
(function() {
'use strict';

// ===== STATE =====
let currentMode = 'markdown';
const editor = document.getElementById('editor');
const preview = document.getElementById('preview');
const charCounter = document.getElementById('charCounter');
const MAX_CHARS = 32768;

// ===== LOAD SAVED SETTINGS =====
function loadSettings() {
  const token = localStorage.getItem('tg_bot_token') || '';
  const chatId = localStorage.getItem('tg_chat_id') || '';
  document.getElementById('botToken').value = token;
  document.getElementById('chatId').value = chatId;
}
loadSettings();

// ===== MODE SWITCH =====
window.switchMode = function(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => {
    t.classList.toggle('active', t.dataset.mode === mode);
  });
  document.getElementById('parseMode').value = mode === 'html' ? 'HTML' : 'MarkdownV2';
  updatePreview();
};

// ===== CHARACTER COUNTER =====
function updateCharCounter() {
  const len = editor.value.length;
  charCounter.textContent = len.toLocaleString() + ' / ' + MAX_CHARS.toLocaleString();
  charCounter.className = 'char-counter' + (len > MAX_CHARS ? ' danger' : len > MAX_CHARS * 0.9 ? ' warn' : '');
}

// ===== MARKDOWN PARSER =====
function parseMarkdown(text) {
  if (!text.trim()) return '<p style="color: var(--text2); font-style: italic;">Preview will appear here...</p>';
  
  let html = '';
  const lines = text.split('\n');
  let i = 0;
  let inCodeBlock = false;
  let codeContent = '';
  let codeLang = '';
  let inTable = false;
  let tableRows = [];
  let inBlockquote = false;
  let blockquoteContent = '';
  let inList = false;
  let listType = '';
  let listItems = [];
  
  function flushBlockquote() {
    if (inBlockquote && blockquoteContent) {
      html += '<blockquote>' + parseInline(blockquoteContent.trim()) + '</blockquote>\n';
      blockquoteContent = '';
      inBlockquote = false;
    }
  }
  
  function flushList() {
    if (inList && listItems.length) {
      const tag = listType === 'ol' ? 'ol' : 'ul';
      html += '<' + tag + '>\n';
      listItems.forEach(item => {
        if (item.startsWith('[ ] ') || item.startsWith('[x] ') || item.startsWith('[X] ')) {
          const checked = item[1] === 'x' || item[1] === 'X';
          html += '<li class="task-item"><input type="checkbox"' + (checked ? ' checked' : '') + ' disabled> ' + parseInline(item.slice(4)) + '</li>\n';
        } else {
          html += '<li>' + parseInline(item) + '</li>\n';
        }
      });
      html += '</' + tag + '>\n';
      listItems = [];
      inList = false;
    }
  }
  
  function flushTable() {
    if (inTable && tableRows.length) {
      html += '<table>\n';
      tableRows.forEach((row, ri) => {
        const tag = ri === 0 ? 'th' : 'td';
        const wrapper = ri === 0 ? 'thead' : (ri === 1 ? 'tbody' : '');
        if (ri === 1 && tableRows.length > 1) html += '<tbody>\n';
        if (ri !== 1 || tableRows.length === 1) {
          if (ri === 0) html += '<thead>\n';
        }
        const cells = row.split('|').map(c => c.trim()).filter(c => c);
        if (ri === 1 && cells.every(c => /^[-:]+$/.test(c))) { return; }
        html += '<tr>';
        cells.forEach(c => { html += '<' + tag + '>' + parseInline(c) + '</' + tag + '>'; });
        html += '</tr>\n';
        if (ri === 0 && tableRows.length > 1) html += '</thead>\n';
      });
      if (tableRows.length > 1) html += '</tbody>\n';
      html += '</table>\n';
      tableRows = [];
      inTable = false;
    }
  }
  
  while (i < lines.length) {
    const line = lines[i];
    
    // Code block
    if (line.trimStart().startsWith('```')) {
      flushBlockquote(); flushList(); flushTable();
      if (inCodeBlock) {
        html += '<pre><code' + (codeLang ? ' class="language-' + escHtml(codeLang) + '"' : '') + '>' + escHtml(codeContent) + '</code></pre>\n';
        inCodeBlock = false; codeContent = ''; codeLang = '';
      } else {
        flushList();
        inCodeBlock = true;
        codeLang = line.trimStart().slice(3).trim();
      }
      i++; continue;
    }
    
    if (inCodeBlock) {
      codeContent += (codeContent ? '\n' : '') + line;
      i++; continue;
    }
    
    // Table
    if (line.trim().startsWith('|') && line.trim().endsWith('|')) {
      flushBlockquote(); flushList();
      if (!inTable) inTable = true;
      tableRows.push(line.trim());
      i++; continue;
    } else {
      flushTable();
    }
    
    // Blockquote
    if (line.startsWith('>')) {
      flushList();
      if (!inBlockquote) inBlockquote = true;
      blockquoteContent += line.slice(1).trim() + '\n';
      i++; continue;
    } else {
      flushBlockquote();
    }
    
    // List items
    const ulMatch = line.match(/^(\s*)([-*+])\s+(.*)/);
    const olMatch = line.match(/^(\s*)(\d+)\.\s+(.*)/);
    if (ulMatch || olMatch) {
      flushBlockquote(); flushTable();
      const item = ulMatch ? ulMatch[3] : olMatch[3];
      const type = ulMatch ? 'ul' : 'ol';
      if (!inList || listType !== type) { flushList(); inList = true; listType = type; }
      listItems.push(item);
      i++; continue;
    } else {
      flushList();
    }
    
    // Divider
    if (/^[-*_]{3,}\s*$/.test(line.trim())) {
      flushBlockquote(); flushList(); flushTable();
      html += '<hr>\n';
      i++; continue;
    }
    
    // Headings
    const hMatch = line.match(/^(#{1,6})\s+(.*)/);
    if (hMatch) {
      flushBlockquote(); flushList(); flushTable();
      const level = hMatch[1].length;
      html += '<h' + level + '>' + parseInline(hMatch[2]) + '</h' + level + '>\n';
      i++; continue;
    }
    
    // Empty line
    if (!line.trim()) {
      flushBlockquote(); flushList(); flushTable();
      i++; continue;
    }
    
    // Regular paragraph
    flushBlockquote(); flushList(); flushTable();
    html += '<p>' + parseInline(line) + '</p>\n';
    i++;
  }
  
  flushBlockquote(); flushList(); flushTable();
  if (inCodeBlock) {
    html += '<pre><code' + (codeLang ? ' class="language-' + escHtml(codeLang) + '"' : '') + '>' + escHtml(codeContent) + '</code></pre>\n';
  }
  
  return html || '<p style="color: var(--text2); font-style: italic;">Preview will appear here...</p>';
}

function parseInline(text) {
  // Escape HTML first
  text = escHtml(text);
  
  // Math blocks $$...$$
  text = text.replace(/\$\$([\s\S]+?)\$\$/g, '<div class="math-block math">$1</div>');
  // Inline math $...$
  text = text.replace(/\$([^\$\n]+?)\$/g, '<span class="math">$1</span>');
  
  // Code (must come before other inline)
  text = text.replace(/`([^`\n]+?)`/g, '<code>$1</code>');
  
  // Media
  text = text.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, '<img src="$2" alt="$1">');
  
  // Links
  text = text.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');
  
  // Bold
  text = text.replace(/\*\*([^\*]+?)\*\*/g, '<b>$1</b>');
  text = text.replace(/__([^_]+?)__/g, '<b>$1</b>');
  
  // Italic
  text = text.replace(/\*([^\*]+?)\*/g, '<i>$1</i>');
  text = text.replace(/_([^_]+?)_/g, '<i>$1</i>');
  
  // Strikethrough
  text = text.replace(/~~([^~]+?)~~/g, '<s>$1</s>');
  
  // Spoiler
  text = text.replace(/\|\|([^|]+?)\|\|/g, '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
  
  // Highlight
  text = text.replace(/==([^=]+?)==/g, '<span class="highlight">$1</span>');
  
  return text;
}

// ===== HTML PARSER / SANITIZER =====
function parseHtmlContent(text) {
  if (!text.trim()) return '<p style="color: var(--text2); font-style: italic;">Preview will appear here...</p>';
  
  // We'll allow Telegram-safe tags and sanitize
  const allowedTags = ['b','strong','i','em','u','ins','s','del','strike','code','pre','a',
    'blockquote','br','p','br/','tg-spoiler','tg-blockquote','tg-collage','tg-slideshow',
    'details','summary','tg-map','mark','sup','sub','h1','h2','h3','h4','h5','h6',
    'ul','ol','li','table','thead','tbody','tr','th','td','hr','div','span','img'];
  
  const allowedAttrs = {
    'a': ['href'],
    'img': ['src','alt','width','height'],
    'tg-map': ['lat','long','zoom'],
    'span': ['class'],
    'tg-blockquote': ['expandable'],
    'code': ['class'],
    '*': []
  };
  
  // Process spoiler spans
  text = text.replace(/<span\s+class=["']tg-spoiler["']\s*>([\s\S]*?)<\/span>/gi,
    '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
  text = text.replace(/<tg-spoiler>([\s\S]*?)<\/tg-spoiler>/gi,
    '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">$1</span>');
  
  // Blockquote expandable
  text = text.replace(/<tg-blockquote[^>]*expandable[^>]*>([\s\S]*?)<\/tg-blockquote>/gi,
    '<details><summary>Quote</summary><blockquote>$1</blockquote></details>');
  text = text.replace(/<tg-blockquote[^>]*>([\s\S]*?)<\/tg-blockquote>/gi, '<blockquote>$1</blockquote>');
  
  // tg-map
  text = text.replace(/<tg-map\s+lat=["']([^"']+)["']\s+long=["']([^"']+)["'](?:\s+zoom=["']([^"']+)["'])?\s*\/?>/gi,
    '<div class="tg-map">📍 Map: $1, $2' + (('$3') ? ' (zoom: $3)' : '') + '</div>');
  
  // Details/summary stay as-is
  
  // Sanitize: strip disallowed tags but keep content
  text = text.replace(/<\/?([a-z][a-z0-9-]*)\b[^>]*>/gi, function(match, tag) {
    tag = tag.toLowerCase();
    if (allowedTags.includes(tag) || tag.startsWith('tg-')) return match;
    return '';
  });
  
  // spoiler onclick injection
  text = text.replace(/<tg-spoiler>/gi, '<span class="spoiler" onclick="this.classList.toggle(\'revealed\')">');
  text = text.replace(/<\/tg-spoiler>/gi, '</span>');
  
  return text;
}

// ===== PREVIEW UPDATE =====
window.updatePreview = function() {
  updateCharCounter();
  const text = editor.value;
  if (currentMode === 'markdown') {
    preview.innerHTML = parseMarkdown(text);
  } else {
    preview.innerHTML = parseHtmlContent(text);
  }
};

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ===== FORMAT INSERTION =====
window.insertFormat = function(type) {
  closeAllDropdowns();
  const start = editor.selectionStart;
  const end = editor.selectionEnd;
  const selected = editor.value.substring(start, end);
  const before = editor.value.substring(0, start);
  const after = editor.value.substring(end);
  let insert = '', cursorOffset = 0, selectStart = 0, selectEnd = 0;
  
  if (currentMode === 'markdown') {
    switch (type) {
      case 'bold': insert = '**' + (selected || 'bold text') + '**'; selectStart = 2; selectEnd = insert.length - 2; break;
      case 'italic': insert = '*' + (selected || 'italic text') + '*'; selectStart = 1; selectEnd = insert.length - 1; break;
      case 'underline': insert = '__' + (selected || 'underlined text') + '__'; selectStart = 2; selectEnd = insert.length - 2; break;
      case 'strikethrough': insert = '~~' + (selected || 'strikethrough text') + '~~'; selectStart = 2; selectEnd = insert.length - 2; break;
      case 'spoiler': insert = '||' + (selected || 'spoiler text') + '||'; selectStart = 2; selectEnd = insert.length - 2; break;
      case 'code': insert = '`' + (selected || 'code') + '`'; selectStart = 1; selectEnd = insert.length - 1; break;
      case 'codeblock': insert = '```\n' + (selected || 'code here') + '\n```'; selectStart = 4; selectEnd = insert.length - 4; break;
      case 'h1': insert = '# ' + (selected || 'Heading 1'); selectStart = 2; selectEnd = insert.length; break;
      case 'h2': insert = '## ' + (selected || 'Heading 2'); selectStart = 3; selectEnd = insert.length; break;
      case 'h3': insert = '### ' + (selected || 'Heading 3'); selectStart = 4; selectEnd = insert.length; break;
      case 'h4': insert = '#### ' + (selected || 'Heading 4'); selectStart = 5; selectEnd = insert.length; break;
      case 'h5': insert = '##### ' + (selected || 'Heading 5'); selectStart = 6; selectEnd = insert.length; break;
      case 'h6': insert = '###### ' + (selected || 'Heading 6'); selectStart = 7; selectEnd = insert.length; break;
      case 'link': insert = '[' + (selected || 'link text') + '](https://example.com)'; selectStart = 1; selectEnd = 1 + (selected || 'link text').length; break;
      case 'blockquote': insert = '> ' + (selected || 'quote text'); selectStart = 2; selectEnd = insert.length; break;
      case 'ul': insert = '- ' + (selected || 'list item'); selectStart = 2; selectEnd = insert.length; break;
      case 'ol': insert = '1. ' + (selected || 'list item'); selectStart = 3; selectEnd = insert.length; break;
      case 'task': insert = '- [ ] ' + (selected || 'task item'); selectStart = 6; selectEnd = insert.length; break;
      case 'table': insert = '| Header 1 | Header 2 | Header 3 |\n| --- | --- | --- |\n| Cell 1 | Cell 2 | Cell 3 |\n| Cell 4 | Cell 5 | Cell 6 |'; selectStart = 2; selectEnd = 10; break;
      case 'divider': insert = '\n---\n'; selectStart = insert.length; selectEnd = insert.length; break;
      case 'media': insert = '![' + (selected || 'alt text') + '](https://example.com/image.jpg)'; selectStart = 2; selectEnd = 2 + (selected || 'alt text').length; break;
      case 'math': insert = '$$' + (selected || 'E = mc^2') + '$$'; selectStart = 2; selectEnd = insert.length - 2; break;
    }
  } else {
    switch (type) {
      case 'bold': insert = '<b>' + (selected || 'bold text') + '</b>'; selectStart = 3; selectEnd = insert.length - 4; break;
      case 'italic': insert = '<i>' + (selected || 'italic text') + '</i>'; selectStart = 3; selectEnd = insert.length - 4; break;
      case 'underline': insert = '<u>' + (selected || 'underlined text') + '</u>'; selectStart = 3; selectEnd = insert.length - 4; break;
      case 'strikethrough': insert = '<s>' + (selected || 'strikethrough text') + '</s>'; selectStart = 3; selectEnd = insert.length - 4; break;
      case 'spoiler': insert = '<tg-spoiler>' + (selected || 'spoiler text') + '</tg-spoiler>'; selectStart = 12; selectEnd = insert.length - 13; break;
      case 'code': insert = '<code>' + (selected || 'code') + '</code>'; selectStart = 6; selectEnd = insert.length - 7; break;
      case 'codeblock': insert = '<pre><code>' + (selected || 'code here') + '</code></pre>'; selectStart = 11; selectEnd = insert.length - 13; break;
      case 'h1': insert = '<h1>' + (selected || 'Heading 1') + '</h1>'; selectStart = 4; selectEnd = insert.length - 5; break;
      case 'h2': insert = '<h2>' + (selected || 'Heading 2') + '</h2>'; selectStart = 4; selectEnd = insert.length - 5; break;
      case 'h3': insert = '<h3>' + (selected || 'Heading 3') + '</h3>'; selectStart = 4; selectEnd = insert.length - 5; break;
      case 'h4': insert = '<h4>' + (selected || 'Heading 4') + '</h4>'; selectStart = 4; selectEnd = insert.length - 5; break;
      case 'h5': insert = '<h5>' + (selected || 'Heading 5') + '</h5>'; selectStart = 4; selectEnd = insert.length - 5; break;
      case 'h6': insert = '<h6>' + (selected || 'Heading 6') + '</h6>'; selectStart = 4; selectEnd = insert.length - 5; break;
      case 'link': insert = '<a href="https://example.com">' + (selected || 'link text') + '</a>'; selectStart = 30; selectEnd = 30 + (selected || 'link text').length; break;
      case 'blockquote': insert = '<blockquote>' + (selected || 'quote text') + '</blockquote>'; selectStart = 12; selectEnd = insert.length - 13; break;
      case 'ul': insert = '<ul>\n  <li>' + (selected || 'list item') + '</li>\n</ul>'; selectStart = 9; selectEnd = insert.length - 13; break;
      case 'ol': insert = '<ol>\n  <li>' + (selected || 'list item') + '</li>\n</ol>'; selectStart = 9; selectEnd = insert.length - 13; break;
      case 'task': insert = '<ul>\n  <li>☐ ' + (selected || 'task item') + '</li>\n</ul>'; selectStart = 11; selectEnd = insert.length - 13; break;
      case 'table': insert = '<table>\n  <thead>\n    <tr><th>Header 1</th><th>Header 2</th><th>Header 3</th></tr>\n  </thead>\n  <tbody>\n    <tr><td>Cell 1</td><td>Cell 2</td><td>Cell 3</td></tr>\n  </tbody>\n</table>'; selectStart = 30; selectEnd = 39; break;
      case 'divider': insert = '<hr>'; selectStart = insert.length; selectEnd = insert.length; break;
      case 'media': insert = '<img src="https://example.com/image.jpg" alt="' + (selected || 'alt text') + '">'; selectStart = 10; selectEnd = 45; break;
      case 'math': insert = '<span class="math">' + (selected || 'E = mc^2') + '</span>'; selectStart = 18; selectEnd = insert.length - 7; break;
    }
  }
  
  editor.focus();
  editor.setRangeText(insert, start, end, 'end');
  // Select the inner content
  editor.selectionStart = start + selectStart;
  editor.selectionEnd = start + selectEnd;
  updatePreview();
};

// ===== DROPDOWN =====
window.toggleDropdown = function(id) {
  const menu = document.getElementById(id);
  const isOpen = menu.classList.contains('open');
  closeAllDropdowns();
  if (!isOpen) menu.classList.add('open');
};

function closeAllDropdowns() {
  document.querySelectorAll('.dropdown-menu').forEach(m => m.classList.remove('open'));
}

document.addEventListener('click', function(e) {
  if (!e.target.closest('.dropdown')) closeAllDropdowns();
});

// ===== KEYBOARD SHORTCUTS =====
editor.addEventListener('keydown', function(e) {
  if ((e.ctrlKey || e.metaKey) && !e.altKey) {
    switch (e.key.toLowerCase()) {
      case 'b': e.preventDefault(); insertFormat('bold'); break;
      case 'i': e.preventDefault(); insertFormat('italic'); break;
      case 'u': e.preventDefault(); insertFormat('underline'); break;
      case 'k': e.preventDefault(); insertFormat('link'); break;
      case 'e': e.preventDefault(); insertFormat('code'); break;
    }
  }
  // Tab support
  if (e.key === 'Tab') {
    e.preventDefault();
    const start = editor.selectionStart;
    editor.setRangeText('  ', start, start, 'end');
    updatePreview();
  }
});

// ===== RESIZE HANDLE =====
const resizeHandle = document.getElementById('resizeHandle');
let isResizing = false;
resizeHandle.addEventListener('mousedown', function(e) {
  isResizing = true;
  resizeHandle.classList.add('dragging');
  document.body.style.cursor = 'col-resize';
  document.body.style.userSelect = 'none';
  e.preventDefault();
});
document.addEventListener('mousemove', function(e) {
  if (!isResizing) return;
  const main = document.querySelector('.main');
  const rect = main.getBoundingClientRect();
  const ratio = (e.clientX - rect.left) / rect.width;
  const clamped = Math.max(0.2, Math.min(0.8, ratio));
  document.querySelector('.editor-pane').style.flex = '0 0 ' + (clamped * 100) + '%';
  document.querySelector('.preview-pane').style.flex = '1';
});
document.addEventListener('mouseup', function() {
  if (isResizing) {
    isResizing = false;
    resizeHandle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
});

// ===== LIVE PREVIEW =====
editor.addEventListener('input', updatePreview);

// ===== SETTINGS =====
window.openSettings = function() {
  document.getElementById('settingsOverlay').classList.add('open');
};
window.closeSettings = function() {
  document.getElementById('settingsOverlay').classList.remove('open');
};
window.saveSettings = function() {
  const token = document.getElementById('botToken').value.trim();
  const chatId = document.getElementById('chatId').value.trim();
  localStorage.setItem('tg_bot_token', token);
  localStorage.setItem('tg_chat_id', chatId);
  closeSettings();
  showToast('Settings saved successfully', 'success');
};

// ===== COPY TO CLIPBOARD =====
window.copyToClipboard = function() {
  const text = editor.value;
  if (!text) { showToast('Nothing to copy', 'info'); return; }
  navigator.clipboard.writeText(text).then(function() {
    showToast('Copied to clipboard!', 'success');
  }).catch(function() {
    // Fallback
    const ta = document.createElement('textarea');
    ta.value = text; document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('Copied to clipboard!', 'success');
  });
};

// ===== SEND TO TELEGRAM =====
window.sendToTelegram = async function() {
  const token = localStorage.getItem('tg_bot_token');
  const chatId = localStorage.getItem('tg_chat_id');
  
  if (!token || !chatId) {
    showToast('Please configure Bot Token and Chat ID in Settings first', 'error');
    openSettings();
    return;
  }
  
  const text = editor.value;
  if (!text.trim()) {
    showToast('Nothing to send — editor is empty', 'error');
    return;
  }
  
  if (text.length > MAX_CHARS) {
    showToast('Message exceeds ' + MAX_CHARS + ' character limit (' + text.length + ' chars)', 'error');
    return;
  }
  
  const parseMode = document.getElementById('parseMode').value;
  const baseUrl = 'https://api.telegram.org/bot' + token;
  
  // Try sendRichMessage first
  try {
    const richBody = { chat_id: chatId, rich_message: {} };
    if (parseMode === 'MarkdownV2') {
      richBody.rich_message.markdown = text;
    } else {
      richBody.rich_message.html = text;
    }
    
    let res = await fetch(baseUrl + '/sendRichMessage', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(richBody)
    });
    
    let data = await res.json();
    
    if (data.ok) {
      showToast('Message sent successfully! ✓', 'success');
      return;
    }
    
    // If sendRichMessage not available, fallback
    if (data.description && (data.description.includes('method not found') || data.description.includes('not found'))) {
      throw new Error('fallback');
    }
    
    showToast('Error: ' + (data.description || 'Unknown error'), 'error');
    return;
  } catch (e) {
    // Fallback to sendMessage
    if (e.message === 'fallback' || e instanceof TypeError) {
      try {
        const fallbackBody = {
          chat_id: chatId,
          text: text,
          parse_mode: parseMode
        };
        
        const res2 = await fetch(baseUrl + '/sendMessage', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(fallbackBody)
        });
        
        const data2 = await res2.json();
        if (data2.ok) {
          showToast('Message sent via sendMessage fallback! ✓', 'success');
        } else {
          showToast('Error: ' + (data2.description || 'Failed to send'), 'error');
        }
      } catch (e2) {
        showToast('Network error: ' + e2.message, 'error');
      }
    } else {
      showToast('Error: ' + e.message, 'error');
    }
  }
};

// ===== TOAST NOTIFICATIONS =====
function showToast(message, type) {
  type = type || 'info';
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast ' + type;
  
  let icon = '';
  if (type === 'success') icon = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/></svg>';
  else if (type === 'error') icon = '<svg viewBox="0 0 24 24"><path d="M12 2C6.47 2 2 6.47 2 12s4.47 10 10 10 10-4.47 10-10S17.53 2 12 2zm5 13.59L15.59 17 12 13.41 8.41 17 7 15.59 10.59 12 7 8.41 8.41 7 12 10.59 15.59 7 17 8.41 13.41 12 17 15.59z"/></svg>';
  else icon = '<svg viewBox="0 0 24 24"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-6h2v6zm0-8h-2V7h2v2z"/></svg>';
  
  toast.innerHTML = icon + '<span>' + escHtml(message) + '</span>';
  container.appendChild(toast);
  setTimeout(function() { if (toast.parentNode) toast.remove(); }, 3200);
}
window.showToast = showToast;

// Close settings on Escape
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') {
    closeSettings();
    closeAllDropdowns();
  }
});

// ===== INIT =====
updatePreview();

})();
</script>
