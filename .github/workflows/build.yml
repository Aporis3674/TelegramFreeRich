name: Build and Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Build Windows installer
        run: npm run build

      - name: Create source archive
        shell: bash
        run: |
          git archive --format=zip HEAD -o source.zip

      - name: Extract changelog
        id: changelog
        shell: bash
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Remove leading 'v' from tag for CHANGELOG headers
          CHLOG="${TAG#v}"
          # Extract section for this version from CHANGELOG.md
          awk "/^## \\[${CHLOG}\\]/{found=1; next} /^## \\[/{if(found) exit} found{print}" CHANGELOG.md > release_notes.md
          # Fallback if no section found
          if [ ! -s release_notes.md ]; then
            echo "Release ${TAG}" > release_notes.md
          fi

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release_notes.md
          files: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml
            source.zip
