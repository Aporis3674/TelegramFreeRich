<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src https://api.telegram.org">
<title>TelegramFreeRich</title>
<link rel="stylesheet" href="styles/app.css">
</head>
<body>

<!-- Header -->
<header id="header">
  <div class="header-left">
    <svg class="logo" viewBox="0 0 24 24" width="20" height="20">
      <path d="M11.944.042C5.347.042.042 5.347.042 11.944c0 6.596 5.305 11.902 11.902 11.902 6.596 0 11.902-5.306 11.902-11.902C23.846 5.347 18.54.042 11.944.042zM17.92 8.182l-2.057 9.668c-.153.695-.558.865-1.13.538l-3.117-2.298-1.505 1.448c-.166.166-.306.306-.63.306l.44-3.128 5.69-5.142c.248-.22-.054-.343-.384-.122l-7.04 4.435-3.032-.988c-.66-.206-.673-.66.138-.977l11.83-4.56c.55-.203 1.03.136.852.97z" fill="currentColor"/>
    </svg>
    <span class="title">FreeRich</span>
    <span class="badge">v2.2</span>
  </div>
  <div class="header-right">
    <button id="btn-undo" class="icon-btn" title="Undo"><svg viewBox="0 0 24 24"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 00-9-9 9 9 0 00-6 2.3L3 13"/></svg></button>
    <button id="btn-redo" class="icon-btn" title="Redo"><svg viewBox="0 0 24 24"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 019-9 9 9 0 016 2.3L21 13"/></svg></button>
    <div class="sep"></div>
    <button id="btn-theme" class="icon-btn" title="Toggle Theme">
      <svg id="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
      <svg id="icon-moon" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button id="btn-test-message" class="icon-btn" title="Send Test Message">
      <svg viewBox="0 0 24 24"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
    </button>
    <button id="btn-settings" class="icon-btn" title="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</header>

<!-- Top Toolbar -->
<div id="toolbar" class="toolbar-bar">
  <div class="toolbar-group">
    <button class="tb-btn" data-cmd="bold" title="Bold"><svg viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"/></svg></button>
    <button class="tb-btn" data-cmd="italic" title="Italic"><svg viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
    <button class="tb-btn" data-cmd="underline" title="Underline"><svg viewBox="0 0 24 24"><path d="M6 3v7a6 6 0 0 0 6 6 6 6 0 0 0 6-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg></button>
    <button class="tb-btn" data-cmd="strikethrough" title="Strikethrough"><svg viewBox="0 0 24 24"><path d="M16 4H9a3 3 0 0 0-2.83 4"/><path d="M14 12a4 4 0 0 1 0 8H6"/><line x1="4" y1="12" x2="20" y2="12"/></svg></button>
    <button class="tb-btn" data-cmd="code" title="Inline Code"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
    <button class="tb-btn" data-cmd="spoiler" title="Spoiler"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="2" y1="2" x2="22" y2="22"/></svg></button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tb-btn" data-cmd="sub" title="Subscript"><span class="tb-s">x₂</span></button>
    <button class="tb-btn" data-cmd="sup" title="Superscript"><span class="tb-s">x²</span></button>
    <button class="tb-btn" data-cmd="marked" title="Marked / Highlight"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2"/><path d="M8 12l3 3 5-5"/></svg></button>
    <button class="tb-btn" data-cmd="datetime" title="Date / Time"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></button>
    <button class="tb-btn" data-cmd="math-inline" title="Math Formula"><span class="tb-s">∑</span></button>
    <button class="tb-btn" data-cmd="emoji" title="Custom Emoji"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><circle cx="9" cy="9" r="1.5" fill="currentColor"/><circle cx="15" cy="9" r="1.5" fill="currentColor"/><path d="M8 14a4 4 0 004 3 4 4 0 004-3"/></svg></button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tb-btn" data-cmd="heading" data-level="1" title="H1"><span class="tb-h">H1</span></button>
    <button class="tb-btn" data-cmd="heading" data-level="2" title="H2"><span class="tb-h">H2</span></button>
    <button class="tb-btn" data-cmd="heading" data-level="3" title="H3"><span class="tb-h">H3</span></button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tb-btn" data-cmd="bullet-list" title="Bullet List"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg></button>
    <button class="tb-btn" data-cmd="ordered-list" title="Numbered List"><svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="3" y="8" font-size="7">1</text><text x="3" y="14" font-size="7">2</text><text x="3" y="20" font-size="7">3</text></svg></button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tb-btn" data-cmd="blockquote" title="Quote"><svg viewBox="0 0 24 24"><path d="M3 21c3 0 7-1 7-8V5c0-1.25-.756-2.017-2-2H4c-1.25 0-2 .75-2 1.972V21c0 1.25.75 2 2 2h1"/></svg></button>
    <button class="tb-btn" id="btn-plus" title="Insert Block"><svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
  </div>
</div>

<!-- Plus Menu -->
<div id="plus-menu" class="plus-menu">
  <button class="pm-item" data-cmd="code-block"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg> Code Block</button>
  <button class="pm-item" data-cmd="table"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg> Table</button>
  <button class="pm-item" data-cmd="details"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg> Details</button>
  <button class="pm-item" data-cmd="checklist"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M9 12l2 2 4-4"/></svg> Checklist</button>
  <button class="pm-item" data-cmd="divider"><svg viewBox="0 0 24 24"><line x1="4" y1="12" x2="20" y2="12"/></svg> Divider</button>
  <button class="pm-item" data-cmd="math-block"><span class="pm-icon">∑</span> Math Block</button>
  <button class="pm-item" data-cmd="anchor"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/></svg> Anchor</button>
  <button class="pm-item" data-cmd="thinking"><svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><circle cx="12" cy="8" r="0.5" fill="currentColor"/></svg> Thinking</button>
  <div class="pm-sep"></div>
  <button class="pm-item" data-cmd="image"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg> Photo</button>
  <button class="pm-item" data-cmd="video"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2"/><polygon points="10 8 16 12 10 16 10 8"/></svg> Video</button>
  <button class="pm-item" data-cmd="animation"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="20" height="20" rx="2"/><circle cx="12" cy="12" r="4"/></svg> Animation (GIF)</button>
  <button class="pm-item" data-cmd="voicenote"><svg viewBox="0 0 24 24"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg> Voice Note</button>
  <button class="pm-item" data-cmd="collage"><svg viewBox="0 0 24 24"><rect x="2" y="2" width="9" height="9"/><rect x="13" y="2" width="9" height="9"/><rect x="2" y="13" width="9" height="9"/><rect x="13" y="13" width="9" height="9"/></svg> Collage</button>
  <button class="pm-item" data-cmd="slideshow"><svg viewBox="0 0 24 24"><rect x="2" y="4" width="20" height="14" rx="2"/><circle cx="9" cy="11" r="2"/><polyline points="21 17 16 12 4 19"/></svg> Slideshow</button>
  <button class="pm-item" data-cmd="map"><svg viewBox="0 0 24 24"><circle cx="12" cy="10" r="3"/><path d="M12 2a8 8 0 00-8 8c0 5.4 8 12 8 12s8-6.6 8-12a8 8 0 00-8-8z"/></svg> Map</button>
</div>

<!-- Editor Area -->
<main id="editor-main">
  <div id="scroll-container">
    <div id="blocks-container"></div>
    <div class="editor-bottom">
      <button id="btn-plus-bottom" class="plus-bottom-btn" title="Add block">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
      <div id="char-count" class="char-count"></div>
      <label class="toggle-label" title="Right-to-left text direction">
        <input type="checkbox" id="chk-rtl" />
        <span class="toggle-switch">RTL</span>
      </label>
      <label class="toggle-label" title="Skip automatic entity detection">
        <input type="checkbox" id="chk-skip-entities" />
        <span class="toggle-switch">No Detect</span>
      </label>
    </div>
  </div>
</main>

<!-- Bottom Bar -->
<div id="bottom-bar" class="bottom-bar">
  <div class="bottom-left">
    <button id="btn-settings-bottom" class="bb-btn" title="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <div class="status-dot" id="status-dot" title="Not connected"></div>
    <span class="status-text" id="status-text">Connect bot to send</span>
  </div>
  <div class="bottom-right">
    <div class="mode-tabs" id="mode-tabs">
      <button class="mode-tab active" data-mode="rich">Rich</button>
      <button class="mode-tab" data-mode="draft">Draft</button>
      <button class="mode-tab" data-mode="edit">Edit</button>
    </div>
    <button id="btn-send" class="send-btn" title="Send">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4 20-7"/></svg>
    </button>
  </div>
</div>

<!-- Settings Overlay -->
<div id="settings-overlay" class="overlay hidden" role="dialog" aria-modal="true">
  <div class="panel" id="settings-panel">
    <div class="panel-header">
      <h3>Settings</h3>
      <button id="btn-close-settings" class="close-btn">&times;</button>
    </div>
    <div class="panel-body">
      <label>Bot Token</label>
      <input type="password" id="input-token" placeholder="From @BotFather" autocomplete="off">
      <label>Chat ID</label>
      <input type="text" id="input-chat" placeholder="@channel or numeric ID">
      <label>Edit Message ID</label>
      <input type="text" id="input-edit-id" placeholder="Message ID to edit">
      <label>Default language</label>
      <select id="input-lang">
        <option value="en">English</option>
        <option value="fa">فارسی</option>
      </select>
      <button id="btn-test-connection" class="btn-primary">Test Connection</button>
      <div id="connection-status"></div>
      <button id="btn-save-settings" class="btn-primary">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
