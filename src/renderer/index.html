<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src https://api.telegram.org">
<title>TelegramFreeRich</title>
<link rel="stylesheet" href="styles/app.css">
</head>
<body>

<!-- Header -->
<header id="header">
  <div class="header-left">
    <svg class="logo" viewBox="0 0 24 24" width="20" height="20">
      <path d="M11.944.042C5.347.042.042 5.347.042 11.944c0 6.596 5.305 11.902 11.902 11.902 6.596 0 11.902-5.306 11.902-11.902C23.846 5.347 18.54.042 11.944.042zM17.92 8.182l-2.057 9.668c-.153.695-.558.865-1.13.538l-3.117-2.298-1.505 1.448c-.166.166-.306.306-.63.306l.44-3.128 5.69-5.142c.248-.22-.054-.343-.384-.122l-7.04 4.435-3.032-.988c-.66-.206-.673-.66.138-.977l11.83-4.56c.55-.203 1.03.136.852.97z" fill="currentColor"/>
    </svg>
    <span class="title">FreeRich</span>
  </div>
  <div class="header-center">
    <div id="chat-title-display" class="chat-title-display">New Chat</div>
  </div>
  <div class="header-right">
    <button id="btn-new-chat" class="icon-btn" title="New Chat">
      <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
    </button>
    <button id="btn-theme" class="icon-btn" title="Toggle Theme">
      <svg id="icon-sun" viewBox="0 0 24 24"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/></svg>
      <svg id="icon-moon" viewBox="0 0 24 24" style="display:none"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
    </button>
    <button id="btn-settings" class="icon-btn" title="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <button id="btn-sidebar-toggle" class="icon-btn" title="Chat List">
      <svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    </button>
  </div>
</header>

<!-- Toolbar -->
<div id="toolbar" class="toolbar-bar">
  <div class="toolbar-group">
    <button class="tb-btn" data-cmd="bold" title="Bold (Ctrl+B)"><b>B</b></button>
    <button class="tb-btn" data-cmd="italic" title="Italic (Ctrl+I)"><i>I</i></button>
    <button class="tb-btn" data-cmd="underline" title="Underline (Ctrl+U)"><u>U</u></button>
    <button class="tb-btn" data-cmd="strikethrough" title="Strikethrough"><s>S</s></button>
    <button class="tb-btn" data-cmd="code" title="Inline Code">&lt;/&gt;</button>
    <button class="tb-btn" data-cmd="spoiler" title="Spoiler">||</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tb-btn" data-cmd="sub" title="Subscript">X₂</button>
    <button class="tb-btn" data-cmd="sup" title="Superscript">X²</button>
    <button class="tb-btn" data-cmd="marked" title="Highlight">==</button>
    <button class="tb-btn" data-cmd="math-inline" title="Math">$</button>
    <button class="tb-btn" data-cmd="link" title="Insert Link">🔗</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tb-btn tb-heading" data-cmd="heading" title="Heading">
      <span class="tb-icon-lg">Aa</span>
    </button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tb-btn" data-cmd="bullet-list" title="Bullet List">•≡</button>
    <button class="tb-btn" data-cmd="ordered-list" title="Numbered List">1.</button>
    <button class="tb-btn" data-cmd="checklist" title="Checklist">☑</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tb-btn" data-cmd="blockquote" title="Quote">❝</button>
    <button class="tb-btn" data-cmd="code-block" title="Code Block">⟨/⟩</button>
    <button class="tb-btn" data-cmd="table" title="Table">⊞</button>
    <button class="tb-btn" data-cmd="divider" title="Divider">—</button>
    <button class="tb-btn" data-cmd="details" title="Collapsible">▸▾</button>
    <button class="tb-btn" data-cmd="math-block" title="Math Block">∑</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button class="tb-btn" data-cmd="image" title="Photo">🖼</button>
    <button class="tb-btn" data-cmd="video" title="Video">🎬</button>
    <button class="tb-btn" data-cmd="animation" title="GIF">⟳</button>
    <button class="tb-btn" data-cmd="audio" title="Audio">♫</button>
    <button class="tb-btn" data-cmd="voicenote" title="Voice">🎙</button>
    <button class="tb-btn" data-cmd="map" title="Map">📍</button>
    <button class="tb-btn" data-cmd="collage" title="Collage">⊞+</button>
    <button class="tb-btn" data-cmd="slideshow" title="Slideshow">▶⊞</button>
  </div>
  <div class="toolbar-sep"></div>
  <div class="toolbar-group">
    <button id="btn-test-message" class="tb-btn tb-test" title="Load Full Test">✓</button>
  </div>
</div>

<!-- Main: Editor + Sidebar -->
<div id="main-area">
  <!-- Editor -->
  <div id="editor-pane">
    <div id="editor-scroll">
      <div id="editor" contenteditable="true" spellcheck="true" data-placeholder="Start writing your rich message..."></div>
    </div>
    <div class="editor-footer">
      <div id="char-count" class="char-count"></div>
      <label class="toggle-label" title="Right-to-left text">
        <input type="checkbox" id="chk-rtl" />
        <span class="toggle-switch">RTL</span>
      </label>
      <label class="toggle-label" title="Skip entity detection">
        <input type="checkbox" id="chk-skip-entities" />
        <span class="toggle-switch">No Detect</span>
      </label>
    </div>
  </div>

  <!-- Chat Sidebar -->
  <aside id="chat-sidebar" class="chat-sidebar">
    <div class="sidebar-header">
      <span>Chats</span>
      <button id="btn-new-chat-sidebar" class="sidebar-new-btn" title="New Chat">
        <svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
      </button>
    </div>
    <div id="chat-list" class="chat-list"></div>
  </aside>
</div>

<!-- Bottom Bar -->
<div id="bottom-bar" class="bottom-bar">
  <div class="bottom-left">
    <button id="btn-settings-bottom" class="bb-btn" title="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
    <div class="status-dot" id="status-dot"></div>
    <span class="status-text" id="status-text">Connect bot</span>
  </div>
  <div class="bottom-right">
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="rich">Rich</button>
      <button class="mode-tab" data-mode="draft">Draft</button>
      <button class="mode-tab" data-mode="edit">Edit</button>
    </div>
    <button id="btn-send" class="send-btn" title="Send">
      <svg viewBox="0 0 24 24"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<!-- Settings Overlay -->
<div id="settings-overlay" class="overlay hidden">
  <div class="panel">
    <div class="panel-header">
      <h3>Settings</h3>
      <button id="btn-close-settings" class="close-btn">&times;</button>
    </div>
    <div class="panel-body">
      <label>Bot Token</label>
      <input type="password" id="input-token" placeholder="From @BotFather" autocomplete="off">
      <label>Chat ID</label>
      <input type="text" id="input-chat" placeholder="@channel or numeric ID">
      <label>Edit Message ID</label>
      <input type="text" id="input-edit-id" placeholder="Message ID to edit">
      <button id="btn-test-connection" class="btn-primary">Test Connection</button>
      <div id="connection-status"></div>
      <button id="btn-save-settings" class="btn-primary">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container" aria-live="polite"></div>

<script src="app.js"></script>
</body>
</html>
