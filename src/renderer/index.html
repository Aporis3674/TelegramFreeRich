<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src https://api.telegram.org">
<title>TelegramFreeRich</title>
<link rel="stylesheet" href="styles/app.css">
</head>
<body>

<!-- Header -->
<header id="header">
  <div class="header-left">
    <svg class="logo" viewBox="0 0 24 24" width="22" height="22"><path d="M11.944.042C5.347.042.042 5.347.042 11.944c0 6.596 5.305 11.902 11.902 11.902 6.596 0 11.902-5.306 11.902-11.902C23.846 5.347 18.54.042 11.944.042zM17.92 8.182l-2.057 9.668c-.153.695-.558.865-1.13.538l-3.117-2.298-1.505 1.448c-.166.166-.306.306-.63.306l.44-3.128 5.69-5.142c.248-.22-.054-.343-.384-.122l-7.04 4.435-3.032-.988c-.66-.206-.673-.66.138-.977l11.83-4.56c.55-.203 1.03.136.852.97z" fill="currentColor"/></svg>
    <span class="title">FreeRich</span>
  </div>
  <div class="header-right">
    <button id="btn-settings" class="icon-btn" title="Settings">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
    </button>
  </div>
</header>

<!-- Editor -->
<main id="editor-main">
  <div id="editor-scroll">
    <div id="editor" contenteditable="true" spellcheck="true" data-placeholder="Start writing..."></div>
  </div>
</main>

<!-- Bottom Toolbar -->
<div id="bottom-toolbar" class="bottom-toolbar">
  <button class="tb-btn" id="btn-formatting" title="Formatting">
    <span class="tb-icon-lg">Aa</span>
  </button>
  <button class="tb-btn" id="btn-text-style" title="Text Style">
    <svg viewBox="0 0 24 24" width="22" height="22"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" fill="currentColor"/><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z" fill="currentColor"/></svg>
  </button>
  <button class="tb-btn" id="btn-list" title="List">
    <svg viewBox="0 0 24 24" width="20" height="20"><line x1="9" y1="6" x2="20" y2="6" stroke="currentColor" stroke-width="2"/><line x1="9" y1="12" x2="20" y2="12" stroke="currentColor" stroke-width="2"/><line x1="9" y1="18" x2="20" y2="18" stroke="currentColor" stroke-width="2"/><circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/></svg>
  </button>
  <button class="tb-btn" id="btn-table" title="Insert Table">
    <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><line x1="3" y1="9" x2="21" y2="9" stroke="currentColor" stroke-width="2"/><line x1="3" y1="15" x2="21" y2="15" stroke="currentColor" stroke-width="2"/><line x1="9" y1="3" x2="9" y2="21" stroke="currentColor" stroke-width="2"/><line x1="15" y1="3" x2="15" y2="21" stroke="currentColor" stroke-width="2"/></svg>
  </button>
  <button class="tb-btn" id="btn-link" title="Insert Link">
    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71" stroke="currentColor" stroke-width="2" fill="none"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.72-1.71" stroke="currentColor" stroke-width="2" fill="none"/></svg>
  </button>
  <button class="tb-btn" id="btn-media" title="Media">
    <svg viewBox="0 0 24 24" width="20" height="20"><rect x="3" y="3" width="18" height="18" rx="2" stroke="currentColor" stroke-width="2" fill="none"/><circle cx="8.5" cy="8.5" r="1.5" fill="currentColor"/><path d="M21 15l-5-5L5 21" stroke="currentColor" stroke-width="2" fill="none"/></svg>
  </button>
</div>

<!-- Vertical Popup Menus -->
<div id="popup-overlay" class="popup-overlay hidden"></div>

<div id="popup-formatting" class="popup-menu hidden">
  <button class="pm-item" data-cmd="heading"><span class="pm-icon">#</span> Heading <span class="pm-arrow">›</span></button>
  <button class="pm-item" data-cmd="text"><span class="pm-icon">T</span> Text</button>
  <button class="pm-item" data-cmd="blockquote"><span class="pm-icon">❝</span> Quote</button>
  <button class="pm-item" data-cmd="pullquote"><span class="pm-icon">❝❝</span> Pullquote</button>
  <button class="pm-item" data-cmd="code-block"><span class="pm-icon">&lt;/&gt;</span> Code Block</button>
  <button class="pm-item" data-cmd="footer"><span class="pm-icon">⊥</span> Footer</button>
  <button class="pm-item" data-cmd="divider"><span class="pm-icon">—</span> Divider</button>
  <button class="pm-item" data-cmd="math-block"><span class="pm-icon">∑</span> Math Block</button>
  <button class="pm-item" data-cmd="details"><span class="pm-icon">▸▾</span> Details</button>
</div>

<div id="popup-heading" class="popup-menu popup-submenu hidden">
  <button class="pm-item pm-back" data-cmd="back-formatting"><span class="pm-icon">‹</span> Back</button>
  <button class="pm-item" data-cmd="h1"><span class="pm-icon">H1</span> Heading 1</button>
  <button class="pm-item" data-cmd="h2"><span class="pm-icon">H2</span> Heading 2</button>
  <button class="pm-item" data-cmd="h3"><span class="pm-icon">H3</span> Heading 3</button>
  <button class="pm-item" data-cmd="h4"><span class="pm-icon">H4</span> Heading 4</button>
  <button class="pm-item" data-cmd="h5"><span class="pm-icon">H5</span> Heading 5</button>
  <button class="pm-item" data-cmd="h6"><span class="pm-icon">H6</span> Heading 6</button>
</div>

<div id="popup-text-style" class="popup-menu hidden">
  <button class="pm-item" data-cmd="bold"><span class="pm-icon">B</span> Bold</button>
  <button class="pm-item" data-cmd="italic"><span class="pm-icon">I</span> Italic</button>
  <button class="pm-item" data-cmd="underline"><span class="pm-icon">U</span> Underline</button>
  <button class="pm-item" data-cmd="strikethrough"><span class="pm-icon">S̶</span> Strikethrough</button>
  <button class="pm-item" data-cmd="spoiler"><span class="pm-icon">👁</span> Spoiler</button>
  <button class="pm-item" data-cmd="sub"><span class="pm-icon">X₂</span> Subscript</button>
  <button class="pm-item" data-cmd="sup"><span class="pm-icon">X²</span> Superscript</button>
  <button class="pm-item" data-cmd="marked"><span class="pm-icon">==</span> Marked</button>
</div>

<div id="popup-list" class="popup-menu hidden">
  <button class="pm-item" data-cmd="ordered-list"><span class="pm-icon">1.</span> Ordered List</button>
  <button class="pm-item" data-cmd="bullet-list"><span class="pm-icon">•≡</span> Bullet List</button>
  <button class="pm-item" data-cmd="checklist"><span class="pm-icon">☑</span> Check List</button>
  <button class="pm-item" data-cmd="details"><span class="pm-icon">▸▾</span> Details</button>
</div>

<div id="popup-media" class="popup-menu hidden">
  <button class="pm-item" data-cmd="image"><span class="pm-icon">🖼</span> Photo or Video</button>
  <button class="pm-item" data-cmd="audio"><span class="pm-icon">♫</span> Audio File</button>
</div>

<!-- Link Panel -->
<div id="link-panel" class="popup-menu hidden">
  <div class="lp-header">Create Link</div>
  <div class="lp-body">
    <input type="text" id="link-text" placeholder="Link text" autocomplete="off">
    <input type="url" id="link-url" placeholder="URL (https://...)" autocomplete="off">
    <div class="lp-actions">
      <button class="lp-btn lp-cancel">Cancel</button>
      <button class="lp-btn lp-create">Create</button>
    </div>
  </div>
</div>

<!-- Bottom Action Bar -->
<div id="action-bar" class="action-bar">
  <button id="btn-clear" class="action-btn action-clear" title="Clear All">
    <svg viewBox="0 0 24 24" width="20" height="20"><polyline points="3 6 5 6 21 6" stroke="currentColor" stroke-width="2" fill="none"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2" stroke="currentColor" stroke-width="2" fill="none"/></svg>
  </button>
  <div class="action-spacer"></div>
  <div class="action-bottom-info">
    <span id="char-count" class="char-count"></span>
    <div class="mode-tabs">
      <button class="mode-tab active" data-mode="rich">Rich</button>
      <button class="mode-tab" data-mode="draft">Draft</button>
      <button class="mode-tab" data-mode="edit">Edit</button>
    </div>
    <div class="status-dot" id="status-dot"></div>
  </div>
  <button id="btn-send" class="send-btn" title="Send">
    <svg viewBox="0 0 24 24" width="20" height="20"><path d="M22 2L11 13" stroke="currentColor" stroke-width="2" fill="none"/><polygon points="22 2 15 22 11 13 2 9 22 2" fill="currentColor"/></svg>
  </button>
</div>

<!-- Settings Overlay -->
<div id="settings-overlay" class="overlay hidden">
  <div class="panel">
    <div class="panel-header">
      <h3>Settings</h3>
      <button id="btn-close-settings" class="close-btn">&times;</button>
    </div>
    <div class="panel-body">
      <label>Bot Token</label>
      <input type="password" id="input-token" placeholder="From @BotFather" autocomplete="off">
      <label>Chat ID</label>
      <input type="text" id="input-chat" placeholder="@channel or numeric ID">
      <label>Edit Message ID</label>
      <input type="text" id="input-edit-id" placeholder="Message ID to edit">
      <label>Language</label>
      <select id="input-lang"><option value="en">English</option><option value="fa">فارسی</option></select>
      <label>Theme</label>
      <select id="input-theme"><option value="dark">Dark</option><option value="light">Light</option></select>
      <button id="btn-test-connection" class="btn-primary">Test Connection</button>
      <div id="connection-status"></div>
      <button id="btn-save-settings" class="btn-primary">Save</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast-container"></div>

<script src="app.js"></script>
</body>
</html>
