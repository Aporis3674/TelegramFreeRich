<!DOCTYPE html>
<html lang="fa">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; connect-src https://api.telegram.org">
<title>TelegramFreeRich</title>
<link rel="stylesheet" href="styles/app.css">
</head>
<body>
<div id="app">
  <!-- Title Bar -->
  <header id="titlebar">
    <div class="titlebar-drag">
      <svg class="logo" viewBox="0 0 24 24" width="18" height="18">
        <path d="M11.944.042C5.347.042.042 5.347.042 11.944c0 6.596 5.305 11.902 11.902 11.902 6.596 0 11.902-5.306 11.902-11.902C23.846 5.347 18.54.042 11.944.042zM17.92 8.182l-2.057 9.668c-.153.695-.558.865-1.13.538l-3.117-2.298-1.505 1.448c-.166.166-.306.306-.63.306l.44-3.128 5.69-5.142c.248-.22-.054-.343-.384-.122l-7.04 4.435-3.032-.988c-.66-.206-.673-.66.138-.977l11.83-4.56c.55-.203 1.03.136.852.97z" fill="#fff"/>
      </svg>
      <span class="titlebar-text">TelegramFreeRich</span>
    </div>
    <div class="titlebar-controls">
      <button id="btn-focus" class="title-btn" title="Focus Mode">&#x2712;</button>
      <button id="btn-theme" class="title-btn" title="Toggle Theme">&#x263E;</button>
      <button id="btn-settings" class="title-btn" title="Settings">&#x2699;</button>
    </div>
  </header>

  <div id="content">
    <!-- LEFT: Editor -->
    <div id="editor-pane">
      <!-- Toolbar -->
      <div id="toolbar">
        <!-- Group 1: Inline -->
        <div class="toolbar-group" id="group-inline">
          <button class="tbtn" data-cmd="bold" title="Bold (Ctrl+B)"><svg viewBox="0 0 24 24"><path d="M6 4h8a4 4 0 014 4 4 4 0 01-4 4H6z"/><path d="M6 12h9a4 4 0 014 4 4 4 0 01-4 4H6z"/></svg></button>
          <button class="tbtn" data-cmd="italic" title="Italic (Ctrl+I)"><svg viewBox="0 0 24 24"><line x1="19" y1="4" x2="10" y2="4"/><line x1="14" y1="20" x2="5" y2="20"/><line x1="15" y1="4" x2="9" y2="20"/></svg></button>
          <button class="tbtn" data-cmd="underline" title="Underline (Ctrl+U)"><svg viewBox="0 0 24 24"><path d="M6 3v7a6 6 0 006 6 6 6 0 006-6V3"/><line x1="4" y1="21" x2="20" y2="21"/></svg></button>
          <button class="tbtn" data-cmd="strikethrough" title="Strikethrough"><svg viewBox="0 0 24 24"><path d="M16 4H9a3 3 0 00-2.83 4"/><path d="M14 12a4 4 0 010 8H6"/><line x1="4" y1="12" x2="20" y2="12"/></svg></button>
          <div class="tg-sep"></div>
          <button class="tbtn" data-cmd="code" title="Inline Code (Ctrl+E)"><svg viewBox="0 0 24 24"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg></button>
          <button class="tbtn" data-cmd="spoiler" title="Spoiler"><svg viewBox="0 0 24 24"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/><line x1="2" y1="2" x2="22" y2="22"/></svg></button>
          <button class="tbtn" data-cmd="highlight" title="Highlight"><svg viewBox="0 0 24 24"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 013 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
          <div class="tg-sep"></div>
          <button class="tbtn" data-cmd="subscript" title="Subscript"><svg viewBox="0 0 24 24"><text x="2" y="14" font-size="13" fill="currentColor">X</text><text x="13" y="18" font-size="9" fill="currentColor">2</text></svg></button>
          <button class="tbtn" data-cmd="superscript" title="Superscript"><svg viewBox="0 0 24 24"><text x="2" y="14" font-size="13" fill="currentColor">X</text><text x="13" y="10" font-size="9" fill="currentColor">2</text></svg></button>
        </div>
        <!-- Group 2: Block -->
        <div class="toolbar-group" id="group-block">
          <button class="tbtn" data-cmd="heading" data-level="1" title="Heading 1">H1</button>
          <button class="tbtn" data-cmd="heading" data-level="2" title="Heading 2">H2</button>
          <button class="tbtn" data-cmd="heading" data-level="3" title="Heading 3">H3</button>
          <div class="tg-sep"></div>
          <button class="tbtn" data-cmd="bullet-list" title="Bullet List"><svg viewBox="0 0 24 24"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><circle cx="4" cy="6" r="1"/><circle cx="4" cy="12" r="1"/><circle cx="4" cy="18" r="1"/></svg></button>
          <button class="tbtn" data-cmd="numbered-list" title="Numbered List"><svg viewBox="0 0 24 24"><line x1="10" y1="6" x2="21" y2="6"/><line x1="10" y1="12" x2="21" y2="12"/><line x1="10" y1="18" x2="21" y2="18"/><text x="3" y="8" font-size="7">1</text><text x="3" y="14" font-size="7">2</text><text x="3" y="20" font-size="7">3</text></svg></button>
          <button class="tbtn checklist-btn" data-cmd="checklist" title="Checklist (separate API)">&#x2611;</button>
          <div class="tg-sep"></div>
          <button class="tbtn" data-cmd="link" title="Insert Link"><svg viewBox="0 0 24 24"><path d="M10 13a5 5 0 007.54.54l3-3a5 5 0 00-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 00-7.54-.54l-3 3a5 5 0 007.07 7.07l1.71-1.71"/></svg></button>
          <button class="tbtn" data-cmd="code-block" title="Code Block"><svg viewBox="0 0 24 24"><rect x="2" y="3" width="20" height="18" rx="2"/><polyline points="8 10 5 7 8 4"/><polyline points="16 10 19 7 16 4"/><line x1="13" y1="14" x2="11" y2="14"/></svg></button>
          <button class="tbtn" data-cmd="table" title="Table"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg></button>
          <button class="tbtn" data-cmd="details" title="Collapsible"><svg viewBox="0 0 24 24"><polyline points="6 9 12 15 18 9"/></svg></button>
          <button class="tbtn" data-cmd="divider" title="Divider"><svg viewBox="0 0 24 24"><line x1="2" y1="12" x2="22" y2="12"/></svg></button>
          <button class="tbtn" data-cmd="footnote" title="Footnote">[1]</button>
        </div>
        <!-- Group 3: Media & Special -->
        <div class="toolbar-group" id="group-media">
          <button class="tbtn" data-cmd="image" title="Image"><svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></button>
          <button class="tbtn" data-cmd="video" title="Video">&#x25B6;</button>
          <button class="tbtn" data-cmd="map" title="Map">&#x1F5FA;</button>
          <button class="tbtn" data-cmd="slideshow" title="Slideshow">&#x1F4C1;</button>
          <button class="tbtn" data-cmd="math" title="Math">&#x2211;</button>
        </div>
      </div>

      <!-- Block Editor -->
      <div id="editor-area">
        <div id="blocks-container"></div>
      </div>
    </div>

    <!-- RIGHT: Preview -->
    <div id="preview-pane">
      <div class="pane-header">
        <span>Preview</span>
        <span id="char-count">0 / 32,768</span>
      </div>
      <div id="preview-bubble">
        <div id="preview-content">Start typing...</div>
      </div>
      <div id="send-area">
        <div class="send-mode-selector">
          <label><input type="radio" name="send-mode" value="rich" checked> Rich</label>
          <label><input type="radio" name="send-mode" value="draft"> Draft</label>
          <label><input type="radio" name="send-mode" value="edit"> Edit</label>
        </div>
        <div class="send-row">
          <input type="text" id="message-id" placeholder="Edit msg ID" style="display:none;width:70px">
          <button id="btn-send" class="btn-primary">Send</button>
          <button id="btn-clear" class="btn-secondary">Clear</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Settings Panel (overlay) -->
  <div id="settings-overlay" class="hidden">
    <div id="settings-panel">
      <div class="settings-header">
        <h3>Settings</h3>
        <button id="btn-close-settings">&times;</button>
      </div>
      <div class="settings-body">
        <label>Bot Token</label>
        <input type="password" id="input-token" placeholder="Enter bot token from @BotFather">

        <label>Chat ID</label>
        <input type="text" id="input-chat" placeholder="@channel or numeric ID">

        <label>Default Language</label>
        <select id="input-lang">
          <option value="en">English</option>
          <option value="fa">فارسی</option>
        </select>

        <button id="btn-test-connection" class="btn-primary">Test Connection</button>
        <div id="connection-status"></div>
        <button id="btn-save-settings" class="btn-primary">Save</button>
      </div>
    </div>
  </div>

  <!-- Focus mode overlay -->
  <div id="focus-overlay" class="hidden">
    <div id="focus-editor"></div>
  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- Link dialog -->
  <div id="link-dialog" class="dialog hidden">
    <div class="dialog-content">
      <h3>Insert Link</h3>
      <input type="text" id="link-url" placeholder="https://...">
      <input type="text" id="link-text" placeholder="Display text">
      <div class="dialog-actions">
        <button id="btn-link-ok" class="btn-primary">OK</button>
        <button id="btn-link-cancel" class="btn-secondary">Cancel</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
